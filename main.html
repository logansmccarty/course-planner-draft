    ]
  }
};
const CATS = ["writing","math","language","concentration","broader"];

/* Double course that fills two slots: choosing it in fromCat locks toCat. */
const LINKED_COURSE = { id:"LIFESCI 50A", fromCat:"concentration", toCat:"math" };
function courseId(s){ return (s||"").split(" ").slice(0,2).join(" "); }
function reconcileLinked(){
  const cc = state[LINKED_COURSE.fromCat];
  const active = !!(cc && cc.choice && cc.choice !== '__skip__' && cc.course
                 && courseId(cc.course) === LINKED_COURSE.id);
  const m = state[LINKED_COURSE.toCat];
  if (!!m.linkedOver !== active){
    m.linkedOver = active;   // overlay only — the underlying Math choice is preserved & restored
    syncCardInputs(LINKED_COURSE.toCat);
  }
}

/* Contextual nudges shown when a category is SKIPPED. */
const SKIP_NUDGES = {
  language:{ type:"info", text:T("cat.language.nudge") },
  math:    { type:"info", text:T("cat.math.nudge") }
};

/* ---------- state ---------- */
let state = {};
function blankState(){
  const s = {};
  CATS.forEach(c => {
    s[c] = { choice:null, fillIns:{}, skipReason:"" };
    if (COURSES[c].twoLevel){
      s[c].course = ""; s[c].otherText = "";
      // category filters (e.g. Gen Ed area checkboxes) default to all-on
      (COURSES[c].areas || []).forEach(a => {
        if (a.filterCats) s[c].catFilter = a.filterCats.slice();
      });
    }
  });
  return s;
}

/* ---------- build the cards ---------- */
function buildCards(){
  const grid = document.getElementById('grid');
  grid.innerHTML = "";
  CATS.forEach((cat, i) => {
    const data = COURSES[cat];
    const card = document.createElement('div');
    card.className = 'card ' + (data.wide ? 'span3' : 'span2');
    card.id = 'card-' + cat;

    // head
    const head = document.createElement('div');
    head.className = 'card-head';
    head.innerHTML = `<div class="num">${i+1}</div><h2>${data.label}</h2>
      <span class="state-chip empty" id="chip-${cat}">${T('label.empty')}</span>`;
    card.appendChild(head);

    // body
    const body = document.createElement('div');
    body.className = 'card-body';

    if (data.twoLevel) buildTwoLevelBody(cat, data, body);
    else buildSimpleBody(cat, data, body);

    card.appendChild(body);
    grid.appendChild(card);
  });
}

/* shared: build the "Skip this category" radio + reason panel */
function buildSkipBlock(cat, data, host){
  const div = document.createElement('div');
  div.className = 'skip-divider';
  host.appendChild(div);

  const skipLab = document.createElement('label');
  skipLab.className = 'opt skipopt';
  skipLab.innerHTML = `<input type="radio" name="r-${cat}" value="__skip__">
    <span class="txt">${T('card.skipThis')}</span>`;
  skipLab.querySelector('input').addEventListener('change', () => selectOption(cat, '__skip__'));
  host.appendChild(skipLab);
  return skipLab;
}
function buildSkipPanel(cat, data, host){
  const sp = document.createElement('div');
  sp.className = 'skip-panel';
  sp.id = `skip-${cat}`;
  sp.innerHTML = `<div class="reason-lbl">${T('card.skipWhy', {label:data.label})}</div>
    <textarea id="skipinp-${cat}" aria-label="${escapeHtml(htmlToText(T('card.skipWhy', {label:data.label})))}"></textarea>`;
  sp.querySelector('textarea').addEventListener('input', e => {
    state[cat].skipReason = e.target.value;
    refreshAll();
  });
  host.appendChild(sp);
}

/* simple card: flat (optionally grouped) radio list */
function buildSimpleBody(cat, data, body){
  if (cat === LINKED_COURSE.toCat){
    const lp = document.createElement('div');
    lp.className = 'lock-overlay';
    lp.id = `linked-${cat}`;
    lp.innerHTML = `<div><span class="lk-title">${T('link.mathValue')}</span>${T('link.mathNote')}</div>`;
    body.appendChild(lp);
  }
  const grouped = data.options.some(o => o.group);
  let optHost = body;
  if (grouped){
    optHost = document.createElement('div');
    optHost.className = 'groups-wrap';
    body.appendChild(optHost);
  }
  let lastGroup = null, currentGroup = null;
  data.options.forEach(opt => {
    let target = optHost;
    if (grouped){
      if (opt.group !== lastGroup){
        currentGroup = document.createElement('div');
        currentGroup.className = 'group';
        const gl = document.createElement('div');
        gl.className = 'group-label';
        gl.textContent = opt.group;
        currentGroup.appendChild(gl);
        optHost.appendChild(currentGroup);
        lastGroup = opt.group;
      }
      target = currentGroup;
    }
    const lab = document.createElement('label');
    lab.className = 'opt';
    lab.innerHTML = `<input type="radio" name="r-${cat}" value="${opt.id}">
      <span class="txt">${opt.name}${opt.rec?` <span class="rec">${T('card.recommended')}</span>`:''}</span>`;
    lab.querySelector('input').addEventListener('change', () => selectOption(cat, opt.id));
    target.appendChild(lab);

    if (opt.fillIn){
      const fi = document.createElement('div');
      fi.className = 'fillin';
      fi.id = `fill-${cat}-${opt.id}`;
      fi.innerHTML = `<input type="text" placeholder="${opt.fillIn}" aria-label="${escapeHtml(opt.fillIn||"")}" id="fillinp-${cat}-${opt.id}">`;
      fi.querySelector('input').addEventListener('input', e => {
        state[cat].fillIns[opt.id] = e.target.value;
        refreshAll();
      });
      target.appendChild(fi);
    } else if (opt.dropdown){
      const fi = document.createElement('div');
      fi.className = 'fillin';
      fi.id = `fill-${cat}-${opt.id}`;
      const list = (opt.unsure ? [UNSURE] : []).concat(LISTS[opt.dropdown] || []);
      let opts = "";
      list.forEach(v => { opts += `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`; });
      fi.innerHTML = `<select class="coursesel" aria-label="${escapeHtml(htmlToText(opt.name))}" id="fillinp-${cat}-${opt.id}">${opts}</select>`;
      fi.querySelector('select').addEventListener('change', e => {
        state[cat].fillIns[opt.id] = e.target.value;
        refreshAll();
      });
      target.appendChild(fi);
    }
  });

  buildSkipBlock(cat, data, body);
  buildSkipPanel(cat, data, body);

  if (SKIP_NUDGES[cat]){
    const n = document.createElement('div');
    n.className = 'nudge' + (SKIP_NUDGES[cat].type==='info'?' info':'');
    n.id = `nudge-${cat}`;
    n.innerHTML = SKIP_NUDGES[cat].text;
    body.appendChild(n);
  }
}

/* two-level card: broad-area radios (left) + course dropdown (right) */
function buildTwoLevelBody(cat, data, body){
  const wrap = document.createElement('div');
  wrap.className = 'twolevel';

  // LEFT: area radios + skip
  const areas = document.createElement('div');
  areas.className = 'areas';
  const pl = document.createElement('div');
  pl.className = 'pane-label';
  pl.innerHTML = data.chooseLabel || T('cat.concentration.chooseLabel');
  areas.appendChild(pl);

  data.areas.forEach(area => {
    const lab = document.createElement('label');
    lab.className = 'opt';
    lab.innerHTML = `<input type="radio" name="r-${cat}" value="${area.id}">
      <span class="txt">${area.label}</span>`;
    lab.querySelector('input').addEventListener('change', () => selectOption(cat, area.id));
    areas.appendChild(lab);

    // area-filter checkboxes (Gen Ed categories) — always shown, disabled unless this area is selected
    if (area.filterCats){
      const box = document.createElement('div');
      box.className = 'catboxes';
      box.id = `catboxes-${cat}-${area.id}`;
      area.filterCats.forEach(c => {
        const cl = document.createElement('label');
        cl.className = 'catopt';
        cl.innerHTML = `<input type="checkbox" data-cat="${escapeHtml(c)}"> <span>${escapeHtml(c)}</span>`;
        cl.querySelector('input').addEventListener('change', e => toggleCat(cat, area.id, c, e.target.checked));
        box.appendChild(cl);
      });
      areas.appendChild(box);
    }
  });
  buildSkipBlock(cat, data, areas);
  wrap.appendChild(areas);

  // RIGHT: detail panes
  const detail = document.createElement('div');
  detail.className = 'detailpane';

  const hint = document.createElement('div');
  hint.className = 'detail';
  hint.id = `detail-${cat}-hint`;
  hint.innerHTML = `<div class="hint">${data.hintText || T('card.hintDefault')}</div>`;
  detail.appendChild(hint);

  data.areas.forEach(area => {
    const d = document.createElement('div');
    d.className = 'detail';
    d.id = `detail-${cat}-${area.id}`;
    if (area.other){
      const lab = area.otherLabel || T('card.hintDefault');
      const ph  = area.otherPlaceholder || T('card.whichCourse');
      d.innerHTML = `<div class="pane-label">${lab}</div>
        <div class="areaother"><input type="text" placeholder="${escapeHtml(ph)}" aria-label="${escapeHtml(htmlToText(lab))}" id="areaotherinp-${cat}"></div>`;
      d.querySelector('input').addEventListener('input', e => setConcOther(cat, e.target.value));
    } else {
      const named = !!area.dropdown;                       // named list (LISTS) vs inline courses
      const list = named ? (LISTS[area.dropdown] || []) : area.courses;
      let opts = area.unsure
        ? `<option value="${escapeHtml(UNSURE)}">${escapeHtml(UNSURE)}</option>`
        : `<option value="">${escapeHtml(T('card.selectCourse'))}</option>`;
      list.forEach(c => { const e = escapeHtml(c); opts += `<option value="${e}">${e}</option>`; });
      if (!named) opts += `<option value="__other__">${escapeHtml(T('card.otherOption'))}</option>`;
      const paneLabel = area.paneLabel || T('card.courseInArea', {area:area.label});
      let html = `<div class="pane-label">${paneLabel}</div>
        <select class="coursesel" aria-label="${escapeHtml(htmlToText(paneLabel))}" id="sel-${cat}-${area.id}">${opts}</select>`;
      if (!named) html += `<div class="selother" id="selother-${cat}-${area.id}"><input type="text" placeholder="${escapeHtml(T('card.whichCourse'))}" aria-label="${escapeHtml(T('card.whichCourse'))}" id="selotherinp-${cat}-${area.id}"></div>`;
      html += `<div class="descwrap"><div class="coursedesc" id="desc-${cat}-${area.id}"></div></div>`;
      d.innerHTML = html;
      d.querySelector('select').addEventListener('change', e => selectCourse(cat, e.target.value));
      const so = d.querySelector('.selother input');
      if (so) so.addEventListener('input', e => setConcOther(cat, e.target.value));
    }
    detail.appendChild(d);
  });

  buildSkipPanel(cat, data, detail);
  if (cat === LINKED_COURSE.fromCat){
    const ln = document.createElement('div');
    ln.className = 'linknote';
    ln.id = `linknote-${cat}`;
    ln.innerHTML = T('link.concNote');
    detail.appendChild(ln);
  }
  wrap.appendChild(detail);
  body.appendChild(wrap);
}

/* ---------- selection logic ---------- */
function selectOption(cat, val){
  if (val === '__skip__'){
    state[cat].choice = '__skip__';
    if (!state[cat].skipReason) state[cat].skipReason = COURSES[cat].skipReason;
  } else {
    state[cat].choice = val;
    if (COURSES[cat].twoLevel){
      const area = COURSES[cat].areas.find(a => a.id === val);
      state[cat].otherText = "";
      state[cat].course = (area && area.unsure) ? UNSURE : "";
    }
    else {
      // dropdowns default to "Unsure - will choose later" on first selection
      const opt = COURSES[cat].options.find(o => o.id === val);
      if (opt && opt.dropdown && opt.unsure && !state[cat].fillIns[val]){
        state[cat].fillIns[val] = UNSURE;
      }
    }
  }
  syncCardInputs(cat);
  reconcileLinked();
  refreshAll();
}
/* two-level: course dropdown changed */
function selectCourse(cat, val){
  state[cat].course = val;
  if (val !== '__other__') state[cat].otherText = "";
  syncCardInputs(cat);
  reconcileLinked();
  refreshAll();
}
/* two-level: free-text for an "Other…" course or the interdisciplinary area */
function setConcOther(cat, val){
  state[cat].otherText = val;
  refreshAll();
}
/* Gen Ed area-checkbox filtering ---------------------------------------- */
function catAllowed(display, filter){
  const cats = GENED_AREAS[display] || [];
  return cats.some(a => filter.includes(a));
}
/* repopulate a filtered dropdown (Gen Ed) from the checked area boxes */
function rebuildCatSelect(cat, areaId){
  const area = COURSES[cat].areas.find(a => a.id === areaId);
  const sel = document.getElementById(`sel-${cat}-${areaId}`);
  if (!area || !sel) return;
  const filter = state[cat].catFilter || [];
  let opts = `<option value="${escapeHtml(UNSURE)}">${escapeHtml(UNSURE)}</option>`;
  (LISTS[area.dropdown] || []).forEach(c => {
    if (catAllowed(c, filter)){ const e = escapeHtml(c); opts += `<option value="${e}">${e}</option>`; }
  });
  sel.innerHTML = opts;
  // Only touch the selection when THIS filtered area is the active one — otherwise
  // we'd clobber another area's course (e.g. a First-Year Seminar) during sync.
  if (state[cat].choice === areaId){
    const cur = state[cat].course;
    if (cur && cur !== UNSURE && !catAllowed(cur, filter)) state[cat].course = UNSURE;
    sel.value = state[cat].course || UNSURE;
  } else {
    sel.value = UNSURE;
  }
}
function toggleCat(cat, areaId, label, checked){
  const f = state[cat].catFilter || (state[cat].catFilter = []);
  const i = f.indexOf(label);
  if (checked && i < 0) f.push(label);
  else if (!checked && i >= 0) f.splice(i, 1);
  syncCardInputs(cat);
  refreshAll();
}
/* resolved specific course for a two-level category, or null if incomplete */
function concSpecific(cat){
  const st = state[cat];
  const area = COURSES[cat].areas.find(a => a.id === st.choice);
  if (!area) return null;
  if (area.other) return (st.otherText || "").trim() || null;
  if (!st.course) return null;
  if (st.course === '__other__') return (st.otherText || "").trim() || null;
  return st.course;
}
/* is this category a completed course selection? */
function isFilled(cat){
  const st = state[cat];
  if (st.linkedOver) return true;
  if (!st.choice || st.choice === '__skip__') return false;
  if (COURSES[cat].twoLevel) return concSpecific(cat) != null;
  return true;
}

/* make the DOM (radios, panels, textboxes) match state[cat] */
function syncCardInputs(cat){
  if (COURSES[cat].twoLevel){ syncTwoLevel(cat); return; }
  const data = COURSES[cat];
  const choice = state[cat].choice;
  const linked = !!state[cat].linkedOver;
  document.getElementById('card-'+cat)?.classList.toggle('linked', linked);
  // radios reflect the underlying choice (kept so it can be restored); disabled while a blue card covers them
  document.querySelectorAll(`input[name="r-${cat}"]`).forEach(r => {
    r.disabled = linked;
    r.checked = (r.value === choice);
  });
  // fill-ins (text boxes and dropdowns)
  data.options.forEach(opt => {
    if (opt.fillIn || opt.dropdown){
      const box = document.getElementById(`fill-${cat}-${opt.id}`);
      const inp = document.getElementById(`fillinp-${cat}-${opt.id}`);
      if (choice === opt.id){ box.classList.add('show'); }
      else { box.classList.remove('show'); }
      inp.value = state[cat].fillIns[opt.id] || "";
    }
  });
  // skip panel + nudge
  const sp = document.getElementById(`skip-${cat}`);
  const skipInp = document.getElementById(`skipinp-${cat}`);
  const nudge = document.getElementById(`nudge-${cat}`);
  if (choice === '__skip__'){
    sp.classList.add('show');
    skipInp.value = state[cat].skipReason || "";
    if (nudge) nudge.classList.add('show');
  } else {
    sp.classList.remove('show');
    if (nudge) nudge.classList.remove('show');
  }
}

/* sync a two-level (area + dropdown) card to its state */
function syncTwoLevel(cat){
  const data = COURSES[cat];
  const st = state[cat];
  const choice = st.choice;
  // radios
  document.querySelectorAll(`input[name="r-${cat}"]`).forEach(r => { r.checked = (r.value === choice); });
  // hint shows only when nothing chosen
  document.getElementById(`detail-${cat}-hint`).classList.toggle('show', !choice);
  // per-area detail panes
  data.areas.forEach(area => {
    const d = document.getElementById(`detail-${cat}-${area.id}`);
    const on = (choice === area.id);
    d.classList.toggle('show', on);
    // area-filter checkboxes: reflect state, gray out unless this area is selected
    if (area.filterCats){
      rebuildCatSelect(cat, area.id);
      const box = document.getElementById(`catboxes-${cat}-${area.id}`);
      if (box){
        const filter = state[cat].catFilter || [];
        box.querySelectorAll('label.catopt').forEach(cl => {
          const inp = cl.querySelector('input');
          inp.checked = filter.includes(inp.dataset.cat);
          inp.disabled = !on;
          cl.classList.toggle('disabled', !on);
        });
      }
    }
    if (area.other){
      const ai = document.getElementById(`areaotherinp-${cat}`);
      if (on) ai.value = st.otherText || "";
    } else {
      const sel = document.getElementById(`sel-${cat}-${area.id}`);
      if (on){
        sel.value = st.course || "";
        const so = document.getElementById(`selother-${cat}-${area.id}`);
        if (so){
          const isOther = (st.course === '__other__');
          so.classList.toggle('show', isOther);
          document.getElementById(`selotherinp-${cat}-${area.id}`).value = isOther ? (st.otherText || "") : "";
        }
        // course description box
        const desc = document.getElementById(`desc-${cat}-${area.id}`);
        const cur = st.course;
        const isReal = cur && cur !== '__other__' && cur !== UNSURE;
        const text = isReal ? (DESCRIPTIONS[cur] || "") : "";
        if (desc.dataset.cur !== (cur || "")){   // only when the course changed
          desc.innerHTML = text;                  // descriptions are HTML (from descriptions.csv)
          desc.scrollTop = 0;                     // start a new description at the top
          desc.dataset.cur = cur || "";
        }
        desc.classList.toggle('show', !!text);
        desc.classList.toggle('placeholder', text === DESC_PLACEHOLDER);
      }
    }
  });
  // skip panel
  const sp = document.getElementById(`skip-${cat}`);
  const skipInp = document.getElementById(`skipinp-${cat}`);
  if (choice === '__skip__'){ sp.classList.add('show'); skipInp.value = st.skipReason || ""; }
  else sp.classList.remove('show');
  // double-course note (e.g. LS 50A also fills Math)
  const ln = document.getElementById(`linknote-${cat}`);
  if (ln){ const sel = concSpecific(cat); ln.classList.toggle('show', !!sel && courseId(sel) === LINKED_COURSE.id); }
}

/* ---------- derived helpers ---------- */
function choiceLabel(cat){
  const st = state[cat];
  if (st.linkedOver){ const t = T('link.mathValue'); return { type:'course', html: t, text: htmlToText(t) }; }
  const choice = st.choice;
  if (!choice) return null;
  if (choice === '__skip__') return { type:'skip', reason: st.skipReason || COURSES[cat].skipReason };
  if (COURSES[cat].twoLevel){
    const area = COURSES[cat].areas.find(a => a.id === choice);
    if (!area) return null;
    const spec = concSpecific(cat);
    const part = spec || (area.other ? "(unspecified)" : "(course undecided)");
    let desc = null;  // include the course description if the picked course has one
    if (spec && spec !== UNSURE && DESCRIPTIONS[spec]) desc = DESCRIPTIONS[spec];
    return { type:'course', incomplete: !spec, desc,
             html: area.label + " — " + escapeHtml(part),
             text: htmlToText(area.label) + " — " + part };
  }
  const opt = COURSES[cat].options.find(o => o.id === choice);
  if (!opt) return null;
  const nameHtml = opt.name;
  const fill = (st.fillIns[choice] || "").trim();
  const hasSub = opt.fillIn || opt.dropdown;
  let html = nameHtml, text = htmlToText(nameHtml);
  if (hasSub && fill){ html += " — " + escapeHtml(fill); text += " — " + fill; }
  else if (hasSub && !fill){ html += " (unspecified)"; text += " (unspecified)"; }
  return { type:'course', html, text };
}

/* ---------- refresh status, summary, share ---------- */
function refreshAll(){
  let filled = 0, skipped = 0;
  CATS.forEach(cat => {
    const c = state[cat].choice;
    const chip = document.getElementById(`chip-${cat}`);
    if (state[cat].linkedOver){ filled++; chip.className='state-chip linked'; chip.innerHTML=T('label.linked'); }
    else if (c === '__skip__'){ skipped++; chip.className='state-chip skip'; chip.innerHTML=T('label.skipped'); }
    else if (isFilled(cat)){ filled++; chip.className='state-chip filled'; chip.innerHTML=T('label.course'); }
    else if (c){ chip.className='state-chip partial'; chip.innerHTML=T('label.inProgress'); }
    else { chip.className='state-chip empty'; chip.innerHTML=T('label.empty'); }
  });

  document.getElementById('cFilled').textContent = filled;
  document.getElementById('cSkip').textContent = skipped;
  const pending = CATS.length - filled - skipped;
  const complete = (filled === 4 && skipped === 1);

  // copy button enabled only when the plan is valid
  document.getElementById('copyTextBtn').disabled = !complete;
  document.getElementById('copyHint').classList.toggle('hide', complete);

  // verdict
  const v = document.getElementById('verdict');
  if (filled === 0 && skipped === 0){
    v.className='verdict work'; v.innerHTML=T('verdict.start');
  } else if (filled === 4 && skipped === 1){
    v.className='verdict ok'; v.innerHTML=T('verdict.complete');
  } else if (filled > 4){
    v.className='verdict err'; v.innerHTML=T('verdict.tooMany', {n:filled});
  } else if (skipped > 1){
    v.className='verdict err'; v.innerHTML=T('verdict.tooManySkips', {n:skipped});
  } else {
    const need = [];
    if (pending>0) need.push(T(pending>1?'verdict.pendingMany':'verdict.pendingOne', {n:pending}));
    if (filled<4 && pending===0) need.push(T('verdict.notEnough'));
    v.className='verdict work';
    v.innerHTML = T('verdict.inProgress', {needs: need.join('; ') || 'keep going'});
  }

  buildSummary();
  saveToHash();
}

function buildSummary(){
  const body = document.getElementById('planBody');
  body.innerHTML = "";
  CATS.forEach(cat => {
    const info = choiceLabel(cat);
    const tr = document.createElement('tr');
    let choiceCell;
    if (!info){
      choiceCell = `<span class="tag none">${T('summary.undecided')}</span>`;
    } else if (info.type === 'skip'){
      choiceCell = `<span class="tag skip">${T('label.skipped')}</span>` +
        (info.reason ? `<div class="reason-text">“${escapeHtml(info.reason)}”</div>` : '');
    } else {
      const tagClass = info.incomplete ? 'none' : 'course';
      const tagText  = info.incomplete ? T('label.inProgress') : T('label.course');
      choiceCell = `<span class="tag ${tagClass}">${tagText}</span> ${info.html}` +
        (info.desc ? `<div class="summary-desc">${info.desc}</div>` : '');
    }
    tr.innerHTML = `<td class="cat">${COURSES[cat].label}</td><td>${choiceCell}</td>`;
    body.appendChild(tr);
  });
}

function planAsText(){
  const W=74, IND="  ", SEP="-".repeat(60), RULE="=".repeat(60);
  const blocks = CATS.map(cat => {
    const info = choiceLabel(cat);
    const out = [htmlToText(COURSES[cat].label)];          // category name on its own line
    if (!info){ out.push(IND+"(undecided)"); }
    else if (info.type==='skip'){ out.push(IND+"Skipped — "+(info.reason||"(no reason given)")); }
    else {
      out.push(IND+info.text);                              // the chosen course / area
      if (info.desc){
        const {paras, url} = descToParts(info.desc);
        paras.forEach(p => { out.push(""); out.push(wrapText(p, W, IND)); });
        if (url){ out.push(""); out.push(IND+"More info: "+url); }
      }
    }
    return out.join("\n");
  });
  let filled=0,skipped=0;
  CATS.forEach(c=>{ if(state[c].choice==='__skip__')skipped++; else if(isFilled(c))filled++; });
  const tally = `${filled} course${filled!==1?'s':''} selected, ${skipped} skipped` +
    (filled===4&&skipped===1?"  ✓ complete":"  (incomplete)");
  return ["Harvard First-Year Course Plan", RULE, "",
          blocks.join("\n\n"+SEP+"\n\n"),
          "", RULE, tally].join("\n");
}

function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function htmlToText(html){
  const d=document.createElement('div');
  d.innerHTML=(html||"").replace(/<br\s*\/?>/gi," ");
  // expand links so the copied text keeps the actual URL
  d.querySelectorAll('a[href]').forEach(a=>{ a.textContent = a.textContent.trim() + " (" + a.getAttribute('href') + ")"; });
  // keep block elements from running together
  d.querySelectorAll('p,div,li').forEach(el=> el.append(" "));
  return (d.textContent||"").replace(/\s+/g," ").trim();
}
/* Split a description's HTML into clean text paragraphs + its catalog URL (for the plain-text copy) */
function descToParts(html){
  const d=document.createElement('div'); d.innerHTML=html||"";
  let url=null;
  const a=d.querySelector('p.course-link a[href]');
  if(a){ url=a.getAttribute('href'); const p=a.closest('p'); if(p) p.remove(); }
  d.querySelectorAll('br').forEach(br=> br.replaceWith(document.createTextNode("\n")));
  const blocks=[...d.querySelectorAll('p,li')];
  const raw=blocks.length ? blocks.map(b=>b.textContent) : [d.textContent];
  const paras=[];
  raw.forEach(t=>{ (t||"").split(/\n{2,}/).forEach(seg=>{ const x=seg.replace(/[ \t\r\n]+/g," ").trim(); if(x) paras.push(x); }); });
  return {paras, url};
}
/* Word-wrap plain text to a width, with a left indent on every line */
function wrapText(text, width, indent){
  const out=[]; let line="";
  text.split(" ").forEach(w=>{
    if(line && (line.length+1+w.length)>width){ out.push(indent+line); line=w; }
    else line = line ? line+" "+w : w;
  });
  if(line) out.push(indent+line);
  return out.join("\n");
}

/* ---------- share via URL hash ---------- */
function saveToHash(){
  try{
    const json = JSON.stringify(state);
    const enc = btoa(unescape(encodeURIComponent(json)));
    history.replaceState(null,"","#plan="+enc);
  }catch(e){}
}
function loadFromHash(){
  const m = location.hash.match(/plan=([^&]+)/);
  if (!m) return false;
  try{
    const json = decodeURIComponent(escape(atob(m[1])));
    const obj = JSON.parse(json);
    // validate shape
    CATS.forEach(cat=>{
      if (obj[cat]){
        state[cat].choice = obj[cat].choice ?? null;
        state[cat].fillIns = obj[cat].fillIns || {};
        state[cat].skipReason = obj[cat].skipReason || "";
        if (COURSES[cat].twoLevel){
          state[cat].course = obj[cat].course || "";
          state[cat].otherText = obj[cat].otherText || "";
          if (Array.isArray(obj[cat].catFilter)) state[cat].catFilter = obj[cat].catFilter;
        }
      }
    });
    return true;
  }catch(e){ return false; }
}

/* ---------- buttons ---------- */
function flashCopied(){
  const m=document.getElementById('copiedMsg');
  m.classList.add('show'); setTimeout(()=>m.classList.remove('show'),1400);
}
async function copyToClipboard(text){
  try{ await navigator.clipboard.writeText(text); }
  catch(e){
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);
    ta.select();document.execCommand('copy');document.body.removeChild(ta);
  }
}
document.getElementById('copyTextBtn').addEventListener('click', ()=>{
  if (document.getElementById('copyTextBtn').disabled) return;
  copyToClipboard(planAsText()).then(flashCopied);
});
document.getElementById('resetBtn').addEventListener('click', ()=>{
  if (!confirm("Clear your plan and start over?")) return;
  state = blankState();
  history.replaceState(null,"",location.pathname+location.search);
  CATS.forEach(syncCardInputs);
  refreshAll();
});

/* ---------- init ---------- */
applyText();
state = blankState();
buildCards();
loadFromHash();
CATS.forEach(syncCardInputs);
reconcileLinked();
refreshAll();
</script>
