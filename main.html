le; and (5) communication – summarizing results through visualization, storytelling, and interpretable summaries.</p><p>This is the first part of a two-course sequence. The curriculum builds throughout the academic year, and students are strongly encouraged to enroll in both the fall and spring courses within the same academic year.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/STAT109A/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "STAT 110 Introduction to Probability": "<p>A comprehensive introduction to probability. Basics: sample spaces and events, conditional probability, and Bayes' Theorem. Univariate distributions: density functions, expectation and variance, Normal, t, Binomial, Negative Binomial, Poisson, Beta, and Gamma distributions. Multivariate distributions: joint and conditional distributions, independence, transformations, and Multivariate Normal. Limit laws: law of large numbers, central limit theorem. Markov chains: transition probabilities, stationary distributions, convergence.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/STAT110/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "ENG-SCI 53 Quant Physiology Basis for Bioengineering": "<p>This course is designed as an introduction to thinking as a bio/biomedical engineer and is recommended for first years and sophomores but open to all students. Simple mathematical models are used to represent key aspects of organ systems function. Core engineering concepts are explored through mechanical and electrical examples within the human body. The primary focus is on quantitative descriptions of organ systems function and control in terms of physical principles and physiologic mechanisms. It includes a foundation in human organ systems physiology, including cardiovascular, pulmonary, and renal systems. Emphasis will be given to understanding the ways in which dysfunction in these systems gives rise to common human disease processes.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/ENG-SCI53/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "ENG-SCI 55 Fundamentals Engineering Design": "<p>Practicing engineers are often confronted with ill-defined, open-ended challenges. In this course, you will learn and apply an engineering design framework to reframe these challenges into tractable engineering problems. Working individually and in teams, you will use quantitative design tools to inform design decisions. You will evaluate potential solutions using rigorous engineering analysis and quantitative modeling and simulation. You will develop the skills to clearly and concisely communicate your design thinking to multiple stakeholders.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/ENG-SCI55/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "ESE 6 Environ Engr and Technology": "<p>This course will provide students with an introduction to environmental science and engineering by providing an overview of current environmental issues, including climate change, air pollution, and water pollution. Students critically evaluate underlying science and knowledge limitations, and explore the nexus between scientific knowledge, regulatory frameworks, and engineering solutions to some of the world's most pressing environmental problems. The course will emphasize the interconnected biological, geological, and chemical cycles of the earth system including the multi-dimensional impacts of human activity.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/ESE6/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1006 Music From Earth": "<p><strong>How can music help us in the search for extraterrestrial intelligence?</strong></p><p>In 1977 humanity sent a mixtape into outer space. The two spacecraft of NASA’s Voyager mission include a Golden Record, featuring greetings in 55 earth languages, 116 images of the planet and its inhabitants, plus examples of music from a range of cultures across the world: from Azerbaijani bagpipes to Zaire pygmy songs, from English Renaissance dances to Stravinsky’s Rite of Spring, and from Louis Armstrong to Chuck Berry. The samplings of earthbound auditory culture are on their way into the unknown. The Voyagers left the solar system around 2014, and in about 40,000 years the sun will no longer be their nearest star.<br><br>The Golden Record raises a number of big questions. The vast temporal and spatial distances that it traverses force us to change our perspective so as to imagine the distant future and to think far beyond our usual comfort zone. In trying to make contact with the Big Other—quite literally, communicating with the alien—the Golden Record asks us to confront our very humanity and to pose questions of self-representation and communication on the broadest level.<br>It is ironic that in 1977 the idea of communicating with aliens was something of a crackpot theory that serious scientists rarely promoted, whereas the vast number of exoplanets that have been discovered over the last forty years has given new relevance to this idea. We now believe that there must be at least 100 billion exoplanets, so the tables have turned: now it seems statistically unlikely that there would be no other inhabited planet in the universe.<br><br>The central question we will ask in this class is bafflingly simple: What might happen if someone picked up the Golden Record at the other end? What does listening actually mean on this broadest, interplanetary level? Of course, any answer must remain speculative, but this doesn’t mean that we must throw our arms up in the air in despair. SETI, the Study of Extra-Terrestrial Intelligence, has identified a number of factors that we can safely assume to be universally recognizable across planets. Chief among them is the binary system of zero and one; it is also likely that sensory perception will rely on vibration patterns in a fluid medium. These give us a basis for some informed speculation. Concrete answers will likely remain evasive, but the creative and deductive work that goes into solving these puzzles are just as important as the answers themselves.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1006/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1019 The Caribbean": "<p><strong>How does the growing inequality between and within nations—which is the major global issue of our times—impact the Caribbean region and, in turn, its U.S. neighbor?</strong></p><p>This course explores the complex, formative role of the Caribbean in the development of Western colonialism and capitalism and the consequences for the peoples of the region. Four major themes will be examined. First, the importance of the region in the origin and early development of Western imperialism and capitalism: Why did both Western Europe and America begin their imperial and colonial expansion in this region and to what degree did the region’s slave-based economies influence the nature and development of Western capitalism? Second, what were the consequences of imperialism for the demographic and socio-cultural fate of indigenous and African populations? Is genocide a proper designation of the fate of exploited peoples of the region up to the end of the period of slavery? Third, we examine the post-colonial consequences of this history for the socio-political, economic and cultural development of the region. What have been the main paths toward sustainable development in the modern Caribbean? Why in spite of its long history of engagement with Western capitalism, has the region largely faltered in its efforts to develop? We examine the different paths to development through five case studies—neo-colonial dependency in Puerto Rico, communist dependency in Cuba, democratic socialism in Jamaica, Barbados’ neo-liberal strategy, and aid-dependency in Haiti. We also study the common problem of migration and transnationalism and the degree to which this process undermines national sovereignty. Fourth, we explore the distinctive features of racial classification and cultural representations in the Caribbean. What do we learn about race as a social construction from the Caribbean experience? How do Caribbean racism and colorism unsettle American notions of race and ethnic identities? Why has globalization not led to cultural homogenization? How do we account for the unusual influence of Caribbean music, especially that of Jamaica, on popular global culture?</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1019/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1025 Happiness": "<p><strong>Should we pursue happiness, and if so, what is the best way to do it? </strong></p><p>This course will critically assess the answers to these questions given by thinkers from a wide variety of different places, cultures, and times, including Stoicism, Epicureanism, Buddhism, Daoism, and contemporary philosophy, psychology, and economics.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1025/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1030 The Philosopher and the Tyrant": "<p><strong>In a time of rising authoritarianism and polarized debate, what role can the love of wisdom have in tempering the pursuit of power?</strong></p><p>Philosophers and politicians alike struggle to set the terms for living a good life in a world of conflict. Rulers seek guidance from their counselors, and philosophers have often dreamed of wielding real-world influence. Reading a series of masterpieces of philosophical thought and literary expression, we will examine some striking cases of relations between the pursuit of wisdom and the pursuit of power, from the extremes of conflict (the executions of Socrates, Han Fei, Jesus, Sir Thomas More) to the opposite dream of the philosopher king. How do seekers of wisdom speak truth to power? How do rulers understand their ethical responsibilities toward their often fractious subjects? How do rulers and subjects alike weigh the competing demands of liberty and order, self-fulfillment and self-restraint? Moving from ancient to modern examples, this course will see how the insights and methods of Plato, Machiavelli, Shakespeare, and Hannah Arendt can be useful in working through contemporary conundrums of wisdom and power.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1030/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1033 Negotiation & Conflict Mgmt": "<p><strong>At all levels of society, how can we turn disagreement into productive negotiation?</strong></p><p><strong></strong></p><p>Conflict is an inevitable aspect of human life—from everyday disagreements with family and friends to sociopolitical divisions that shape shared institutions and international affairs. Yet while some disagreements escalate into polarization and mistrust, others lead to cooperative problem-solving and creative breakthroughs. What explains this difference? What separates destructive conflict from constructive negotiation?</p><p>To prepare you for a lifetime of civic engagement, this course examines enduring questions about the nature of conflict and interdisciplinary approaches for resolving it. We explore rational, emotional, and identity-based dimensions of conflict resolution and connect these insights to your own life as well as to organizational and societal challenges. Because conflict often involves difficult trade-offs and moral dilemmas, we also examine models for understanding its ethical and sociopolitical complexities.</p><p>The hope is that, by the end of the course, you will develop a deeper understanding of conflict resolution and will be better equipped to navigate its many contours to advance the vision of a more peaceful world.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1033/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1044 Deep History": "<p><strong>Who are we, how did we get here... and how far back in time do we have to go to start asking the question?</strong></p><p>When does history begin? To judge by the typical history textbook, the answer is straightforward: six thousand years ago. So what about the tens of thousands of years of human existence described by archaeology and related disciplines? Is that history too? This introduction to human history offers a framework for joining the entirety of the human past, from the long ago to the present day, in a single narrative that stretches across many disciplines. We will explore a series of interrelated themes each of which invites questions that travel across time and space. The material presented through lectures, discussions, and activities will not only guide students through a collaborative exploration of human experience, but will also encourage them to contemplate how such experiences mirror and contrast with their own. To help anchor ourselves in the timeline of past and present, we will engage with the world-class collection of artifacts in Harvard’s museums, giving students a unique, hands-on opportunity to experience human history through material remains. Course notes: No prior college-level course in archaeology, history, or a related field is required or assumed, and First-year students are welcome. Because the course touches on ideas in many disciplines beyond history and archaeology, including art, economics, human evolutionary biology, psychology, and religion, we welcome a range of students who can bring unique perspectives and expertise to class discussion.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1044/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1050 Act Natural": "<p><strong>How do we draw the line between being yourself and performing yourself, between acting and authenticity?</strong></p><p>“To thine own self be true,” runs the famous line in Hamlet. But which self? And why? And who’s judging? Does this injunction to be authentic even make sense today, when profiles proliferate online and surveillance is ubiquitous? Acting—the art of creating and reproducing selves—can help us navigate these questions. Just as every century’s approach to acting tells us something about their idea of personhood, so too can our own era’s quandaries around empathy, personae, identity, work, art-making and politics be explored through our approach to acting. This course will examine the construction of private and public selves across eras and disciplines, through a combination of lectures, screenings, readings, and talks. Sections and examinations will be practice-based, focused on a single basic task: students will be asked to turn into each other over the course of the term. THIS COURSE IS OPEN TO ACTORS AND NON-ACTORS.</p><p>This is a lecture course with a strong practical component. Full course meets Wednesdays from 12pm-2:45pm for lecture and acting workshops, with additional mandatory discussion sections (1h/week) to be scheduled on Thursdays/Fridays. No previous experience of acting or English classes is required, although a willingness to immerse yourself in both reading and performance is expected.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1050/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1052 Race in a Polarized America": "<p><strong>Is the United States a beacon of liberal, democratic, diverse values and practices, that also has a pattern of racial injustice – or is the US at its core a white supremicist society, in which some people aspire to creating a genuinely tolerant liberal democracy?</strong></p><p>This course addresses these questions by examining policy disputes around issues such as incarceration and policing, free speech, the role of biology in ancestry and medical care, electoral politics, activism, and movement across borders. We will examine class, nationality, and gender differences within and across groups, and how group boundaries are made stronger or weaker. We will consider how to reduce unproductive polarization, and how you --the new generation of citizens of the world -- can promote a better America even, or especially, when we do not agree on just what “better” entails.</p><p>Course readings range from public speeches and interviews to works in political science, sociology, economics, and a bit of genomic science. You will learn how and where the United States has progressed in promoting group equality and fairness, as well as where it has not or has even moved backwards. You will end the course with a deeper understanding of the core American paradox of the persistence of group hierarchy in a country dedicated to democracy, equality, and liberty, and what people such as yourselves can do to resolve that paradox.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1052/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1053 Global Heart Disease Epidemic": "<p><strong>What are you willing to do for the health of others?</strong></p><p>Heart diseases have killed occasional humans since ancient times, but only in the past century have heart diseases become epidemic throughout the world. In fact, the first description of a heart attack in a human was not until 1912. In the current century, heart diseases will be the leading global cause of death, and the majority of those heart disease deaths will actually occur in the developing world. The epidemic of heart disease has been driven by many social, economic and technological events. Some of these events have been dramatically detrimental to human health, such as the accidental invention of the American cigarette by a slave in North Carolina in the 19th Century—an invention that is projected to kill one billion people between 2000 and 2100. Other events, such as advances in public health and safety, have been beneficial by extending lifespan and preventing early death, but they have also allowed age-related heart diseases to explode. Technological advances have improved our economic productivity but also led to changes in our lifestyles that promote heart diseases. In this course, we will consider the complex relationship of health and society by examining the epidemic in common heart diseases. We will explore how major lifestyle factors such as tobacco, alcohol, exercise and diet affect health, and we will also consider how economics and politics powerfully influence health. We will also discuss the role of government and our obligations to each other, and to future generations.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1053/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1056 Human Nature": "<p><strong>What makes us human and why does it matter?</strong></p><p>What makes us psychologically and behaviorally human? Why is this important? In what ways are humans similar to other species, and how are we different? What are the evolutionary origins of the behavioral and psychological features found across human societies, including parental love, sibling rivalry, pair-bonding, incest aversion, social status, war, norms, altruism, religion, language and cooking? At the same time, how can we account for the immense diversity we observe in behavior and psychology across time and societies? Tackling these questions within a broad evolutionary framework, the course will draw on the latest insights and evidence from evolutionary biology, primatology, anthropological ethnography, neuroscience, genetics, linguistics, economics and psychology. We'll contextualize contemporary behavior by examining studies of non-human primates, especially chimpanzees, and a broad range of human variation based on comparative studies of hunter-gatherers, herders, agriculturalists and—most unusual of all—people from societies that are WEIRD (Western, Educated, Industrialized, Rich and Democratic). Along the way, we'll see how culture has driven much of our genetic evolution and runs deep into our evolutionary history. We'll consider how understanding the evolutionary origins of human behavior, psychology, and culture informs how we approach contemporary issues such as patriarchy, polygamous marriage, sex differences, child abuse, mating preferences, homosexuality, racism, psychological differences among populations and the use of oral contraceptives.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1056/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1074 The Ancient Greek Hero": "<p><strong>How did ancient Greek heroes, both male and female, learn about life by facing what all of us have to face, our human condition?</strong></p><p>How to face death? Concentrating on this central human question, we will explore some of the greatest works of ancient Greek literature in English translation. For the Greeks, a special way to address the problem of death was to think long and hard about what they called heroes in their myths. Our purpose in this course is to extend that kind of thinking to the present. Assignments invite you to engage in personal reflections on the meaning of life and death in the light of what we read in Greek literature about the ordeals of becoming a hero.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1074/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1079 Why Is There No Cure for Health?": "<p><strong>Given all our technological advances, why are we still not able to prevent preventable diseases, provide affordable healthcare for millions of people, and deliver cures for curable diseases?</strong><br><br>Around the world, billions of dollars are spent on health care treatments, public health initiatives, and pharmaceutical research and development. So why are we still not able to prevent preventable diseases, provide affordable healthcare for millions of people, and deliver cures for curable diseases? And what are the best ways to address these issues?</p><p>Because these questions are so large, we will focus our discussion around questions like: What steps should be taken to address epidemics? How should the United States reform its health care system? And how should prescription drugs be produced and sold?</p><p>We will explore how social scientists address empirical questions, the types of data that are available, how those data are analyzed, and the confidence with which causal statements are made. By the end of the course, you will be able to dissect a large question—such as how to reform American healthcare—into its technological, social, economic, and moral components, and weigh potential solutions according to these guiding vectors.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1079/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1089 The Border": "<p><strong>If we want to understand our own history we need to look at the fringes, in this case the ongoing tensions and violence at the U.S.-Mexico border illustrates what we value and fear as a society.</strong></p><p>Our southern border is continuously covered in newspapers, social media, and political debates. Why does the Mexico-U.S. border continue to be a space of discussion and controversy? In the twenty-first century, as nations across the world militarize or rebuild their borders, the U.S.-Mexico border serves as a vital case study to understand the ongoing trend of tightening national borders—it also allows us to better understand our own history, politics, and how we shape our view of the world. In addition to examining the creation of the U.S.-Mexico border in 1848 to the present, this course examines how ideas of public health have historically been used in border debates. For many, the border served (and serves) as a protective barrier from poverty, violence, and, especially, disease. By the early twentieth century many Mexican bodies were perceived as “alien,” “illegal,” and in need of patrolling. Yet these descriptions were also used by Mexican politicians to describe and isolate Indigenous groups and the Chinese within Mexico. By examining, for example, border ecological disasters, response to epidemics and a pandemic, and how ideas of race and health played out within Mexico and the U.S. we can better understand borders in general.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1089/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1093 Reimagining Global Health": "<p><strong>How can health care systems be restructured to provide high quality care even to the poorest and most vulnerable people on our planet? </strong></p><p>Health care should be about standing with the poor and the sick. It should be about fighting for those pushed to the margins, whose lives are ground down by poverty, trapped by unjust systems, and devalued by forces that declare some lives worth less than others. This course challenges students to reimagine disease, illness, and injury as biosocial phenomena - shaped as much by poverty, racism, and political violence as by pathogens. From rural Malawi to American prisons, from tuberculosis programs to the overdose crisis, we will trace the roots of global health inequities and examine the ideologies that sustain them. But this course is not only about identifying failures. It is about how we act alongside the sick and destitute to fight for a future where health is a human right.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1093/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1098 Natural Disasters": "<p><strong>What makes our planet so dangerous?</strong></p><p>From Mexico to India, San Francisco to Tokyo, natural disasters have shaped both the surface of our planet and the development of civilizations. These catastrophes claim thousands of lives and cause tens of billions of dollars in damage each year, and the impact of natural disasters is only increasing as a result of human population growth and urbanization. This course uses the methods and skills associated with earth science to help you to develop an understanding of both the causes and impacts of these events. Readings will be assigned from the textbook <em>Natural Disasters </em>by Patrick Abbott (11th edition), to deliver the scientific content - recorded lectures will be available throughout the course, and live lectures and discussion sessions will be held each week to address any difficulties with the material, to facilitate discussion, and to provide an opportunity for interacting with fellow students and the teaching staff. By the end of this course, you will be able to understand the ways in which societies can systematically anticipate and prepare for the kinds of natural disasters which many people have come to assume are inevitable.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1098/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1104 Science and Cooking": "<p><strong>How can we use scientific principles to make better food, for ourselves and for the world?</strong></p><p>Food and cooking are part of your everyday life. Whether you are a skilled chef or a home-cook, what you do in the kitchen is deeply rooted in science. This class brings together top chefs and Harvard scientists to explore how everyday cooking and haute cuisine can illuminate basic principles in physics and chemistry. Throughout the semester you will watch as chefs reveal the secrets behind some of their most famous culinary creations. Inspired by such cooking mastery, we will then explore the science behind the recipes. Students will gain a solid understanding of the properties and fundamental behaviors of soft matter materials. All food is made of soft materials, and cooking relies on many of their fundamental properties. Topics will include: emulsions, illustrated by aioli; elasticity, exemplified by the done-ness of a steak; and diffusion, revealed by the phenomenon of spherification, the culinary technique pioneered by Ferran Adria. The course includes laboratory work where students develop their skills as experimental scientists. Other assignments include weekly homeworks, in-class exercises, and a final project where students explore the science of a culinary topic of their choosing.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1104/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1105 Can We Know Our Past?": "<p><strong>In a time when histories are being contested, monuments removed, and alternative facts compete with established orthodoxy, how do we evaluate competing narratives about what really happened in the past?</strong></p><p>What happened in the past? How do you know? Even though today we take great pains to document every major event that occurs, more than 99% of human history is not written down. How, then, can we determine with any certainty what people did, let alone thought about, hundreds, thousands, and even millions of years ago? This course addresses these and other fundamental questions: Can we ever really know what happened in the past? If the past is “dead and gone,” how do we know what we (think we) know about it? And what is our degree of certainty about the past societies and cultures that historians, archaeologists and others study today? Through hands-on interaction with artifacts, experiments and other analytical methods you will consider how these approaches relate to different “stakeholders” – groups of people whose understanding of themselves is rooted in a connection to history. By the end of this course, you will have a sense of how your knowledge of the seemingly-distant past is, in fact, intimately tied to your experiences in the contemporary world.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1105/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1114 Painting's Doubt: A Studio Course": "<p><strong>How does a hands-on practice of image making (painting) lead us to perceive, represent and inhabit our world differently?</strong></p><p>Painting is an engagement between the self and the world. It is a practice of embodied making, and, as a language outside of words, can think around conditioned understanding. This introductory studio art course proposes learning to paint as a new experience of relating to the world, and through painting we will investigate not only what we have to say, but what we have to see.<br><br>Studio assignments in small sections are complemented by weekly lectures, visiting artist presentations, readings and visits to Harvard’s collections. The primary materials for this course will be oil on canvas, with some excursions into drawing and work on a paper. No experience is necessary, except a willingness to make a mess.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1114/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1116 Medical Ethics and History": "<p><strong>Why have debates about medicine and public health (e.g., vaccination, abortion, etc.) become so polarized and contentious in the United States?</strong></p><p>Students will encounter the ethical dilemmas of medicine and public health throughout their lives, whether with their own health, or with the health of their families and friends. This course will equip them with the tools of moral philosophy so that they can recognize, critique, and craft arguments grounded in appeals to utilitarianism, deontology, rights, or justice. But the course will focus on historical analysis of the debates so that students understand how social, economic, and political contexts have influenced moral reasoning. By clarifying their own thinking in the classroom, students will be better equipped to engage in the debates and contribute to the ongoing efforts by medicine to relieve human suffering.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1116/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1120 Political Econ of Globalization": "<p><strong>What kind of global arrangements can best support the aspirations of nations with widely varying circumstances – rich, poor, and endowed with vastly different resources and institutions – and help them address the challenges of economic growth, poverty reduction, inequality, climate change, and authoritarian populism?</strong></p><p><br>The world is profoundly interconnected through trade, technology, capital markets, and migration. For decades, the international economic and geopolitical order favoured and supported policies to advance economic integration. Today, that order is under significant strain.</p><p><br>In this course we will draw upon history, economic theory, and evidence to shed light on the choices and trade-offs faced by governments, international institutions, businesses, and citizens as they face the international economy. We will explore why globalization is currently in turmoil and the range of reforms under discussion to make it work better.</p><p><br>We will trace the history of globalization starting from ancient times to contextualize contemporary issues. Topics will include: (i) the fragmentation of international trade, now marked by tariffs, a trade war between the U.S. and China, and trade frictions between the U.S. and its allies; (ii) erosion of international norms such as multilateralism and territorial integrity; (iii) rising domestic polarization over immigration and inequality; (iv) challenges to the U.S. dollar as the world’s safe-haven currency; and (v) increasingly bleak prospects for collective climate and public health action.</p><p><br>Our goal is to expose students to diverse and competing perspectives so they can develop their own informed views on globalization. Students will engage these perspectives through readings, guest lectures from leading policy experts, and in-class debates to explore critical issues from new angles.</p><p><br>We emphasize experiential learning. Students will act as policymakers in negotiation simulations and write policy appraisals that advocate for specific positions. While the frameworks we emphasize reflect our backgrounds as economists, this course is designed for both economists and non-economists to gain a richer understanding of how theory and evidence apply to challenges of globalization.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1120/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1122 Social Responsibilities of Universities": "<p><strong>What do universities owe society? </strong></p><p>Since their origins in medieval Europe, universities have been granted special privileges because they have been understood to contribute to the social welfare. Do these privileges incur corresponding obligations on universities? Should they influence how universities educate their students or create, share and preserve knowledge or conduct their internal affairs? Given that universities have a significant impact on society, what principles should guide their activities to ensure that they serve the public good? While universities have been expected to serve society, they also espouse values, such as academic freedom, institutional autonomy and neutrality, that some see as antithetical to social engagement.  The image of the ivory tower, remote and removed from society, captures this vision of the university. As a result, there has been tension about how universities can both serve society and remain true to these core values.  This course examines how questions about universities’ social responsibilities have been debated and enacted over the past century in the context of American higher education. Taking into consideration these lessons from the past, students will be asked to develop their own conception of how a university should engage in society.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1122/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1133 Is the US Civil War Still Being Fought?": "<p><strong>How and why does the U.S. Civil War continue to shape national politics, laws, literature, and culture---especially in relation to our understanding of race, freedom, and equality?</strong></p><p>Most of us were taught that the Civil War between the Confederacy and the Union was fought on battlefields chiefly in the American South between the years of 1861-1865. In this narrative, the North won and the South lost. But what if the issues that resulted in such devastating bloodshed were never resolved? What if the war never ended? This course demonstrates the ways in which the United States is still fighting the Civil War, arguably THE defining event in U.S. history. In each class, we connect current events to readings and themes in the course, highlighting how and why the war is still being fought. From Nat Turner’s slave rebellion in 1831 to the recent riot (or battle) in Charlottesville, we trace how and why the South was in certain respects the victor, even though the Confederacy was destroyed and the Constitution amended. We explore the different kinds of war—ideological, political, cultural, military, and para-military—that placed the unfreedom of blacks—as slaves, serfs, and prisoners—at the center of larger conflicts over federal versus state and local rule, welfare, globalization, and free trade. We analyze the Civil War in literature, art, politics, photography, prints, film, music, poetry, speeches, and history, while also discovering how these cultural forms worked to shape our memory of the event itself. By the end of the course, we will be able to show how and why contemporary U.S. debates are rooted in this defining narrative, and we will better understand the dilemmas the nation faces today.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1133/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1144 Mental Health thru Lit/Arts": "<p>Mental health experts believe that globally, more than 1 billion people have a mental illness. And yet the biases and misperceptions surrounding mental illness, not to mention the dehumanization, isolation, and abuse in many communities of individuals with a mental illness, remains acute. This course uses literature and the arts to help students learn more about some of the prevalent biases/misperceptions/myths/stigmas against individuals with mental illness and how these biases can be (or in the past have been) ameliorated, ameliorating loneliness and suffering for all.</p><p>This course ordinarily counts for premed requirements in writing and literature. Weekly assignments combine readings of literature/film screenings, etc. with a range of secondary sources. For the final project, students have the option of a traditional paper or a creative project. The course will include guest speakers and visits to the Harvard Art Museums and other local resources.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1144/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1167 Climate Crossroads": "<p><strong>Irreversible climate change poses an unprecedented challenge to the stability of all societies: what are the scientifically viable pathways to a future that is sustainable and just?</strong></p><p>What one thing is changing everything in your lifetime—and for generations to come? It’s changing what you eat; it’s changing buildings you live in; and it’s changing politics, the arts, and finance. The change is accelerating. This course reveals fundamental alterations that climate disruption is bringing to multiple human activities and natural phenomena.<br><br>The course represents a crossroads in two senses. First, it’s a crossroads of disciplines. Climate change affects science, society, culture, government policy, biodiversity, and environmental justice. To understand it is inherently interdisciplinary and requires standing at the crossroads of several approaches. Second, humanity itself is at a new crossroads. Because global climate is shifting rapidly, this prompts new views of humans in geologic time, as well as new thinking in economics, law, finance, and science.<br><br>Climate change isn’t just “global warming.” It’s an alteration of conditions on Earth to which all creatures and societies are adjusting. What is the science of climate change? Why can’t understanding and dealing with climate change be confined to science?<br><br>Through materials and assignments that address quantitative understanding and qualitative judgment, you’ll learn why it’s unwise to seal the interrelated issues of climate change in separate disciplines; conversely, why it’s necessary to use separate disciplines to acquire the knowledge and applications needed to formulate policy and actions. You’ll learn about climate adaptation (adjusting to changing climate), mitigation (reducing the speed and severity of climate change), and resilience (e.g., recovering from extremeweather events). You’ll discover how careers in many different areas increasingly involve thinking about climate.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1167/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1176 Sexuality in Literature": "<p><strong>What is the relationship between literature, social change, and sexual identity?</strong></p><p>In this course, we’ll learn how sexual identity and desire are understood and represented in different social and historical circumstances, We’ll move beyond the binary of identifying images as “positive” or “negative,” paying attention to how depictions, definitions, and understandings of sexuality are shaped by specific historical moments, as well as the aesthetic traditions and personal experiences shaping these individual works. In addition to novels, we’ll look at op-eds, essays, poems, photography, and film with an eye to thinking about how different genres speak to the larger world of politics, activism, and popular culture.</p><p>Learning how to decode metaphors and images in novels, films, and other works will make you a more sophisticated reader of the texts that circulate outside the classroom. As you sharpen your ability to critically analyze these works as products of particular political and historical moments, you will become a more nuanced reader of the world around you, able to think critically about other texts (not only literature, but memes, videos, blogs, games, and advertising) that circulate in our own cultural moment and their crucial relationship to identity and social change.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1176/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1185 Power & Beauty In-Between: Armenia": "<p><strong>How can one small, remote country change the way we think about the culture of the world?</strong></p><p>Being wedged between superpowers might seem like a recipe for ethnic assimilation and cultural conformity. Yet what if it made you stronger? In the case of Armenia, being “in-between” led to a vibrant, diverse, and resilient culture, a distinctive religious and national identity, and a dynamic diaspora. Travelling from antiquity to modernity, we will explore how Armenia and Armenians survived and thrived despite invasion, oppression, statelessness, and planned annihilation. We will explore the connections between Armenian culture and diverse traditions, including classical antiquity, the Ancient Near East, Sasanian and Islamic Iran, and the Byzantine empire, East Asia, and Europe, and the relations between Armenia and neighboring cultures of the Caucasus. We will follow the Armenian experience into the early modern period, when Armenians established a trade network reaching from the Indian subcontinent to Amsterdam, absorbing and informing a kaleidoscope of cultures along the way. We will wrap up with the survival of Armenian traditions in contemporary culture, the role of the Armenian genocide in shaping Armenian identity, including in neighboring Watertown. Finally, we will discuss the meaning of cultural heritage for Armenians today, and explore its role at the intersection of politics, diplomacy, law, scholarship, human rights, and activism.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1185/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1196 Tradition in Everyday Life": "<p><strong>How do groups express themselves creatively in everyday life, and how do these group expressions reflect our individual experiences of the world?</strong></p><p>What does a jar of homemade pickles have in common with the boisterous chants of the Harvard-Yale game? Both are artful expressions of communal, traditional culture in everyday life! Beyond the walls of museum galleries, creative expression exists all around us in surprising<br>forms, shaped through individual and communal creation. In this course, you will learn to recognize and evaluate diverse expressions of traditional culture, from Harvard Lore to annual family traditions, to community festivals, to social media culture. Course readings introduce you<br>to a variety of traditional texts (forms of expressive traditional culture); contexts (the sites and occasions where traditional expressive culture is performed); and textures (aesthetics, or the culturally informed, group-based parameters that shape traditional culture). You will complete<br>small collection projects to look for and describe expressive traditions, and these exercises will culminate in your own capstone ethnographic project in which you document, analyze, and creatively present an expressive tradition of your choice. The course prepares you to see artful<br>expressivity in everyday life, rethinking the universality of concepts often attached to creative expression such as ‘beauty,’ ‘art,’ ‘individual genius,’ ‘progress,’ ‘ownership,’ ‘expertise,’ ‘agency,’ and even time itself.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1196/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1199 Learning & Unlearning": "<p><strong>How do we learn and why?</strong></p><p>From birth, we embark on a lifelong journey of learning that shapes nearly everything we know and do, and ultimately who we become. Yet, we often fail to examine the implicit assumptions and approaches underlying our learning. In addition, we often overlook the importance of unlearning – the process of letting go of inaccurate information, misguided beliefs, harmful biases, limiting mindsets, and unproductive habits to make room for new learning. Unlearning has always been essential for replacing outdated and simplistic ideas with updated and sophisticated ones. Today, it has become even more critical due to contemporary challenges such as societal polarization and media echo chambers, the impact of generative AI and other technologies on traditional practices, the necessity for challenging the status quo to envision a more just society, and the urgent need for dialogue, understanding, and empathy in an increasingly tribalistic world.</p><p>Intentionally examining the purposes and processes of learning and unlearning will help us become more effective (un)learners, and ultimately, illuminate how these processes can foster human flourishing in our current world and for future generations.</p><p>In this course, we will engage with fundamental questions and debates, including:</p><p>What does it mean to learn and unlearn? How do individuals prioritize the diverse purposes of learning, such as cultivating intellect, developing moral values, fostering personal growth, preparing for citizenship, and beyond? How do our experiences and cultural contexts influence our understanding of learning? How do we learn, and why do we learn in the ways that we do? When do we feel motivated or demotivated? How do schools nurture or stifle children’s natural curiosity? Do students learn better through teachers’ instruction or independent exploration? How do we monitor, evaluate, and adjust our own learning processes? How might generative AI be used to support or hinder learning? How do we decide what is worth learning and what should be unlearned? Why do we struggle to change our minds and habits, and what strategies can effectively facilitate this transformation?</p><p>We will examine the cognitive, metacognitive or self-reflective, emotional, social, and moral dimensions of learning and unlearning. We will use a cross-cultural and interdisciplinary lens, analyzing cases from East Asian and Western cultures and draw insights from psychology, neuroscience, education, and philosophy.</p><p>Class sessions are highly interactive and emphasize active learning. Students will engage in a range of activities including lectures, discussions, debates, case studies, interviews, group teaching exercise, storytelling, guest speaker sessions, and reflections on both personal learning processes and the pedagogical design of this course.</p><p>This course welcomes all students to enroll and requires no prerequisites.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1199/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1201 Foundations of NeuroAI": "<p><i><strong>How is our understanding of the brain fundamentally changing with breakthroughs in</strong></i><strong> </strong><i><strong>artificial intelligence, and how can we use brain science to advance AI?</strong></i><strong></strong></p><p>The brain is among the most powerful and complex systems known, with neural network structure that enables intricate mental experiences and rich behaviors. Recent breakthroughs in artificial intelligence have led to computational systems with increasingly complex capacities, which provocatively utilize artificial neural networks and principles inspired from biology. With surprising translational breakthroughs between these fields, a new research area is emerging at this interdisciplinary intersection called “NeuroAI.” The premise and promise of this field is that insights from deep neural network models can help us understand the brain, and in reciprocally, insights from brain and cognitive science can help improve artificial intelligent systems. In this course you will learn the relevant foundational knowledge in both cognitive neuroscience and machine learning underlying these synergies, and gain an understanding of the major scientific advances and active frontiers. Coding-based problem sets, leveraging generative AI capacities, will give you hands-on experience of basic NeuroAI research. By illuminating the beautiful complexity of brains and simple powerful ideas of AI, this course aims to help you gain a deep understanding of the connections between natural and artificially intelligent systems, for the next wave of advance in this interdisciplinary frontier.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1201/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1207 Whose culture is it? Latin America": "<p><strong>Where should Latin America’s cultural patrimony be stored, displayed, and studied, to ensure both historical integrity and cultural significance? Who has the right to keep it? </strong></p><p>Who decides which cultural objects are kept, displayed, or returned to where they came from? Should we tear down monuments that no longer serve us? When an important writer or artist dies, who gets to keep his “stuff”? Should European Museums return indigenous artifacts to their countries of origin? Who owns these objects?</p><p>Latin America’s particular past makes it the perfect space to ask these questions. Having been a colony to multiple European powers for the better part of 400 hundred years, its independence in the 19th Century made it evident that there was no going back to a precolonial past, as their culture seemed intrinsically and inevitably linked to both the prehispanic and the European. And yet, this hasn’t stopped multiple presidents, ambassadors, intellectuals, artists, and academics from reclaiming their “rightful” ownership to everything that is not currently in their specific museums, archives, and institutions.</p><p>These inquiries are central to this course, which delves into a range of cultural objects, from indigenous headdresses to murals, from writer’s diaries to famous paintings, considered heritage of Latin America. We will embark on a conceptual and methodological journey, examining the complexities of preserving items for posterity and the intricate power dynamics inherent in the establishment of archival preservation spaces. Through this examination, students will gain a deeper insight into the politics of memory that shape our understanding of cultural identity in the present day.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1207/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GENED 1210 Ethics in the Age of AI": "<p><strong>How can we think our way through the ethical dilemmas posed by AI, chatbots and other new technologies? Will technology change what it means to be human?</strong></p><p>The course explores the moral and political implications of AI and other new technologies. Should predictive algorithms be used in hiring, lending, policing? Can a chatbot be a friend? Can AI help us find love? In an age of big data and social media, is privacy over? Is democracy? Does technology erode the distinction between actual and virtual human connection? Will technology change what it means to be human?</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GENED1210/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 72U #Adulting: Social Science Perspectives on the Transition to Adulthood": "<p>Debates about when adolescence ends and adulthood begins often lead to judgements about how long youth today are taking to reach adulthood and uncertainties about what it means to become an adult. The transition from adolescence to adulthood is often fraught with anxieties about realizing one’s dreams, getting into college, succeeding in the job market, and finding a life partner. Have the definitions and markers of adulthood changed across generations? Should these conceptualizations change or adapt to the times? Are young people today trapped in an extended adolescence?</p><p>Some experts and the popular press contend that young people today are coddled and more resistant to growing up than were those who came of age a generation or more ago. Conversely, other experts and many young adults today find that growing up is harder—harder to launch a career, burdened by student loan debt, harder to find a compatible life partner—in general, harder to achieve the life their parents have. Amid these debates, it is unclear what is meant by adulthood and whether it can or should be defined by the same markers as have been used in the past. Today’s young adults are charting their own path…or are they?</p><p>In this seminar, students will define and redefine adulthood based in multiple contexts, considering catalysts and impediments on the pathway to adulthood. Using a historical lens, we will examine and understand the contexts that elicit longer and shorter pathways to adulthood, including the role of the economic context, educational and occupational opportunities, gender, and the need to co-construct adulthood with others. Whereas societal factors are often considered contextual, this seminar focuses on societies as active agents in shaping adolescents’ beliefs about adulthood and struggling with and sometimes against adolescents as they navigate their place as adults. This seminar takes a global lens and focuses on the ways in which the transition to adulthood is a dynamic and co-constructed concept and will aid students in developing an integrative understanding on societal needs and pressures and young adults’ tools in navigating the path to adulthood.</p><p><strong>Note: This is a Radcliffe First-Year Seminar and will include optional co-curricular activities related to the seminar topic. The seminar will be held at the Radcliffe Institute, Knafel 104, 18 Mason St.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR72U/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 24G A Brief History of Surgery": "<p>The history of surgery begins with the Hippocratic physicians whose principles were based, at least partly, on observation and measurement. However, surgical thinking for first three quarters of the “modern era” was dominated by Galen of Pergamum who, “fooled by his monkeys,” established a school of thought as false as it was tightly held. The exposure of Galen’s errors by Vesalius in 1543 and Harvey in 1628 began a Medical Enlightenment.  It would take until the 19th century for the next era of discovery to begin. During this time, the pace and significance of medical discovery increase, yet adoption of good ideas, like antisepsis, seems to take much too long, while bad ideas find adherents in spite of poor or no supporting evidence.</p><p>Throughout this period, the ghost of Galen continues to haunt hospitals and battlefields. It will not be until the 1930’s that Galenism is banished from the wards. Our study will track this history and conclude with a consideration of the management of combat casualties from the time of the first “modern” surgeon, Ambrose Pare, to that of contemporary forward surgical teams in Afghanistan and Iraq. The seminar will consist of weekly discussion, informed by assigned reading and independent inquiry. We will visit the site of the first use of ether anesthesia, and duplicate William Harvey’s experiments in the anatomy lab. From time to time we will be joined by other doctors with expertise in specific areas such as infectious disease, combat surgery and anatomy.</p><p><strong>NOTE: The seminar will visit the site of the first use of ether anesthesia (the Ether Dome) and explore the human body in the anatomy lab at Harvard Medical School. We will admire rare first editions of the great works of surgical history at the Countway Medical Library. From time to time we will be joined by doctors with expertise in specific areas such as anesthesiology, combat surgery, and anatomy.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR24G/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 50Y A Sense of Space (and Time)": "<p>What is space?  What is time?  How have humans viewed these over the years?  How are the views of these shaped by our environments and cultures?  We often employ spatial metaphors for social situations, e.g. “they’re very close,” or “they split apart.” It seems that as concepts of space change, and our horizons are broadened, these changes are reflected in a shift in cultural awareness. Although we don’t think about it now, the question of how the sun gets back to the east after setting in the west created imaginative solutions for ancient cultures, including an underworld populated by the dead that the sun traverses.</p><p>Over time, a more mechanistic concept of the universe developed, but this also had culture projected on it, where astrology and astronomy were one. Dante Alighieri’s Divine Comedy represents a kind of pivot, where cosmology and morality were last intertwined, or perhaps not. With the development of the telescope, astronomers began to wonder about extraterrestrial life, which is now commonplace in modern culture. The developments of relativity, quantum mechanics, and the realization of the vast size of the universe dramatically changed our views of space and time, culminating in concepts like the many worlds view of quantum mechanics and the multiverse.</p><p><strong>NOTE: We'll have a visit to the Collection of Historical Scientific Instruments and lecture demonstrations, all in the Science Center. Time and weather permitting, we may do star gazing on the roof of the Science Center.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR50Y/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 73Y Abortion in Controversy": "<p>Today the law of abortion in America is more in flux than it has been for decades. Educated citizens should have opportunities to study the issue in detail and to decide what they think. This seminar is designed to help first-year students discuss, in an academic setting, the difficult, important, and controversial questions raised by abortion. These include questions of ethics, policy, and law; of human personhood and futures of value; of autonomy and equality; of politics and history; and of unenumerated rights and judicial power.</p><p>Many of these questions are both highly abstract and deeply personal. While they are the subject of intense and heartfelt commitment on both sides, this seminar is offered in the belief that they are also a proper subject for intellectual inquiry. Within each unit, the assigned readings are roughly balanced as to viewpoint: they take deeply conflicting positions, and each student will certainly disagree with some of them. Students are expected to participate fully in the discussions and to complete occasional short writing assignments in response to the readings.<br></p><p><br></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR73Y/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 58D Against Tech?": "<p>Do machines make life easier or more difficult? Do new technologies create jobs or destroy them? Do we lose a part of our humanity when we interact with machines, or do machines help us to understand what it means to be human? What relation—if any—do technological improvements have with economic, political, and moral improvements? These questions occupy many of us living in contemporary America. They are also questions with long histories. We are not alone.</p><p>In this first-year seminar, we will explore different ways people have raised fears and expressed anxieties over technology. The seminar will not take a stance on whether technology is good or bad. Rather, we will investigate how different people across history have confronted technology and questioned its value.</p><p>The seminar will encourage students to see themselves as a part of a long history of both excitement and worry over machines and technological life. Along the way, we will explore how people affiliated with Harvard—from Henry David Thoreau to Jacob Bigelow to James Bryant Conant to Lawrence Summers—struggled with machines, technology, and the society around them.</p><p><strong>NOTE: There will be a class trip to Walden Pond, Concord MA with no cost for the student.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR58D/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 23Y All Physics in 13 Days": "<p>Some claim that there are 13 ideas or principles that can form the bedrock for a pretty good understanding of our physical and technological world. These are: 1) Boltzmann factor and thermal equilibrium, 2) Turbulence, 3) Reaction rates, 4) Indistinguishable particles, 5) Quantum waves, 6) Linearity, 7) Entropy and information, 8) Discharges and ionization, 9) Relativity, 10) Nuclear binding energies, 11) Photon modes, 12) Diffraction, and 13) Resonance. Each week we will discuss one of these principles and see how they explain certain things about the physical world. We will discuss these and connections with other principles, as well as how the principles show up in technology and, more broadly, in our technological society.</p><p><strong>NOTE: This seminar will meet Mondays, 6:30pm-8:30pm.</strong></p><p><strong>NOTE - Prerequisite: This seminar is restricted to students that very likely will major in physics or chem/physics. In their application, students should provide their planned courses for the fall semester. This seminar will treat several key principles with the expectation that students will encounter them in a more extensive and formal way in an advanced physics course. Topics may change.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR23Y/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 71G Americans at Work in the Age of Robots and Artificial Intelligence": "<p>Where will the coming generation of Americans (say, today’s 18-year-olds) find jobs? And will the jobs be worth having? People have worried about losing their jobs to technology at least since the Luddites 200 years ago. In the aggregate, they have been wrong. The automobile put lots of stable boys and saddle makers out of work, but it created vastly more jobs making cars, fueling them, and repairing them, and it opened the way for whole new industries like roadside motels and restaurants. With robots increasingly performing the tasks once done by blue-collar labor, however, and computers and artificial intelligence now eliminating the need for many workers once thought to be immune because of their cognitive skills, today’s technological threat seems different.</p><p>It is no longer just the unskilled and undereducated whose jobs are at risk. Moreover, the challenge may be especially acute in America, where wages are far higher than in many other countries and an ever-greater share of what we consume and invest not only can be provided from overseas but often is. Does the next generation of Americans, then, face a genuine threat from advancing workplace technology? If so, what are the dangers – not just economic, but social, political, even moral – to the country as a whole? Most importantly, what can we do about it?</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR71G/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 23R Asteroids and Comets": "<p>Comets have been seen regularly since before the beginning of recorded history. They have often been regarded as disturbing portents. Asteroids, on the other hand, were not discovered until the 19th century, with the advent of astronomy with telescopes. Today we know of many more asteroids than comets, but we believe that there are vastly more comets than asteroids in the solar system. This seminar will start with the history of the study of comets and asteroids, including the “Great March Comet of 1843”, observations of which led to the establishment of the Harvard College Observatory and its Great Refractor, at that time the largest telescope in the Americas.</p><p>Our understanding of comets advanced dramatically in 1950 with the publication of two extraordinary papers: Whipple (then at Harvard) described the mixture of dust and ice that comprises the nuclei of comets, and Oort (Leiden University) showed that new comets enter the inner solar system from a vast, diffuse cloud surrounding the planetary system. Modern telescopes and spacecraft encounters provide us today with a wealth of information about comets and asteroids.</p><p>We will examine these observations and learn what is known and what is inferred about the origin and structure of asteroids and comets. Students will observe with the Astronomy Laboratory’s Clay Telescope on the roof of the Science Center. Students will take on projects, which may involve their own observing program, or which exploit existing data.</p><p><strong>NOTE - Prerequisite:  AP calculus or equivalent.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR23R/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 68N Authentic Life 1A": "<p>What is an authentic life? This seminar engages some of the most fundamental questions of human existence dialogically with selected ancient texts and the literary works of 19th and 20th-century authors often associated with the movement called “existentialism.” The seminar centers on unhurried reading, the sharing of diverse interpretations of seminar materials, and thoughtful conversations with peers about how to live an authentic life and encourage meaningful relationships. The seminar begins with careful reading of several works foundational to the arts and humanities: the early Socratic dialogues, The Books of Genesis and Job from the Hebrew Bible, and selected letters and gospels from the New Testament.</p><p>These texts are integral to modern responses to questions about how one finds meaning given current and complex challenges to claims about the nature of God, revelation, and the soul. Is religious faith compatible with an understanding of historicity, the rise of science, and the threat of nihilism? With a life of integrity, authenticity, and freedom? The texts and writing assignments in the seminar consider categories central to moral and religious discourse about how one ought to live. Authors including Kierkegaard, Thoreau, de Beauvoir, Tolstoy, Dostoevsky, and Buber insist that the most profound questions are not abstract but rather engage life lived day to day.</p><p><strong>NOTE: No background in religious traditions nor any faith stance is necessary or expected. The seminar includes a required trip to historic Walden Pond in Concord, Massachusetts, for a silent walk under the beauty of a New England autumn, following a reading of Henry David Thoreau's writings. All trip costs are covered by the First Year Seminar Program!</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR68N/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 32R Autobiography and Black Freedom Struggles": "<p>This seminar introduces the main traditions of African American political thought and the history of the black fight for justice through the genre of autobiography. Students will read some classic autobiographies by African Americans (for example, those by Frederick Douglass, Booker T. Washington, and Malcolm X), along with some lesser-known works (for instance, autobiographies by Ida B. Wells, Shirley Chisholm, and Amiri Baraka).</p><p>Students will discover how an influential set of black individuals, both men and women, came to political consciousness and participated in the collective struggle for justice in America. Students will reflect on these figures’ personal struggles to find meaning and solace under unjust conditions and to forge dignified modes of resistance.</p><p>The seminar provides an opportunity to see how these personalities interpreted key events and periods in U.S. history—slavery, the Civil War, Reconstruction, the Jim Crow era, the two World Wars, the Great Depression, the Civil Rights Movement, and the post-industrial urban crisis—as social actors who participated and lived through them.</p><p>Close attention will be paid to their engagement with and contributions to the political traditions of liberalism, conservatism, socialism, black nationalism, and feminism. And students will critically examine how these influential thinkers and activists understood ideals like freedom, equality, democracy, fairness, and tolerance.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR32R/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 68M Avoiding Failure?": "<p>Avoiding failure? Where will your own life be if you avoid failure? What allows us to overcome and benefit from the inevitable failures in creative endeavors? Why is failure so critical for innovations and creative achievement—for individuals and societies? The seminar charts the biography of an idea about the improbable foundations of creative undertakings. There is ample literature to suggest that our most iconic creative endeavors are not purely achievements, but conversions, corrections after failed attempts that required grappling with tensions. But when is this true? Doesn’t success beget success?</p><p>This seminar will let students explore the gift of failure for the riddle it is—like number zero, both a void and the start of infinite possibility. By the end of the seminar, students will gain an understanding of the nature of creativity and innovation and have a clear sense of where failure is helpful in these endeavors. This seminar will feature guest lectures from artists, athletes, and entrepreneurs, and feature creative projects as assignments to explore these ideas.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR68M/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 38T Beethoven’s String Quartets": "<p>Since the late eighteenth century, composers have often reserved their most ambitious and complex thoughts for their string quartets. The ensemble of two violins, viola and cello can create a homogeneous sound but also has an enormous potential for sonic variety. Beethoven's sixteen quartets span almost his entire creative output, ranging from the classical Six Quartets, Op. 18 of 1800, to the transcendent, pioneering late quartets, the last completed in 1826, the year before his death in 1827. These works contain the full range of Beethoven's musical expression.</p><p>The seminar will work from scores, selected recordings, and live performances connected to the Parker Quartet's Harvard residency. Seminar members will play excerpts from the quartets in class. Everyone shall prepare individual projects. We will also go on a field trip to hear a professional string quartet. Although the primary focus will be on the participants' interpretations of the works, the seminar will also read and discuss texts by Lewis Lockwood, Joseph Kerman, Robert Winter, and others. Our goals are to get to know one of the great collections of works in Western music; to improve listening and score-reading skills; to learn to talk about and write about music.</p><p><strong>NOTE: Recommended Preparation - Participants should be able to read music (at least treble and bass clef).</strong></p><p><strong>NOTE: The seminar includes required attendance at one live performance outside of the regular class time.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR38T/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 50U Bio-Inspiration and Innovation": "<p>In the course of evolution, nature has developed strategies that endow biological processes and materials with exquisite selectivity, specificity, and adaptability to a constantly changing environment. Learning from and mastering nature's concepts not only satisfies humankind's insatiable curiosity for understanding the world around us but also promises to drive a paradigm shift in modern materials, science, and technology.</p><p>This seminar will explore some of the basic principles of biological architectures and the economy with which biology solves complex problems in the design of novel materials. It will give us a taste of how the inspiration from nature teaches us to break barriers in technology and disruptively innovate. Often nature’s solutions to engineering problems are so different from our conventional ways of thinking that the most fruitful way to investigate them is not immediately obv
