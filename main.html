ious.</p><p>We will therefore be engaged in a continuous dialogue: we study the biological material itself to begin to understand its underlying principles, adapt these concepts to design a bio-inspired architecture, and then apply insights from the designed system to guide further investigation of the biological system. The goal is to use biological principles as guidance in developing new, bio-inspired materials and devices, with broad implications in fields ranging from architecture to energy efficiency to medicine.</p><p><strong>NOTE - Prerequisite: Background and interest to study natural sciences is required.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR50U/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 21V Black Holes, String Theory and the Fundamental Laws of Nature": "<p>The quest to understand the fundamental laws of nature has been ongoing for centuries. This seminar will assess the current status of this quest. In the first five weeks, we will cover the basic pillars of our understanding: Einstein’s theory of general relativity, quantum mechanics and the Standard Model of particle physics. We will then examine the inadequacies and inconsistencies in our current picture, including, for example, the problem of quantum gravity, the lack of a unified theory of forces, Dirac’s large numbers problem, the cosmological constant problem, Hawking’s black hole information paradox, and the absence of a theory for the origin of the universe.</p><p>Attempts to address these issues and move beyond our current understanding involve a network of intertwined investigations in string theory, M theory, inflation and non-abelian gauge theories and have drawn inspiration from the study and observation of black holes, gravitational waves and developments in modern mathematics. These forays beyond the edge of our current knowledge will be reviewed and assessed.</p><p><strong>NOTE: No prerequisites except curiosity, all majors welcome. The seminar is discussion oriented with occasional class dinners, guest speakers and movies.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR21V/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 62Z Buddhist Enlightenment: Visions, Words, and Praxis": "<p>How do you get enlightened? Is the Buddha a god or human? How many Buddhas are there in the world? How many celebrated enlightened women do we find in Buddhism? How do you know if someone is enlightened? And why does enlightenment matter? These are basic questions that even most recondite books of Buddhism often fail to answer.</p><p>This seminar looks at famous visual images of Buddhist enlightenment – not only iconographies of Buddhist divinities, but also architecture, gardens, ritual instruments, and maps of the world – and using them as our gateways to study narratives, parables, metaphors, and theories that explain what enlightenment is, how to attain enlightenment, and how to retain it in one’s everyday life.</p><p>The seminar encourages students to apply their understanding of Buddhist enlightenment as a way to better appreciate their own religious traditions and/or spiritual identities for the sake of enriching their inner selves as well as their social interactions.</p><p><strong>NOTE: There will be two class tours built into the seminar. One is to visit Harvard’s Digital Buddhist Art Museum (</strong><a href=\" https://camlab.fas.harvard.edu \"><strong>CAMLab</strong></a><strong>) which is hosting this fall a new exhibition on the Buddhist enlightenment as it is expressed in various Asian Buddhist art. The other will be a trip to Harvard’s hidden treasure, the authentic Japanese tearoom at 5 Bryant Street where we try Zen and Esoteric Buddhist meditations with correct breathing and visualization techniques - on the tatami mat and in the muted light filtered through the shoji screens. Dates of the two outings are TBA. They will be indicated on the syllabus, which will be published by the end of June. There is no cost to students. </strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR62Z/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 68J Can You Change the World (in Twelve Poems)?": "<p><i>Poets are the unacknowledged legislators of the world.</i></p><p>Percy Bysshe Shelley</p><p>Can a poem change the world? And can you write that poem? And can you write twelve poems? And should you take this class? To write a poem is to be human. To write twelve is to be divine. Can you be divine? Let’s find out, this semester, by writing twelve poems. In this seminar we will write one original poem per week. There are about twelve weeks in a semester. Therefore, we will write twelve poems.</p><p>In this seminar we will also read a number of published poems that will help us in our quest to write twelve poems. In each class we will read published poems in order to figure out—voice, line, image, music, idea, structure, discovery, invention, etc—what makes a good poem. In each class we will also read and talk about each other’s work. You need not have written a poem before taking this seminar. You need not be good at writing poems before taking this class.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR68J/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 61F Cartoons, Folklore, and Mythology": "<p>The creators of cinematic (and later TV) animation have perennially turned to traditional oral and literary tales about fantastic heroes, villains, tricksters, and settings for their story material. In the world of the animated “short” and feature-length film, myths, epics, legends, and folktales could come to life in a highly stylized, kinetic, and visually arresting way. Cartooning created a pathway for traditional stories to live on in the consciousness of twentieth-century viewers, and also for these old tales to be adapted to changing times. Hence, animation offers not only an influential modern commentary on the folklore and mythology of the past, but also a contemporary mythology of its own, deeply meaningful to adults and children alike.</p><p>In this first-year seminar, students are invited to take what might be considered mere entertainment very seriously, closely reading texts of traditional stories in tandem with critically viewing animation that draws its inspiration from those stories. For a final assignment, each student will be called upon to choose some animation (a short or a clip from a feature-length film) to share with the rest of the seminar, to provide some background for it, and to lead a discussion of the animation in light of what else we will have seen, learned, and said.  While the instructor’s contribution to the seminar will primarily focus on animation from 1900 to 1960, students, when choosing which sample of animation to share will be welcome to present later or contemporary examples of the cartooning art—including perhaps even their own.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR61F/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 54M Consciousness and the Universe": "<p>What is consciousness, and why does it exist at all? Could your subjective experience be as fundamental to the universe as space, time, and energy? And if so, how would we even begin to test that idea?</p><p>In this seminar, we’ll engage directly with big, unresolved questions while learning how to identify and challenge assumptions in order to think at and beyond the boundaries of what is currently known. Rather than working through settled material, you’ll step into an active exploratory landscape where your own experiences and perspectives are essential. We will begin by asking what consciousness is and why it has resisted explanation within traditional scientific frameworks, a challenge referred to as the “Hard Problem of Consciousness.”</p><p>From there, we will investigate how this problem intersects with modern astrophysics and cosmology, opening the possibility that understanding consciousness may reshape how we think about the universe as a whole, including our place in it. Along the way, we will examine the philosophical foundations of science, the limits of objective measurement, and the tension between models of reality and lived experience. By the end of the seminar, you will not only understand the current landscape of ideas, but also develop your own exploratory tool set for one of the deepest mysteries in science.</p><p><strong>NOTE: The seminar welcomes students who are curious and open to learning new things. It is not restricted to students who have a strong scientific or mathematics background.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR54M/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 72P Corporate Power & Human Rights—Community Resistance and Social Movements": "<p>How do the seemingly most marginalized take on the most powerful corporations in the world and win? In this seminar, we will delve into this question and what drives community resistance and social movements in the face of frequently daunting odds. We will zero in on community resistance in its many forms when confronting abusive corporations and authoritarian governments often supporting them.</p><p>Through case studies involving natural gas in Myanmar, gold mining in Papua New Guinea, and chocolate in West Africa, we will discuss both the harms communities experience and how communities can have a seat at the table to demand their rights and take on oppressive systems. We will also look at how North America is implicated in these cases and consider the power dynamics between communities, advocates, businesses, and states that span borders and different cultures. We will also look at ways that communities can build their own power through the solidarity economy and how advocates cannot only combat economic injustice but build their visions of economic justice for the future.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR72P/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 68P Cosmic Art": "<p>How can art be cosmic, and how to turn the cosmos into art? Long before the modern space age, human beings were launching themselves into the stars through art. The seminar explores how human creative expression has historically integrated with the vast, transcendental, and often invisible forces of the universe. You will traverse the boundary between the material and the spiritual, exploring how art serves as a vessel for navigating the cosmos, and how the universe acts as an endless source of artistic and philosophical inspiration.</p><p>We experience out-of-body flights and cosmic roaming with the First Emperor’s Terracotta Army and through Buddhist caves. We will study the metaphysics of the ancient Indian “Cosmic Dance” alongside modern space exploration as a spiritual and technological quest, examining the legacies of Russian Cosmism and American Astrofuturism. We will analyze how modern designers and “cosmic-eco-artisans” use geometry and complexity to visualize cosmic harmony and imagine new planetary realities.</p><p>Whether you are interested in Buddhist cosmology, the philosophical evolution of space exploration, or the intersection of art, architecture, and cosmology, this seminar will fundamentally transform how you view humanity’s place in the total universe. Join us to discover how the art of the past holds the blueprints for the universes of tomorrow.</p><p><strong>NOTE: The seminar will integrate visits to visits to labs (CAMLab, etc.), class sessions in Harvard Art Museums, and the Harvard College Observatory.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR68P/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 68D Crafting Stories: Texts & Textiles": "<p>How do you weave a story? Remember someone through a quilt? Encode knowledge in knots? Write code on a loom?</p><p>Weaving and writing may seem like separate practices—one made of thread, the other of words—yet both are ways of creating and sharing meaning. This seminar invites you to explore how texts and textiles communicate beyond traditional language through texture, pattern, rhythm, and sensation. We begin in Greek antiquity, where Penelope weaves and unweaves a shroud to control her fate and Philomela uses tapestry to tell the truth when she cannot speak. From there, we follow threads across cultures and centuries, from knotted record-keeping systems in the Andes to experimental textile art in Germany, and from woven poems to contemporary activist quilts in the United States. Working across media, we study—and practice—how stories are made, remade, and woven into the fabric of people’s lives.</p><p><strong>NOTE: The seminar involves visits to the Harvard Art Museums and introductory workshops on weaving where students build their own wooden hand loom and develop a weaving project. No prior experience in textile work is required.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR68D/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 66D Detention, Deportation, and Due Process: A Look at the Inner Workings of the U.S. Immigration System": "<p><i><strong>Detention, Deportation, and Due Process: A Look at the Innerworkings of the U.S. Immigration System and How it Can be Changed</strong></i></p><p>The public discourse on immigration is widespread and divisive. If you ever wanted to know more about how our immigration system operates, its faults, and potential ways to fix it, then this seminar is for you. The goal of the seminar is to teach students in an interactive and welcoming environment the basic aspects of U.S. immigration policy, the role of lawyers in immigration advocacy spaces, and how to develop creative advocacy strategies to advance immigrants’ rights. The seminar will leverage the experience and expertise of faculty members with the Harvard Immigration and Refugee Clinical Program (“HIRCP”) to explore the multitude of ways immigration policies can be challenged and reshaped in Congress, the courts, and the public discourse.</p><p>We will address major themes and controversies in immigration and refugee law and policy advocacy, including: the origins and evolution of U.S. immigration law; the basis for refugee protection in the United States; the role of Congress, courts, and administrative agencies; cutting-edge issues in U.S. asylum law, including issues related to gender-based claims, credibility &amp; corroboration, expanding bars to asylum; current challenges at the U.S.-Mexico border; the criminalization of immigrants; and the U.S. detention regime.</p><p>This seminar is designed to create a welcoming and dynamic environment in which we can collectively interrogate how different modes of advocacy—from litigation and community organizing to media advocacy and direct representation—can move immigration law forward. The seminar will include simulations and other interactive classroom modules and will feature guest lectures from community partners and advocates with whom HIRCP has worked on various advocacy projects. We welcome opposing viewpoints, respectful discourse, and aim to create a space where differing perspectives can be explored.</p><p><strong>NOTE: Please note that the seminar will meet Thursday, 9:30am-11:30am.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR66D/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 30G Digging Egypt’s Past: Harvard and Egyptian Archaeology": "<p>Mysterious pyramids, colossal royal statues, tiny gold jewelry, decorated tomb chapels, temples, settlements, fortresses, and hieroglyphic inscriptions. This was the excavation legacy in Egypt and Sudan of the Harvard University–Boston Museum of Fine Arts (MFA) Expedition. Led by Egyptologist George Reisner (1867–1942), this expedition revolutionized archaeological method, and put Harvard Egyptology on the world stage, all during British control of the Egyptian government, French control of Egyptian antiquities, and Egyptian yearning for independence. This seminar explores 20th century and modern archaeology and Egyptology, racism and decolonization in cultural heritage, Harvard and MFA history, museology and artifact repatriation. Students will access unpublished archival documents at Harvard and elsewhere, and will research important expedition sites, staff members and momentous discoveries.</p><p><strong>NOTE: Circumstances permitting, field trips to the Peabody Museum, the MFA, Harvard’s Visualization Center (Giza Pyramids in 3D), and the Harvard Museum of the Ancient Near East, will bring the HU–MFA Expedition to life. Budgets permitting, our Museum of Fine Arts, Boston, the seminar will end with a gala dinner in the Museum's restaurant.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR30G/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 71R Dilemmas in the World’s Economy": "<p>Standards of living vary greatly across countries, they rise fast in some and slowly in others. Economic growth has historically been related to the expansion of international commerce as well as industrialization and institutional reforms. How does a country’s well-being and growth depend on its trade partners? Is globalization in the form of international integration desirable? Do all income classes benefit from globalization? What role do trade policies play in shaping the benefits and costs of globalization?</p><p>We will discuss the historical evidence on economic growth, the expansion of commerce, and the evolution of trade policies. We will also discuss the nature of these processes and the interdependence between them. Using this knowledge, we shall discuss the pros and cons of globalization and the tradeoffs faced by policy makers. These tradeoffs will be illustrated with contemporary policy debates concerning tariffs and free trade agreements. Finally, we will discuss the impact of globalization on inequality within countries and in the world economy.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR71R/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 23I Earth Science Goes to the Movies: Math and Physics of Natural (?) Disasters": "<p>Natural disasters such as earthquakes, tsunamis, tornadoes, hurricanes, and volcanic eruptions can have devastating effects on society, but are often over-exaggerated for the silver screen. How can we tell what is believable and what is not?</p><p>Students in this seminar will watch one Earth-science related movie each week, learn background about the science behind the natural disasters portrayed on film, and then apply math and physics concepts and equations to develop \"back-of-the-envelope\" calculations that assess realism. The movies will be complemented with Role-Playing Games to gain insight into the complexities of mitigating natural disasters. Students will be exposed to a wide variety of Earth-science topics and should walk away not only with the ability to point out flaws on-screen, but also the ability to explain natural phenomena in the world around them.</p><p><strong>NOTE: Prerequisites - Students must be comfortable with high-school level math and science.</strong></p><p><strong>NOTE: Post-Seminar Module - The Seminar includes a component designed to prepare students for research participation, culminating in a mandatory not-for-credit J-term module. The module will run from Monday January 4th to Friday January 22nd, and will be at no cost to the students. During this module, students will engage in paid research activities within the Department of Earth Planetary Sciences and learn research skills through mini-workshops. Please visit the seminar's Canvas Site for further details on the J-Term component of this Seminar.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR23I/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 68H Examine Everything: Socrates and the Liberal Arts": "<p>At Harvard you will be freer to do what you want than perhaps at any other time of your life. To what, then, will you be most committed? Your extracurriculars or your coursework? Your friends or your GPA? Your job prospects or your political convictions? It is the purpose of the liberal arts to equip you to direct the course of your own life. This first-year seminar addresses your new freedom and offers the opportunity to re-examine your commitments, through an inquiry into the life and philosophy of Socrates.</p><p>Though feeling that he knew nothing, Socrates showed a resolute commitment to his life of inquiring after virtue, even at the cost of imprisonment and the death penalty. Was that the right choice? When should we be resolute, and when should we adapt to our circumstances? How do we live with doubt while still acting on our commitments? You will develop your own responses to these questions through ancient history and the history of philosophy, through field trips outside of the classroom, and through artistic imaginings of Socrates and of the liberal arts.</p><p>In defense of his life of inquiry, Socrates said that “an unexamined life cannot be lived.” We simply can’t help but question our commitments, even if we needn’t settle on our answers in order to act.</p><p><strong>NOTE: Beyond the seminar’s regular format of discussion and student presentations, learning opportunities include a visit to the Harvard Art Museum, a field trip to the Harvard Ceramics Studio to interview a working artist, a political constitution simulation in collaboration with the Safra Center for Ethics, and a celebratory end of term dinner. There will be no cost to students.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR68H/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 71X Fat Talk and Thin Ideals: Culture, Social Norms and Weight": "<p>In 1995, the Fiji Islands were one of the last places on the planet to receive broadcast television. Within just three years, body weight ideals had transformed from large to thin and purging had become as common in Fijian high school girls as in their Massachusetts counterparts. How can we understand what happened in Fiji? And, likewise, how did heaviness in the U.S. migrate from signifying prestige to stigmatizing?</p><p>In this seminar, we will examine the bio-social dimensions of disordered eating and being overweight as well as the volatility of weight ideals and their enduring moral salience. We will draw from anthropological and clinical perspectives to explore the rapidly shifting landscape of body shape ideals in the U.S. over the last century, the arrival of eating disorders in the Global South, the medicalization of obesity, and the emergence of pervasive weight stigma—as manifest in ‘fat shaming’ and even in policy interventions that have had unintended consequences. We will ask what the social structural determinants of obesity are, as well as how social adversities relating to the built environment, toxic food environment, climate change, and food deserts are embodied.</p><p>We will examine variation in how the body is cultivated for self-presentation across diverse cultural contexts alongside evidence that the media have accelerated the globalization of thin ideals. We will conclude by considering both emerging threats inherent to pervasive social media platforms and digital photoshopping as well as potential opportunities to reset social norms through social movements and policy.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR71X/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 25N Finding Connections: Perspectives on Psychological Development and Mental Illness": "<p>The seminar's goal is to deepen our understanding of human development and how individuals cope with serious emotional or social difficulties (neglect, bipolar disorder, autism, depression, schizophrenia). We will use multiple perspectives: medical observations and texts that provide practical knowledge (e.g., medical journal articles), narrative readings to understand how patients experience the meaning of illness from the inside out (e.g. The Center Cannot Hold), visitors who will discuss their experience with mental illness, and media articles that portray mental illness (e.g. New Yorker's articles).</p><p>We will start with babies and how scientists interpret infants - nonverbal ways of finding safety and security. Our journey continues via exploring mental illness through the lens of humans' fundamental needs for connection and making meaning. Understanding how conditions such as autism, depression, and schizophrenia are described in clinical research and literature will help us to appreciate the biological vulnerabilities and relational patterns that may disrupt the human connection. We will examine the resourcefulness required for remaining resilient when challenged. Throughout the seminar, the instructor, as a practicing child and adolescent psychiatrist, will bridge the gap between clinical applications and research findings.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR25N/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 58C Genuinely Hard Problems in Science": "<p>This seminar explores some of science's most significant unsolved challenges: Genuinely Hard Problems (GHPs) that have stumped researchers despite their best efforts. To solve these problems, technical execution is not enough—we need true conceptual breakthroughs. Examples include reconciling quantum mechanics with gravity or finding the biological mechanisms that cause mental illness.</p><p>A key part of the seminar is identifying a GHP that deeply interests you. Each week will feature Harvard faculty whose research is related to these GHPs. Maybe it's the origin of life, dark matter and the structure of the universe, or cracking the code of human aging. They will make a pitch to serve as your academic mentor, and together, you'll plan an undergraduate curriculum focused on building the skills and knowledge you'd need to tackle your chosen GHP. You'll also study historical cases where seemingly impossible problems were solved, often by young researchers with fresh perspectives.</p><p>By the end of the seminar, you'll have a clearer picture of the scientific landscape and where you might fit into it. We hope that some of you will embark on a tailored academic journey here at Harvard, aimed at equipping you to address some of science's most profound mysteries. No prior scientific expertise is required—just deep curiosity, openness to failure, and willingness to grapple with big ideas.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR58C/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 71M Global Capitalism: Past, Present, Future": "<p>Few forces have shaped the world over the past millennium more than capitalism has, yet few terms remain more elusive and more divisive. Today, less than half of young Americans view capitalism positively, and calls for alternatives are becoming ever more frequent. Why? And why have different forms of capitalism led to such unequal outcomes around the world? What is capitalism, really; what has it been, and what might it be? This seminar takes students on a journey to explore the past, present, and future of various forms of capitalisms, globally and beyond, introducing them to theories and frameworks to help make sense of the world in which they live, and where it might be headed.</p><p>This seminar introduces students to the Socratic teaching method used in the Harvard Business School and is based on case studies covering the vast epic of capitalism. In addition to discussing the past, present, and future of global capitalism, the seminar will familiarize students with basic concepts of macroeconomics as well as tools, such as balance of payments analysis and national economic accounting to prepare them for lives of active global citizenship.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR71M/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 27I Global Health: Comparative Analysis of Healthcare Delivery Systems": "<p>This interactive seminar will allow students to obtain greater understanding of challenges faced by US healthcare system through critical comparative analysis of healthcare systems of selected countries from the developed, emerging and developing world. Weekly sessions will be comprised of student-led discussion that revolves around an important healthcare issue. Domain expert guest speakers will be included allowing students to network with thought leaders. Students will explore, in-depth, a topic of their choice and prepare a manuscript potentially for publication in a peer-reviewed journal.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR27I/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 68L Harvard Through History": "<p>The Harvard of today was shaped by events from the past century, among them, the creation of the House system; the protests over the war in Viet Nam; and the efforts to diversify admissions. This seminar will explore those events by considering how they were reflected in historical documents—and refracted through novels and film.</p><p>Texts will include William Faulkner’s Absalom, Absalom! (1936), Erich Segal’s Love Story (1970), Zadie Smith’s On Beauty (2005), and Harvard Beats Yale 29-29 (2008), as well as speeches by Harvard presidents, memoirs by students and faculty, and whatever documents students uncover in the archives. This seminar will provide a rigorous training in narrative analysis and archival research, as well as an introduction to Harvard itself.</p><p><strong>NOTE: We will have a Harvard Archives tour and research session with librarian.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR68L/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 54D Healthy Data": "<p>Students in this seminar will learn about research in the health sciences through a quantitative lens. With an emphasis on how we evaluate who is at risk for disease, what are the underlying causes, and what treatments are most effective, we will take a deep dive into thinking about how data are generated and what we can (and cannot) discern from it. Concepts will be introduced in the context of case studies focused on infectious, neuro-degenerative, and cardio-metabolic diseases as well as cancer research. Emphasis will be on understanding medical and public health research studies. The seminar will emphasize discussions and students will reflect on seminar content through regular written assignments.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR54D/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 43W History, Nationalism, and the World: The Case of Korea": "<p>This seminar will explore the quandary that faces all historians: To what extent is the understanding of past episodes influenced by current politics and to what extent is current politics influenced by people’s understanding of the past? In the study of Korean history, this question is particularly sharp since the postcolonial division of Korea into North and South has thrust the memory of past events into current political discussions as well as scholarly debates.</p><p>The seminar will investigate selected events in Korean history to map the interaction between historical writing and politics: the origins of Korea; Korean territory and the Korean people; cultural contacts with China and Japan and indigenization; social and regional marginalization and discrimination; Confucian transformation of Chosŏn Korea and its legacy in contemporary Korean culture; the legacy of pre-World War II Japanese occupation; and the contending history of popular movements and religion. Why have some historians pictured Korea as a Japanese colony, a miniature replica of China, or a local variant of Chinese civilization?</p><p>Why have other historians emphasized certain periods and aspects of Korean history while ignoring others? How have historians described Korea’s relationships to China, Japan, and the rest of the world? Has the perception of Korea as a marginalized people and region influenced how its history has been described? Are there any connections between popular traditions and movements and this historical and scholarly discussion? Reading (all in English) will include translated primary documents as well as political and historical studies. Students are required to write five short critical essays in addition to weekly Web posting.</p><p><strong>NOTE: This seminar will meet Mondays, 3pm-5:30pm; All readings will be in English.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR43W/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 73Q How Wars End: The Role of Negotiation": "<p>This seminar will explore the role of negotiation in terminating wars. It is commonly thought that wars end after a decisive military battle produces a conclusive victory – one side surrenders and the other side emerges victorious. In fact, recent history suggests things are typically much more complicated: negotiations between the disputants commonly play a critical role in ending armed conflict. One only must consider Korea, Vietnam, Bosnia, Afghanistan, and Iraq.</p><p>This seminar will initially introduce students to some core ideas relating to negotiation and bargaining theory. Through readings, we will then explore how several wars in fact evolved. We will ask why did the war begin, and did the disputants first attempt to avoid armed conflict through negotiations? To what extent, if any, did negotiations between the combatants end the fighting?</p><p>We will see that while the expectations and aims of the combatants are typically deeply opposed at the beginning of a war, over time they often converge toward an agreement to stop fighting. In such cases, what produces this convergence? To what extent do factors far removed from the battlefield - economic, political, and social – contribute to the success of negotiations? In addition to readings, students will engage in a few negotiations related exercises and simulations in class.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR73Q/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 41K Human Rights, Law and Advocacy": "<p>Human rights practitioners confront numerous ethical, strategic, and legal dilemmas in their struggles for social justice. This first-year seminar explores the underlying legal frameworks in which human rights advocates operate and then use specific case studies to consider the various challenges they must grapple with in their work. The seminar is designed to encourage students to critically evaluate the human rights movement while offering an introduction to some of the essential tools and strategies used by human rights advocates, including advocacy, litigation, documentation, and report writing.</p><p>Students will consider tough questions, such as: How can human rights be harnessed to successfully influence and change behavior? What does responsible, effective human rights advocacy look like? How do we engage without perpetuating power differentials along geopolitical, class, race, gender, and other lines? How do we find ways to work in collaboration with directly affected communities? What does it mean to be a human rights advocate working on abuses affecting individuals and communities remote from yourself? How do you balance broader advocacy goals with the needs of individual survivors or clients? How do you determine when to intervene and devote limited resources to a given issue?</p><p>Finally, the seminar considers the limits of the human rights paradigm and established methodologies, such as litigation and “naming and shaming,” and explores alternative sources and forms of advocacy, including the role of community lawyering in the human rights context.</p><p><strong>NOTE: This seminar will meet Wednesdays, 12:30pm-2:30pm.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR41K/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 68F Imagine There’s No Religion": "<p>John Lennon of Beatles’ fame asks us to imagine a world with no religion in the lyrics of his widely acclaimed song written in 1971. He also asks us to imagine a world without nationalism and inequality. He admits he’s a dreamer, but what if we delve deeper into his dream? Is he correct to identify religion, nationalism, and inequality as the main sources of the world’s ills over the past century and are these components of human civilization made even worse when they intersect with one another in dangerous ways?</p><p>The aim of this seminar is to interrogate those ideas in four categories: religion and progress; religion and economics; religion and conflict; and religion and climate change. Key questions will include the relationship between religion and nationalism in global conflicts, and the 20th century attempts by states to enforce egalitarian policies, or what one historian has called ‘the pursuit of the egalitarian mirage.’ Are religious divisions at the heart of some of the world’s most intractable conflicts?</p><p>Closer to home in the United States, what do you understand from the term Christian nationalism and how big a threat is it to American democracy? As the world faces up to the challenges posed by global warming and ecological crises, are the world’s religions contributing to solutions or exacerbating problems? In short, if we imagine a world without religion, what difference would it make, for better or for worse?</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR68F/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 52Z Investigating Psychology, the Brain, and Behavior: Designing & Conducting Human Research Experiments": "<p>Does doomscrolling really worsen our attention? Can exercise make us more productive? Does junk food make us sleepy? We each have personal experiences that inform our hypotheses about human behavior, but to determine whether these hypotheses are correct, we must conduct a well-designed research experiment. In this seminar, we will take a hands-on approach to designing, testing, and interpreting results of research with humans. Students will have opportunities to scrutinize published studies, test hypotheses using existing data, and collect data using their own novel study designs.</p><p>Early in the semester, the seminar will take a trip to Dr. Arnett's laboratory to see a demonstration of how electroencephalography (EEG) is used to measure brain activity in children with neurodevelopmental disorders. Seminar assignments will include weekly readings, research projects, individual and group presentations, and short reports. Altogether, the goal of the seminar is for students to learn to think critically about scientific research, generate creative hypotheses about brain-behavior connections, learn to interpret research results, and work collaboratively with student peers.</p><p><strong>NOTE: There will be a required field trip to Boston Children's Hospital's Labs of Cognitive Neuroscience to see a demonstration of electroencephalography (EEG) research with children.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR52Z/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 66I Is Being Good Actually Good for the Body?": "<p>Did you know that kindness is good for your health? Did you know that happiness is contagious? Did you know that music lowers your cortisol levels? The science is in! This seminar will examine how the biology of prosocial behaviors shows how kindness and optimism improve overall well-being in profound and demonstrable ways. We will delve into a revolutionary approach to health, longevity, and quality of life and explain the scientific evidence that supports this work.</p><p>The seminar will investigate five fundamental values of prosocial behaviors — kindness, optimism, forgiveness, gratitude, and happiness — and collectively engage in six essential strategies for cultivating these values—relationships, nutrition, physical activity, meditation, music, and nature.</p><p>Along the way we will read the scientific data that reveals the impact such behavior has on biology, particularly on telomeres, the parts of DNA that serve as biomarkers of aging. While DNA is mostly immutable, telomeres are influenced by our choices. This seminar will discuss evidence that what is commonly ascribed to “spiritual” well-being has a clear and direct impact on physical health, helping to buffer premature aging and decrease the incidence of chronic disease.</p><p><strong>NOTE: This is a Radcliffe First-Year Seminar and will include optional co-curricular activities related to the seminar topic. The seminar will be held at the Radcliffe Institute, Fay House, Sheerr Room, 10 Garden St.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR66I/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 66P Jews in the Modern Middle East and North Africa, 1800-Present": "<p>Not so long ago, nearly every corner of the Middle East and North Africa was home to thriving Jewish communities who spoke dialects of Arabic, Persian, Spanish and other languages who professed their loyalty to Ottoman sultans, the beys of Tunis, or the sultans of Morocco; and who thought, dreamed, loved, and died according to the rhythms of Muslim-majority societies. Starting in the mid-twentieth century, Jews began leaving the Middle East and North Africa in increasingly large numbers—heading to the new state of Israel, Europe, or to North and South America. Today, very few Jews live in the region outside of Israel/Palestine, though the memory of their presence remains vibrant in many places.</p><p>The conflict in Israel/Palestine often casts more shade than light on the history of Jews from the Middle East and North Africa. Alongside the mass departure of Jews from this region, current politics can make enmity among Jews and Arabs (and/or Muslims) seem inevitable. This seminar encourages students to resist seeing the past through the lens of the present, and instead to consider how Jewish communities navigated the rapid pace of change in places where Jews had lived for centuries. Students will engage with an array of primary sources, from novels to popular music. Rather than focusing on “the conflict,” this seminar engages with a lesser-known dimension of both Jewish and Middle Eastern histories.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR66P/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 73Z Lasers in the Maya Jungle: Discovering Lost Cities in Mexico and Central America": "<p>Aerial born radar (LIDAR) technology has recently been deployed for discovering, mapping, dating, and assigning ethnic affiliations to major sites and cities heretofore unknown to scholars in the jungles of Mexico, Guatemala, and Honduras. This seminar allows students to explore first-hand the revolutionary advances in the study of the origins of American civilizations at the Olmec ceremonial centers (dated 1300-600 B.C.), and view hundreds of major new towns and cities just discovered in the Maya jungle (dating from 600 B.C.- 900 A.D.). LIDAR imagery from Professor Fash's well-known site of Copan and many others in Mexico and Guatemala will be analyzed by the students for evidence of hitherto unknown archaeological roads, ceremonial centers, towns, and cities. This technology has finally laid to rest the mistaken \"conclusion\" by earlier archaeologists that civilization and powerful cities \"could never have arisen first in the tropical forest.\"</p><p>Students will be discovering new features and sites with their own eyes, as we scrutinize and discuss the LIDAR imagery. That will include work in Harvard’s Visualization Laboratory where they’ll get a chance to visit what most visitors to the site of Copan will never see: the archaeological tunnels beneath the Acropolis dug by Professor Fash, through LIDAR videos made by Luke Hollis. They’ll also analyze objects from the ancient cities during the seminar sessions, from the priceless collections of the Peabody Museum in class and on display in the 3rd and 4th floor galleries. There will also be a 'field trip' to Harvard’s Dumbarton Oaks Research Library and Collection in Washington, D.C. to see some of the most beautiful works of Olmec and Maya art ever created. The new discoveries of both LIDAR and the decipherment of the Olmec and Maya writing systems make this a transformative time in this highly visible field that students can explore for themselves through a variety of means via this seminar.</p><p>This seminar will allow students to “learn by doing,” both with ceramics and other artifacts from the Peabody Museum’s collections that we will be working with in the Mesoamerican Laboratory with Dr. Jenny Carballo, and also with digital images on-screen of LIDAR imagery and videos and prints of selected 3D site maps. The familiarity students will gain with ceramics and artifacts will mean they will have a wonderful time viewing the priceless collections of Olmec and Maya artworks at Dumbarton Oaks Research Library and Collections in Washington, D.C., in October 2026.</p><p><strong>NOTE: This seminar includes a one-day trip to Dumbarton Oaks in Washington D.C. on October 16, 2026. </strong></p><p><strong>NOTE: Post-Seminar Module - Students who do well in the seminar will be invited to visit the beautiful Classic Maya site of Copan, Honduras January 15-22 (J Term), where I have been conducting research (including LIDAR) for many years now. There will be no cost to students.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR73Z/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 54I Letting Claude Cook": "<p>Can a team of AI agents design an experiment, write and run the code, interpret the results, and then decide what to do next—all on their own? This is no longer a thought experiment. In this seminar, we will explore what happens when we give AI systems genuine autonomy to do science. We begin by building a working understanding of how large language models function—not just what they produce, but why they produce it. Drawing on perspectives from both physics and the emerging field of mechanistic interpretability, we will look under the hood of these systems to develop intuitions for their capabilities and limitations.</p><p>From there, we move to hands-on work: first learning to collaborate with a single AI coding agent on scientific tasks, then designing and deploying multi-agent systems in which several AI agents coordinate to tackle a research problem with minimal human intervention. Students will work in cloud-based computing environments that allow AI agents substantial autonomy—writing code, running analyses, and iterating on results—while remaining safe and controlled.</p><p>Students will choose their own scientific questions to investigate, with the constraint that the work should center on problems where writing and executing code is essential. Projects will begin as individual explorations and evolve into team-based multi-agent efforts. The goal is not just to use AI as a tool, but to grapple with the deeper question of what it means for scientific discovery when the most tireless researcher in the lab is not human.</p><p><strong>NOTE: No prior programming experience is required, though students with coding backgrounds will find ample room to push further. What matters most is curiosity about how science works and willingness to experiment—with both ideas and machines.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR54I/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 52L Life and Death Lessons from the Fossil Record": "<p>The fossil record offers a unique perspective on the history of Life on Earth. Although paleontology might remind us of grotesque bones, dusty museum cabinets, and quirky scientists who relish both of those things—or God forbid, Ross Geller from Friends—the knowledge derived from the fossil record affects our daily lives in ways that are not immediately apparent. From its natural history origins during the 19th century, paleontology has become a cornerstone of neo-Darwinian evolutionary thought, produced a detailed log of climate change, and sits at the center of a multi-billion-dollar business consumed by millions of people around the world, most likely yourself included.</p><p>This seminar will explore the rich world of paleontology and its bearing on human activities. You will learn how cutting-edge scientific research informs our understanding of the main processes that have influenced the evolution of Life on Earth for approximately four billion years, including episodes of global warming/cooling and mass extinction events. You will also gain insights into the socioeconomic impact of fossils, ranging from the seamless integration of charismatic extinct animals into culture and entertainment, to ethical and political quandaries resulting from the unregulated exploitation of these natural resources in conflict zones.</p><p>Finally, we will explore how technological advances blur the lines between science fiction and reality, allowing us to visualize diminutive, fossilized animal-like embryos from 600 million years ago, to the potential (and controversial) applications of gene editing to resuscitate extinct species such as the woolly mammoth and Tasmanian tiger.</p><p><strong>NOTE: The seminar includes a fully funded paleontological day trip to Upstate New York and Western Massachusetts. Discover the geological history of the United States. Collect fossils from a Devonian reef, see evidence of ancient glaciers, and witness the official state fossil of Massachusetts.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR52L/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 31Q Literal Looking: What We See in Art": "<p>What do we really see when we look at a work of art? If we have little experience, we may not get far beyond discerning the theme and ascertaining whether the work is an accurate representation of reality (in the case of representational art); confronted with abstract art, seeing the work may result primarily in confusion or frustrated musing over what the point is. If we have \"too much experience” the seminar will address what \"too much experience\" might be and how literal looking relates to it - we may see the work as a function of historical, religious, aesthetic, mythological, and other concerns, or we may get caught in the web of a work's iconography. Either way, our too little or too great experience can prevent us from seeing what is there.</p><p>This seminar is an exercise in seeing what is actually there in a series of great works of art, in moving beyond too much mystification yet staying this side of too much sophistication, an exercise in evaluating composition and representation as they present themselves to the viewer directly and without context. We will spend most of our time looking and talking about what we think we see, what we actually see, and how it informs interpretation, but we will also read short texts where professionally encumbered lookers (i.e., experts) say what we should see, so that we can compare the two and explore the degree to which literal looking aids or is aided by contextually informed looking. Works by Raphael, Caravaggio, Bernini, Velazquez, Turner, Renoir, Sargent, Klimt, Kandinsky, Warhol, Richter.</p><p><strong>NOTE: The seminar meets in the Art Study Center of the Harvard Art Museums, where original works of art pertinent to those we are studying will be displayed in the seminar room for our examination and discussion.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR31Q/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 75C Living With Robots": "<p>The rapid growth of robotics and remote and automation technologies is reconfiguring the human machine relationship from industry to commerce, education, healthcare, public safety, security, and warfare. Machines’ extensive programmability and more-than-human physical and cognitive abilities have already altered our lives and, at times, threatened and, in some cases, replaced human competitors. What are the consequences of robots replacing humans? Who is more likely to be replaced, and are there jobs that robots should do instead of humans?</p><p>These are no longer questions only for the selected few; regardless of educational background and intended academic concentration, all students must reckon with the role of physical AI/robots in society—their promises and perils. Are robots as capable, autonomous, or dangerous as often depicted in the public imagination? Can robots save the world? If so, whose vision of the world do they actualize?</p><p>The seminar offers students opportunities to work closely with Boston Dynamics’ agile robot Spot and Unitree’s Go2 to learn “not to kick robots” and to imagine coexisting with them. The seminar’s readings, discussions, and in-class hands-on activities will push students to broaden their visions of potential uses and abuses of robots to “save the world” from our collective challenges of more frequent climate-induced disasters, international conflicts, public safety and security, and demographic shifts in the 21st century. This seminar welcomes first-year students interested in STEM, the social sciences, and/or the arts and humanities to think, feel, move, and interact with real robots while engaging in experimental, creative activities.</p><p><strong>NOTE: This seminar includes a visit to Boston Dynamics Headquarters in Waltham.</strong></p><p><strong>NOTE: Post-Seminar Module - Between January 13-21 (J -Term) students will travel to Fukushima and Tokyo, Japan. There will be no cost to students.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR75C/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 58E Machine Ecology: Autonomous Robots for Environmental Restoration": "<p>Have you ever wondered how technology and innovation can tackle some of the world's most pressing environmental challenges? This first-year seminar introduces students to the emerging field of machine ecology—the design of purpose-built robotic systems that work in partnership with natural processes (often drawing inspiration from indigenous practices) to repair degraded ecosystems.</p><p>In collaboration with the Machine Ecology research group, students will focus on arid-land restoration using a newly developed low-cost robotic end-effector designed to construct semi-circular bunds (demi-lunes). These traditional water-harvesting structures are highly effective at capturing scarce rainfall and enabling vegetation recovery, yet they remain extremely labor-intensive to build at scale. Students will work directly with the existing robots and end-effectors already built by the research team.</p><p>The semester begins with a local field demonstration and hands-on operation of the robotic system. For the remainder of the fall term (while the New England weather keeps us indoors), students will hear from relevant experts, conduct a literature review on dryland restoration, and consider large-scale deployment challenges. Working in teams, participants will design and simulate next-generation field deployments using real topographic data from the Santa Rita Experimental Range in Arizona. Topics include multi-robot coordination, solar-powered base stations, autonomous path planning for various landscape interventions, battery charge/discharge cycles, and strategies for operating in remote, low-density drylands.</p><p><strong>NOTE: Post-Seminar Field Module (Dates: Sunday, January 17 – Saturday, January 23, 2027 (6 nights / 7 days). There will be no cost to students.</strong></p><p><strong>As a fully funded extension of the seminar, participants will travel to the USDA’s Santa Rita Experimental Range in Arizona for a week-long field deployment (January 17–23, 2027). Working alongside the research team and USDA soil scientists, students will translate their fall simulations into real-world robotic operations: deploying the end-effectors on actual arid terrain, constructing test bunds, and collecting data on soil disturbance and water infiltration. This rare opportunity to move directly from simulation to live field trials in a representative semi-arid landscape provides an extraordinary capstone experience. The sites will continue to be monitored for years afterward, so by their senior year students may see photographic evidence of vegetation returning to previously barren areas as a direct result of their interventions.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR58E/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 75D Making Government Work Better": "<p><strong>Why do some governments work - and others don't?</strong></p><p>Why can some countries collect taxes, run schools and hospitals, and respond to crises, while others struggle to deliver even basic services? And why are people in places like the United States increasingly worried about whether their own government can still do these things well?</p><p>This seminar is an invitation to explore those questions. We’ll focus on one big idea: state capacity (the ability of governments to turn decisions into real-world outcomes), why that capacity sometimes breaks down, and how it can be rebuilt. We’ll explore how effective governments are built over time through conflict, leadership, and pressure from citizens and interest groups. Along the way, we’ll look at real-world cases—from wealthy settings to low- and middle-income countries—where governments have succeeded (or failed) to deliver essential services like health care and education.</p><p>Rather than surveying everything in political science, this seminar focuses on a single, powerful idea: what it takes for governments to work in practice. Drawing on insights from politics, history, and economics, we’ll ask what makes institutions effective, where they fall short, and what can be done to improve them. Classes will be highly interactive, featuring active discussions, experiential learning (including a field visit and a film night) and case-based exercises where we analyze real policy challenges and consider how governments could respond.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR75D/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 74C Making Sense of Health Information in the Digital Age": "<p><i>BREAKING: Coffee causes cancer! THIS JUST IN: Microplastics in our brains!</i></p><p>Making sense of - and coping with - the often conflicting and seemingly ever-changing information we receive from various sources on health and medical topics can be hard. This seminar will give you the skills to make sense of health and medical information and this seminar will give you the skills to communicate health and medical information effectively to others using new and novel media. Whether you are interested in a career as a social media content creator on TikTok, a medical journalist for the New York Times, a surgeon at the Massachusetts General Hospital, or you are simply interested in being a better consumer of medical information, this seminar is for you.</p><p>In this seminar, you will learn about how health information is developed for traditional (e.g., newspapers, television) and non-traditional (e.g., TikTok, YouTube) media outlets. You will visit NPR studios, meet health journalists, and learn how journalists craft health content for newspapers, television, and online publications. You will hear from YouTube-funded health content creators and learn their tricks for communicating health information that empowers their online communities. The seminar will also wrestle with the power structures that adjudicate which health topics are covered in the media and discuss the imperative of defending vulnerable populations and considering culture and literacy levels in health content creation.</p><p><strong>NOTE: As a student in this seminar, you will be able to join field trips to podcast studios and local television stations.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR74C/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 49N Measurements of the Mind: The Creation and Critique of the Psychological Test": "<p>For well over a century, psychologists have worked with schools, corporations, immigration officers, the military, and psychiatrists to sort the American population into groups in order to make a number of key judgments. Special tests – designed to measure everything from intelligence to vocational aptitudes to personality – have been at the center of that effort. In this seminar, we will explore the at times controversial story of psychological testing, and its larger implications. We will pay attention to the creativity within psychology in the making of such tests, and examine their potential benefits, as well as the drawbacks and dangers of the misuses of these instruments – particularly as tools of social control.</p><p>Topics covered will include the use of tests in the eugenics movement, testing of immigrants at Ellis Island, academic and military sorting through cognitive tests, the use of personality tests in psychiatric and forensic settings, and the cross-cultural use of personality tests by anthropologists. Since Harvard psychologists have made significant contributions to the history of psychological testing, we will use materials uniquely available on this campus in the course of our work together.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR49N/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 65W Michelangelo": "<p>Michelangelo Buonarroti (1475-1564) is a dominant figure in the history of art and in the history of the discipline. A sculptor, architect, painter and poet, Michelangelo was the quintessential Renaissance man and embodies the paradigm of artistic genius. He was a complex figure, individual and “terrible”, who transformed the art of the Italian peninsula over the seven decades of his career.</p><p>Harvard is unique in providing the opportunity to study Michelangelo through direct encounters with original drawings by the hand of the artist, books and biographies that date to the 16th century, and through research in its superb library.</p><p>One of the goals of this seminar is to teach students to write original and nuanced essays in art history. Through weekly tasks to be completed during the second half of the seminar, students will build their final paper. Students will leave this seminar having produced an original thought on one of the most studied artists in history.</p><p><strong>NOTE: This class will be taught in the Harvard Art Museums with visits to special collections on campus (Houghton Library) and in Boston (the Isabella Stewart Gardner Museum, MFA Boston).</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR65W/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 51S Natural History Museums and the Anthropocene": "<p>Natural history museums are more than just buildings: they’re treasure troves of stories, mysteries, and jaw-dropping discoveries that have shaped our entire understanding of life on Earth. Think Darwin, dinosaurs, and deep-sea wonders! But did you know that the real magic often happens *behind the scenes* in collections rarely glimpsed by the public?</p><p>In this seminar, you’ll unlock access to Harvard’s world-class Natural History Museums. Each week, you’ll go behind the closed doors to explore how these institutions fuel scientific breakthroughs, steward millions of unique artifacts, and connect with a changing world in the digital age. You’ll discover how museums are at the very center of today’s most urgent scientific questions, from climate change to species conservation, and how technology is sparking a new revolution in museum science.</p><p>You won’t just read about it. You’ll get your hands dirty! Explore the outdoors with fresh eyes, using innovative resources and field tools. Dive into Harvard’s vast collections, meet museum staff, engage with these collections, and see how exhibits come to life. Your seminar experience builds toward a real-world capstone: working in teams to create your own museum exhibit. You’ll weave together everything you've learned, curiosity, science, and creativity, into a showcase for the public.</p><p>Students will also engage directly with this subject through outdoor exploration of nature guided by cutting-edge resources and tools developed for this purpose. The capstone project will be a collaborative effort to devise a museum exhibit that unites major themes of the term.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR51S/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 52G Nuclear Dilemmas": "<p>This first-year seminar explores major issues in nuclear weapons history and policy. Did the use of atomic bombs by the United States against Japan end the Second World War? Have nuclear arsenals prevented a direct conflict between nuclear powers since 1945? Why have some countries pursued nuclear arsenals while others have not? Could society survive a nuclear war in any meaningful sense, and should we prepare for that possibility? What harms has the pursuit of nuclear weapons caused to natural environments and human bodies? How have fictional portrayals shaped our understanding of the nuclear age? Is there any hope of eliminating nuclear weapons?</p><p>Our discussions will take up classic historical controversies about the role of nuclear weapons in war and international relations, as well as major debates about the theories of nuclear deterrence and proliferation. We will study the arguments of pacifists, feminists, and other critics of nuclear weapons, and we will use several films and a novel to consider the place of nuclear weapons in modern culture. In a final project, students will have the option of writing a “white paper” or “op-ed” on a current nuclear policy question or pursuing a historical or creative project in consultation with the instructor.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR52G/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 72Z Oil and Empire": "<p>What is the relationship between oil and empire? How has control over oil—the single most important commodity in the world—shaped the nature of power, politics, and environmental and social life in the twentieth century? How have different disciplines contributed to and at times undermined a critical understanding of oil politics? This interactive seminar will address these and other questions by examining the political, social, material, and cultural history of oil. Given the centrality of oil to modern life, control over this prized resource has resulted in a complex and often violent history. We will thus look at the ways in which the political economy of oil has shaped the rise and fall of empires, the fate of nation-states, the making of the economy, the nature of class, gender, and racial discrimination, and the production of historical knowledge and the built urban environment. By moving between primary source documents and films, multi-disciplinary scholarly analyses, in-class discussions and debates, and written assignments, students will learn to be principal investigators and thereby sharpen their own critical interpretive abilities. This seminar on the global history of oil will address trends and processes from Ecuador, Mexico, the United States, and Venezuela to Nigeria, Indonesia, Iran, and Saudi Arabia.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR72Z/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 23P Physics, Math and Puzzles": "<p>Physics is a highly developed branch of science with a broad range of applications. Despite the complexity of the universe, the fundamental laws of physics are rather simple, if viewed properly. This seminar will focus on intuitive as well as mathematical underpinnings of some of the fundamental laws of nature. The seminar will use mathematical puzzles to introduce the basic features of physical laws. Main aspects discussed include the role of symmetries as well as the power of modern math, including abstract ideas in topology, in unraveling the mysteries of the universe. Examples are drawn from diverse areas of physics including string theory. The issue of why the universe is so big, as well as its potential explanation is also discussed.</p><p><strong>NOTE: This seminar is recommended for students with a strong background in both math and physics and with keen interest in the relation between the two subjects.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR23P/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 52S Reading the Book of Nature": "<p>Nature is made up of a dizzying variety of organisms, environments, and their interactions, but amidst this chaos, patterns exist that provide the viewer knowledge of their surroundings…if they know how to see the patterns staring them in the face. In this seminar, students will learn ways to see patterns in rocks, water, plants, air,  stars and animals, and begin to discern what those patterns can tell us about how nature works.</p><p>Moss on a tree trunk can tell you which direction to walk. The speed of cricket chirping can be a remarkably accurate thermometer. The color of water can indicate which tree species are growing uphill. You can keep your calendar from the position of the stars or the birds singing in the trees. Students will learn many of these patterns that have been collected by different cultures throughout human history and will come to understand the mechanisms creating those patterns. But just as important, students will learn and practice skills for observing nature’s patterns on their own, and discerning what those patterns can tell them about their local surroundings.</p><p>Because one must be in nature to observe it, class sessions will be held exclusively outdoors (rain or shine) where we will learn common patterns in the natural world and practice identifying new patterns and their meanings. Supplemental readings will come from texts by ecologists, survivalists, and indigenous peoples, but the primary text for this seminar will be the bark, mosses, dirt, and bird songs (among others) of the natural world.</p><p><strong>NOTE: Class sessions will be held exclusively outdoors regardless of weather. Students must have a willingness to spend multiple hours at a time outdoors (rain or shine). Appropriate accommodations will be made for students with mobility concerns.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR52S/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 68E Reel Visions: The Middle East Through Its Filmmaker’s Lens": "<p>How do Middle Eastern films shape how we see the Middle East? In this First-Year Seminar, you will engage with films from the Middle East that tell intimate and personal stories in specific social and political situations. You will watch movies from the region, most of them produced in the last quarter century, and following a geographical arc from North Africa to the Eastern part of the Middle East. You will also read a short text to help you contextualize each movie, including the circumstances of the directors and actors (such as state support or censorship), and will consider these movies as a lens into Middle Eastern self-representations.</p><p>Each week, through various interactive exercises, you will play the role of movie makers, critics, or censors. You will produce your own film critiques and analyses using various formats, such as text, videos, and podcasts. Ultimately, we will reflect on what makes Middle Eastern movies distinctive and on what we can learn from them about the Middle East.</p><p><strong>NOTE: Students are expected to have watched the assigned movie and reading in advance of each class.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR68E/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 70Z Regulating Online Conduct: Speech, Privacy, and the Use and Sharing of Content": "<p>In the course of a few short decades, the Internet has become integral to significant swaths of human experience. It has radically altered modes of interpersonal engagement, democratized access to tools of mass communication, and changed the role of gatekeepers that traditionally controlled access to music, video, and other media. Given the breadth of its impact, it is not surprising that the Internet has pushed the bounds of legal doctrines that govern speech, privacy, and the creation and exploitation of content.</p><p>Mass-scale online distribution of copyrighted works tests the limits of legal doctrines developed in an era of physical copies. Age-old tensions between privacy and the right to free expression have been exacerbated in cases where one’s right to speak bumps up against the desire of another to keep information private. And the ability to share—and, thus, to consume—extraordinary amounts of personal data has impacted government (which collects and uses data for purposes of law enforcement) and private companies (which collect and use data for purposes of advertising and monetization).</p><p>This seminar will provide an overview of legal doctrines that govern the online conduct of individuals and institutional actors. It will address the rights and responsibilities of the intermediaries that mediate many of our online activities – social networks, cloud-based storage services, email providers, and the like. Students will consider old and new legal frameworks and the ways in which the law informs strategic decisions for those that operate online.</p><p>The seminar will address some of the most important and complex policy debates of our day—regarding the proper scope of intellectual property protection, the balance between a robust environment for online free expression and a desire to protect against harmful speech, and the ways in which the law addresses privacy vis-à-vis both government and private actors. Readings and in-class conversations will cover legal cases and case studies, offering students a high-level view of the technical, legal, and business landscape and allowing them to delve deeply into particularly difficult sets of problems concerning the regulation of online conduct.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR70Z/2026-Fall/\" target=\"_blan
