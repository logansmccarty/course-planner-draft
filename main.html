<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvard First-Year Course Planner</title>
<style>
  :root{
    --crimson:#A51C30;
    --crimson-dark:#8a1727;
    --crimson-tint:#fbeef0;
    --ink:#1d1d1f;
    --muted:#6b6b70;
    --line:#e3e3e6;
    --bg:#f5f5f3;
    --card:#ffffff;
    --good:#1f7a4d;
    --good-bg:#e8f5ee;
    --warn:#9a6b00;
    --warn-bg:#fff6e0;
    --bad:#9a2222;
    --bad-bg:#fdeaea;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 6px 18px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box}
  body{
    margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.5;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px 80px}
  header.page{
    background:var(--crimson);color:#fff;padding:28px 0 26px;margin-bottom:0;
    border-bottom:4px solid var(--crimson-dark);
  }
  header.page .wrap{padding-bottom:0}
  header.page h1{margin:0 0 6px;font-size:26px;font-weight:700;letter-spacing:.2px}
  header.page p{margin:0;opacity:.92;font-size:15px;max-width:760px}

  /* sticky status bar */
  .statusbar{
    position:sticky;top:0;z-index:30;background:var(--card);
    border-bottom:1px solid var(--line);box-shadow:0 2px 6px rgba(0,0,0,.04);
  }
  .statusbar .inner{
    max-width:1180px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  }
  .counts{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .pill{
    font-size:13px;font-weight:600;padding:5px 12px;border-radius:999px;
    background:#eee;color:#444;white-space:nowrap;
  }
  .pill .n{font-variant-numeric:tabular-nums}
  .pill.filled{background:var(--crimson-tint);color:var(--crimson-dark)}
  .pill.skipped{background:#eef1f6;color:#3a4a63}
  .verdict{
    font-size:14px;font-weight:700;padding:6px 14px;border-radius:8px;display:flex;align-items:center;gap:8px;
  }
  .verdict.ok{background:var(--good-bg);color:var(--good)}
  .verdict.work{background:var(--warn-bg);color:var(--warn)}
  .verdict.err{background:var(--bad-bg);color:var(--bad)}
  .spacer{flex:1 1 auto}
  .btn{
    font:inherit;font-size:13px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:8px 14px;border-radius:8px;cursor:pointer;transition:.12s;
  }
  .btn:hover{border-color:#c9c9cf;background:#fafafa}
  .btn.primary{background:var(--crimson);border-color:var(--crimson);color:#fff}
  .btn.primary:hover{background:var(--crimson-dark)}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  /* cards grid */
  /* 6-col grid: top cards span 2 (×3), bottom cards span 3 (×2 = 1.5× the top) */
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:18px;margin-top:24px;align-items:start}
  .card.span2{grid-column:span 2}
  .card.span3{grid-column:span 3}
  /* bottom two cards: equal height (stretch to the taller), description fills */
  .card.span3{align-self:stretch}
  .card.span3 .card-body{display:flex;flex-direction:column}
  .card.span3 .twolevel{flex:1;min-height:0}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;overflow:hidden;
  }
  .card-head{
    padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;
  }
  .card-head .num{
    width:26px;height:26px;border-radius:50%;background:var(--crimson-tint);color:var(--crimson-dark);
    font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .card-head h2{margin:0;font-size:16px;font-weight:700;flex:1}
  .state-chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px}
  .state-chip.empty{background:#f0f0f0;color:#999}
  .state-chip.filled{background:var(--good-bg);color:var(--good)}
  .state-chip.skip{background:#eef1f6;color:#3a4a63}
  .card-body{padding:8px 16px 16px;flex:1;position:relative}
  .group-label{
    font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
    margin:12px 0 4px;padding-left:2px;
  }
  .group-label:first-child{margin-top:6px}
  .card.span2 .groups-wrap{column-count:3;column-gap:26px}
  .card.span2 .group{break-inside:avoid;-webkit-column-break-inside:avoid;display:block}
  .card.span2 .group .group-label{margin-top:2px}
  .card.span2 .group:first-child .group-label{margin-top:6px}
  @media(max-width:640px){ .card.span2 .groups-wrap{column-count:1} }

  /* two-level (area radios | course dropdown) — right pane stretches to the
     card height set by the radio column, so the description box fills it */
  .twolevel{display:grid;grid-template-columns:minmax(200px,.85fr) 1.15fr;gap:6px 30px;align-items:stretch}
  .twolevel .areas{min-width:0}
  .twolevel .detailpane{min-width:0;display:flex;flex-direction:column;min-height:0}
  .pane-label{font-size:12px;font-weight:700;color:var(--muted);margin:8px 0 7px;padding-left:2px}
  .detail{display:none}
  .detail.show{display:flex;flex-direction:column;flex:1;min-height:0}
  .detail .hint{font-size:13px;color:var(--muted);font-style:italic;padding:8px 2px}
  select.coursesel{
    width:100%;font:inherit;font-size:14px;padding:9px 10px;border:1px solid var(--line);border-radius:8px;
    background:#fff;cursor:pointer;
  }
  select.coursesel:focus{outline:none;border-color:var(--crimson);box-shadow:0 0 0 3px var(--crimson-tint)}
  .selother{margin-top:8px;display:none}
  .selother.show{display:block}
  .selother input,.areaother input{
    width:100%;font:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:7px;
  }
  .selother input:focus,.areaother input:focus{outline:none;border-color:var(--crimson);box-shadow:0 0 0 3px var(--crimson-tint)}
  @media(max-width:640px){ .twolevel{grid-template-columns:1fr} }
  .twolevel .skip-panel{margin-left:0}
  /* description fills the remaining card height (via descwrap) and scrolls */
  .descwrap{flex:1;min-height:140px;position:relative;margin-top:10px}
  .coursedesc{
    position:absolute;inset:0;overflow-y:auto;
    padding:10px 12px;border:1px solid var(--line);border-radius:8px;
    background:#fafafa;font-size:13px;line-height:1.45;color:var(--ink);
    display:none;
  }
  .coursedesc.show{display:block}
  .coursedesc.placeholder{color:var(--muted);font-style:italic;background:#f7f7f5}
  /* tame the HTML descriptions' own spacing inside the box */
  .coursedesc p{margin:0 0 8px}
  .coursedesc p:last-child{margin-bottom:0}
  .coursedesc ul,.coursedesc ol{margin:0 0 8px;padding-left:20px}
  .coursedesc a{color:var(--crimson-dark)}
  /* "View full course info" catalog link (in description box + summary) */
  .course-link{margin-top:10px;margin-bottom:0;font-weight:600}
  .course-link a{color:var(--crimson-dark);text-decoration:none}
  .course-link a:hover{text-decoration:underline}
  /* area-filter checkboxes under a radio (Gen Ed categories) */
  .catboxes{margin:0 0 4px 28px;display:flex;flex-direction:column;gap:3px}
  .catopt{display:flex;align-items:flex-start;gap:7px;font-size:12px;line-height:1.3;color:var(--ink);cursor:pointer}
  .catopt input{accent-color:var(--crimson);margin-top:1px;flex-shrink:0}
  .catopt.disabled{color:var(--muted);cursor:default}
  /* double-course linking (e.g. LS 50A fills Math too) */
  .state-chip.linked{background:#eef3fb;color:#2c4a73}
  /* the underlying Math card stays (grayed); a blue card is dealt on top */
  .card.linked .card-body > *:not(.lock-overlay){opacity:.4;pointer-events:none}
  .lock-overlay{
    position:absolute;inset:8px;z-index:5;display:none;
    flex-direction:column;justify-content:center;
    padding:14px 16px;border:1px solid #b9d0ec;border-radius:10px;
    background:#eef3fb;color:#2c4a73;font-size:13px;line-height:1.45;
    box-shadow:0 8px 22px rgba(0,0,0,.16);overflow:auto;
  }
  .card.linked .lock-overlay{display:flex}
  .lock-overlay .lk-title{display:block;font-weight:700;margin-bottom:5px;font-size:14px}
  .linknote{display:none;margin-top:10px;padding:9px 11px;border:1px solid #cdddf2;background:#eef3fb;border-radius:8px;font-size:12.5px;line-height:1.4;color:#2c4a73}
  .linknote.show{display:block}
  .state-chip.partial{background:var(--warn-bg);color:var(--warn)}
  label.opt{
    display:flex;align-items:flex-start;gap:9px;padding:7px 8px;border-radius:8px;cursor:pointer;
    font-size:14px;transition:background .1s;
  }
  label.opt:hover{background:#faf7f8}
  label.opt input{margin-top:3px;accent-color:var(--crimson);flex-shrink:0}
  label.opt .txt{flex:1}
  label.opt .rec{color:var(--crimson-dark);font-size:12px;font-weight:600}
  .fillin{margin:2px 0 6px 30px;display:none}
  .fillin.show{display:block}
  .fillin input{
    width:100%;font:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--line);border-radius:7px;
  }
  .fillin input:focus{outline:none;border-color:var(--crimson);box-shadow:0 0 0 3px var(--crimson-tint)}

  .skip-divider{border-top:1px dashed var(--line);margin:12px 4px 4px}
  label.opt.skipopt{margin-top:4px}
  label.opt.skipopt .txt{color:#3a4a63;font-weight:600}
  .skip-panel{margin:4px 0 0 30px;display:none}
  .skip-panel.show{display:block}
  .skip-panel .reason-lbl{font-size:12px;color:var(--muted);margin:2px 0 5px}
  .skip-panel textarea{
    width:100%;font:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:7px;
    resize:vertical;min-height:54px;
  }
  .skip-panel textarea:focus{outline:none;border-color:var(--crimson);box-shadow:0 0 0 3px var(--crimson-tint)}
  .nudge{
    margin:10px 0 0;padding:9px 11px;border-radius:8px;font-size:12.5px;
    background:var(--warn-bg);color:#7a5500;border:1px solid #f0e0b0;display:none;
  }
  .nudge.show{display:block}
  .nudge.info{background:#eef3fb;color:#2c4a73;border-color:#d4e0f0}

  /* summary */
  .summary{
    margin-top:30px;background:var(--card);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);padding:22px 24px;
  }
  .summary h2{margin:0 0 4px;font-size:18px}
  .summary .sub{margin:0 0 16px;color:var(--muted);font-size:14px}
  table.plan{width:100%;border-collapse:collapse;font-size:14px}
  table.plan th,table.plan td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  table.plan th{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700}
  table.plan td.cat{font-weight:600;width:30%}
  .tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
  .tag.course{background:var(--good-bg);color:var(--good)}
  .tag.skip{background:#eef1f6;color:#3a4a63}
  .tag.none{background:#f0f0f0;color:#999}
  .reason-text{color:var(--muted);font-size:13px;font-style:italic}
  .summary-desc{margin-top:5px;font-size:13px;line-height:1.45;color:var(--muted)}
  .summary-desc p{margin:0 0 6px}
  .summary-desc p:last-child{margin-bottom:0}
  .actions{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .copied{font-size:13px;color:var(--good);font-weight:600;opacity:0;transition:.2s}
  .copied.show{opacity:1}
  .hint-text{font-size:13px;color:var(--muted)}
  .hint-text.hide{display:none}
  footer{margin-top:34px;text-align:center;color:#aaa;font-size:12px}
  /* forced 2-column: left = cards 1,2,3 ; right = cards 4,5 (independent columns
     via multicol, so a short card doesn't get a gap from a tall neighbor) */
  @media(max-width:1040px){
    .grid{display:block;column-count:2;column-gap:18px}
    .card{width:100%;margin:0 0 18px;break-inside:avoid;-webkit-column-break-inside:avoid}
    .card:nth-child(4){break-before:column;-webkit-column-break-before:always}
    .twolevel{grid-template-columns:1fr}
    .card.span3 .card-body{display:block}
    .card.span3 .twolevel{flex:none}
  }
  @media(max-width:640px){
    .grid{column-count:1}
    .card:nth-child(4){break-before:auto;-webkit-column-break-before:auto}
    header.page h1{font-size:21px}
    header.page{padding:20px 0 18px}
    /* compact sticky status bar: row 1 = counts + Reset, row 2 = verdict */
    .statusbar .inner{gap:8px 10px;padding:10px 16px}
    .statusbar .spacer{display:none}
    .counts{order:1}
    #resetBtn{order:2;margin-left:auto}
    #verdict{order:3;flex-basis:100%;font-size:13px}
    /* bigger touch targets; 16px form text prevents iOS focus-zoom */
    label.opt{padding:10px 8px}
    label.opt input{margin-top:2px}
    label.opt input,.catopt input{width:18px;height:18px}
    .catopt{padding:3px 0;font-size:13px}
    select.coursesel,.fillin input,.selother input,.areaother input,.skip-panel textarea{font-size:16px}
  }
</style>
</head>
<body>

<header class="page">
  <div class="wrap">
    <h1 id="txt-header-title">Harvard First-Year Course Planner</h1>
    <p id="txt-header-sub"></p>
  </div>
</header>

<div class="statusbar">
  <div class="inner">
    <div class="counts">
      <span class="pill filled" id="txt-status-courses">Courses: <span class="n" id="cFilled">0</span>/4</span>
      <span class="pill skipped" id="txt-status-skipped">Skipped: <span class="n" id="cSkip">0</span>/1</span>
    </div>
    <div class="verdict work" id="verdict" role="status" aria-live="polite"></div>
    <div class="spacer"></div>
    <button class="btn" id="resetBtn">Reset</button>
  </div>
</div>

<div class="wrap">
  <div class="grid" id="grid"></div>

  <div class="summary" id="summary">
    <h2 id="txt-summary-heading">Your plan</h2>
    <p class="sub" id="txt-summary-sub"></p>
    <table class="plan">
      <thead><tr><th id="txt-col-cat" scope="col">Category</th><th id="txt-col-choice" scope="col">Choice</th></tr></thead>
      <tbody id="planBody"></tbody>
    </table>
    <div class="actions">
      <button class="btn primary" id="copyTextBtn" disabled>Copy plan as text</button>
      <span class="hint-text" id="copyHint"></span>
      <span class="copied" id="copiedMsg">Copied!</span>
    </div>
  </div>

  <footer id="txt-footer"></footer>
</div>

<script>

const DESCRIPTIONS = {"AFVS 12 Drawing 1": "<p>A studio course to build the skills of drawing incrementally and expand students’ visual vocabulary. Drawings will be made from life, photographs and invention. Emphasis will be placed on enhancing our observational sensibilities through life drawing and the figure, focusing on all aspects of technical development, particularly the importance of line. The aim of this course is to expand drawing skills with intention and purpose.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/AFVS12/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "AFVS 40E Introduction to Photography": "<p>This studio course will introduce you to the conceptual, artistic potential of photography. Your understanding and use of the medium will be contextualized within contemporary and historic photographic art practices. Your own art practice will be developed alongside technical skills. We will discuss topics such as the ethics of photographing people, how to make meaningful images amid the proliferation of digital images, and traits that are unique to photography. This class is organized around presentations on artists’ work, presentations on photographic concepts, studio making assignments, individual meetings with the instructor and breakout meetings with peers to develop your practice, technical skill workshops, readings, reading discussions, group critiques, and visiting artist presentations.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/AFVS40E/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "AFVS 50A Introduction to Nonfiction Film": "<p>Introductory exercises in live-action 16mm filmmaking culminating in the production of a nonfiction film as a group project in the spring term. Part one of a two-part series .Students are required to take both parts A and B of the course within the same academic year.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/AFVS50A/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "AFVS 53AR Fundamentals of Animation": "<p>An introduction to the possibilities of animation for absolute beginners.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/AFVS53AR/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "AFVS 63 Intro to Time-Based Media": "<p>An introduction to drawing, sculpture, performance, and film through time-based materials and practices. Students will develop their own relationship to the creative process through the transformation of humble materials (cardboard, charcoal, found objects), inspiration from a diverse range of artists, and critical reflection guided both by the instructors and the students themselves.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/AFVS63/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "AFVS 70 The Art of Film": "<p>This introductory course surveys the history of film and visual media in the 20th and 21st centuries. We will both explore the rise of major cinematic movements in their striving to define the “art of film” and shed light on the often overlooked parts and marginalized figures in the history of film. Building upon Rudolf Arnheim’s concept of visual thinking, this class puts special emphasis on creative practices and visual exercises that introduce students to new forms of visual expression and argumentation. Weekly video blogs, a visual essay, and a collaborative film festival project will further advance and diversify our multi-faceted approach to the history of film and visual media.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/AFVS70/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "HAA 10 Intro to the History of Art & Architecture": "<p>An introduction to major works of art and architecture, co-taught by a team of three HAA professors, plus invited guest lecturers. Each week consists of one 75-minute lecture by a faculty member (Mondays, 1:30 - 2:45 pm), one 75-minute discussion section (Wednesdays, 1:30 - 2:45 pm), and one 60-minute looking lab in the Harvard Art Museums and other locations (scheduled post-enrollment). Every unit will focus on a specific artwork or site through which large humanistic questions and art historical concepts are considered.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/HAA10/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "MUSIC 1 A Survey of Western Music": "<p><i>Introduction to Western Music, from Troubadours to TikTok . </i></p><p>This course equips students with techniques for listening, thinking, and communicating about music, with a particular focus on the art music (i.e., classical) tradition of the modern West. We begin by establishing some baseline definitions before exploring how the tools and contexts of music-making have transformed over the centuries. Along the way, we’ll encounter a range of styles, genres, and forms from a variety of perspectives (cultural, socio-economic, theoretical) that will sharpen your ability to listen carefully and critically. You’ll also practice articulating your thoughts and opinions about what you’re hearing through listening diaries and in-class discussion. While the trajectory of the course traces a broad history of music (mostly literate and socially elite) around Western Europe and the United States, this is not a survey of “Great Works.” Rather, through interactive cases, students will learn to imaginatively engage with music in historical context. No prior knowledge of music, practical or theoretical, is required to take or succeed in this course, but everyone is expected to complete weekly listening assignments and attend two live performances.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/MUSIC1/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "MUSIC 4 Introduction to Composition": "<p>Open to students with little or no prior experience in composition. The course explores multiple approaches to organizing musical ideas, including writing with standard notation, compositional approaches informed by electronic and digital media, and process-based or generative methods. Students will engage fundamental compositional elements such as melody, harmony, rhythm, and instrumental color while also exploring graphical notation and the creation of original symbolic systems to represent sonic and musical ideas. Alongside these approaches, students will develop skills in score preparation, documentation, and analytical listening. The primary focus of the course is a series of short compositional exercises, culminating in a somewhat longer final project.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/MUSIC4/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "MUSIC 51A Music Theory 1a": "<p><strong>Course description: </strong>In Music 51a, we will explore topics in tonal harmony, rhythm and meter, acoustics, form, and melodic structure in popular music, Western art music, and gagaku. Students will work with a variety of notational systems, including Western staff notation, the Nashville number system, lead sheet notation, and others. In addition, the class features a series of workshops on digital audio workstation GarageBand to develop skills for manipulating and analyzing recorded material.</p><p><strong>Who should take this class?</strong> Students with a strong interest in the “nuts and bolts” of music who are looking to learn about the stylistic conventions of popular music and European tonal music, and to understand how musical pieces in these genres are put together.</p><p><strong>What will I take away from this class?</strong> This course will help students develop a solid foundation for critical listening, aural and notation-based analysis, and musical interpretation. Students will gain basic fluency in recording and manipulating audio files. These skills can be applicable to a variety of musical contexts: performance, composition, songwriting, music criticism, and listening.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/MUSIC51A/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "TDM 109 Introduction to Acting": "<p>This is a beginning acting class designed both for students who have had no previous acting, performance, or any arts class experience, as well as for students who have had a fair amount of acting experience and are interested in pursuing a career in acting. The focus is on scene and monologue work using contemporary texts from theater, television and film. Core components of the class include the idea of navigating a situation as you actually would in real life, how to read a scene or monologue to figure out what your character might want from a situation, and “action-based acting” (how a person might go about getting what they want from the other person). We’ve designed the class around very tangible and concrete ideas and techniques, so that those who might be intimidated by the idea of an acting class, or an arts class in general, will feel exceedingly comfortable. We always have a lot of students from non-art concentrations who have had no previous art class experience.<br><br>It is important to note that while the class is intentionally designed to be unintimidating, friendly and warm, the class does require a great deal of outside work. Students should expect to spend 4-6 hours per week outside of class</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/TDM109/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "TDM 121MV Intro to Movement": "<p>This course will focus on introductory principles and practices of performative and material-generative movement. We will explore movement techniques foundational to: creating characters; generating scripts and narratives; economizing and grounding stage presence; fostering ensemble cohesion; sensitizing the body to its unique capabilities of expression.<br><br>Utilizing principles from Richard Maxwell, James Donlon, Charlie Oates, Anne Bogart, Blue Man Group and other ensembles/artists, we will attempt to anatomize an idealized ‘neutrality’, investigating the meaning and application of physical/environmental ’neutrality’ on stage. We will identify the roles personal idiosyncrasy and ‘disfluency’ can play in the pursuit of that neutrality, and the opportunities and challenges they present to the performer. We will investigate rudimentary components of story, uncovering along the way the most essential markers for perceiving story, emotion and thought in physical performance. We will explore the beginnings of creating character and story through gradual stages using both non-verbal and text-based story (solo body, body in relationship to object, bodies in interrelationship w/ each other). In the latter part of the semester, we will experiment with stylistic schools of physical performance, including mime, Blue Man Group, Charlie Oates sculpture work, clowning/acrobatics and Viewpoints, and will also investigate ensemble cohesion and material generation through games and improvisation. <br><br>Throughout the semester’s explorations, we will also develop basic familiarity with simple yoga flow sequences, Taoist tai chi and other body practices geared toward conditioning/lengthening/ strengthening the physical instrument. <br><br>The class will be both rigorously physical and dialectical, will include several short solo and ensemble performance pieces throughout the semester and will culminate in both a full-ensemble long form piece, as well as short individual pieces.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/TDM121MV/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "ENGLISH 20 Literary Forms": "<p>This foundational course for English concentrators examines literary form and genre. We explore some of the many kinds of literature as they have changed over time, along with the shapes and forms that writers create, critics describe, and readers learn to recognize. The body of the course looks to the great literary types, or modes, such as epic, tragedy, and lyric, as well as to the workings of literary style in moments of historical change, producing the transformation, recycling, and sometimes the mocking of past forms. While each version of English 20 includes a different array of genres and texts from multiple periods, those texts will always include five major works from across literary history: <em>Beowulf</em> (epic), <em>The Winter’s Tale</em> (tragicomedy or romance), <em>Persuasion</em> (comic novel), <em>The Souls of Black Folk </em>(essays; expository prose), and Elizabeth Bishop’s poems (lyric). The course integrates creative writing with critical attention: assignments will take creative as well as expository and analytical forms.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/ENGLISH20/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "HUMAN 6 Translating, Retelling, Performing, Illustrating": "<p>Great art constantly morphs: novels become films, statues become poems, music becomes dance. This introduction class looks at how masterpieces from around the world transform as they move across languages, art forms, and renditions. In addition to written assignments, we do creative projects to explore each of those modal shifts. We also learn about the structure of a range of languages, and think about how those languages shape their literatures. This is a great class to take if you’re thinking about learning a new language in the future. It’s also a good entryway to other literature and language classes for first- and second-year students, as well as students concentrating in fields outside the humanities. This course also counts toward the Secondary Field in Translation Studies. Taught in English; no other languages required (just curiosity).</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/HUMAN6/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "HUMAN 7 Culture in Context": "<p>This course introduces students to the interdisciplinary study of cultural materials in their historical contexts. Weekly lectures, given by members of History and Literature's Committee on Degrees and other members of the faculty, will focus on types of primary sources (such as film, fiction, music, photography, and archival documents), approaching them from key theoretical and methodological perspectives. Class meetings will feature trips to campus museums, archives, and performances. Assignments will practice the fundamental skills of close reading and historical contextualization, culminating in a research project.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/HUMAN7/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "HUMAN 9 How To Tell a Story": "<p>How to tell a story? How do writers discover character, imagine worlds, and shape narrative time? This open-enrollment creative writing course will focus on the cornerstones of storytelling. We will move through an expansive reading list—for there is no writing without reading—designed to showcase the many different shapes a story can take. Ask any writer why they became a writer,<strong> </strong>and they'll tell you that it's because they read. (Octavia Butler, who came from a poor family, once said that she became a writer because she had access to public libraries. Books, in other words; they showed her what was possible.) These conversations about “reading like a writer” will, in turn, inform the creative work you generate this semester: you will write your own stories, exploring different styles and literary techniques. You can expect to leave the course with a portfolio of creative work.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/HUMAN9/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "HUMAN 16 Language": "<p>What is Language? Is language “a uniquely human gift”? Is it central to the human experience, as many have suggested? Why do some writers say that Language is what “makes us human?” Do other animals have Language? Do AI models “know a language”? What does it even mean to ask questions like these? Do languages vary from one another without limit? Or is there an underlying common core beneath the surface diversity? How similar are languages across modalities (signed/spoken)? Do the languages we know determine the thoughts we can think? Do we think (only) in language? Are there right and wrong ways of speaking? Who decides? What’s the difference between a language and a dialect? Where do our words come from? It’s said that more than half of the world’s languages and maybe as many as 90% are “endangered” and may no longer be spoken by the end of the century. Are they “unsuited to the modern world”’ or are other factors at play? Are some languages more logical than others? Students in this course will be exposed to classical and new questions about language, and will gain practical skills in linguistic analysis along with an appreciation of how one can approach these questions analytically. Our aim is not to present answers, but to foster critical thinking in order to understand on the one hand what such questions mean, and on the other, how one might approach them and why various answers have been given from a diversity of perspectives from Linguistics, Philosophy, Languages and Literatures, Psychology, Computer Science, Anthropology, and related fields in the humanities and sciences. This course can also be used to satisfy any introductory prerequisites for more advanced coursework in Linguistics, and the distributional requirement in Arts &amp; Humanities.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/HUMAN16/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "HUMAN 50 Nature, Ethics & Human Imagination": "<p>In this class, we will seek ways to mend our relationship to the earth. To prepare ourselves, we will study the stories, values, assumptions, and commitments that have been drivers of climate change and other environmental challenges. On the basis of this study, we will explore the potential for imaginative cultural work to foster a better future. Week-to-week, faculty guests from across Harvard will introduce us to perspectives and methods from an array of fields, including history, literature, music, design, art, philosophy, and religion. As the semester unfolds, we will use what we learn in these sessions to refine our understanding of the contradictory narratives, competing values, human frailties, and historical blind spots that have drawn us into our current environmental predicaments. From this foundation, we will imagine how cultural work might help extricate humanity from these predicaments and put us on a better path.</p><p>Each student in the class will work for the semester on an environmental problem of their own choosing. This work will be completed in four stages, progressing from identifying the problem, to studying its history, to imagining a solution and assessing it from various angles, to devising a proposal for cultural work that would help bring that solution into being. Twice during the semester, students will share their work with the class for feedback.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/HUMAN50/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "PHIL 4 Logic I": "<p>This course is an introduction to logic for students who have no background in either logic, math, or computer science. It is designed to provide important concepts and skills that will help students succeed in fields where logical reasoning is helpful (pretty much all fields, then), and to prepare them for further study of logic at the 100-level.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/PHIL4/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "PHIL 7 Intro to Ancient Greek/Roman Philosophy": "<p>This course presents an introduction to ancient Greek philosophy. It is focused on Socrates, Plato, Aristotle, Epicurus, and the Stoics. We will start by looking at the view of philosophy and the philosopher embodied by Socrates, who relentlessly pursued truth and knowledge, at the cost of his own life. From there, we will consider how we ought to live according to Plato, Aristotle, Epicurus, and the Stoics. In doing so, we will investigate whether we can have knowledge and how we might get it; what reality is like such that we can know it; why one should be moral; what practical and theoretical pursuits we should engage in. We will see why Epicurus thinks pleasure is the highest good, and why the Stoics think it is possible to be happy even under physical torture. The course emphasizes direct engagement with the text and arguments of the ancient Greek philosophers. We will read Plato's Phaedo, a large portion of the Republic, and selections from several other dialogues. We will spend time with Aristotle's Nicomachean Ethics, and make a foray into his Physics and Metaphysics. Reading Cicero's On Moral Ends, we will get acquainted with the ethics of Epicurus and the Stoics. All texts will be read in translation.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/PHIL7/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "PHIL 14 Morality and the Good Life An Introduction to Ethics": "<p>You probably want to live the best life for yourself. But what would that look like? Feeling pleasure, and avoiding pain? Having your desires satisfied? Maybe achieving knowledge, or securing fulfilling relationships? You might also care about living a moral life. But what would that look like? What actions are morally right or wrong, and what makes them that way? In this introduction to ethics, we'll begin by looking at three important theories of the good life: the pleasure theory, the desire-satisfaction theory, and the pluralist theory. We'll then turn to moral theories, investigating the relative strengths and weaknesses of those views that focus only on our actions' consequences, and those that reject this approach. In closing, we'll consider questions about the status of morality. What kind of judgment are we making when we say, for example, that something is morally wrong? Are there moral facts awaiting our discovery? If there are, how did they come to be - are they determined by humans and varying across cultures, like facts about the law or etiquette? Or perhaps determined by God? Or could they somehow have not been determined by anyone, standing as fundamental facts about reality?</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/PHIL14/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "RELIGION 16 Religious Dimensions in Human Experience": "<p>What is Religion? Why does it show up everywhere? Using archaeology, religious studies and social thought, this course will study the major themes in the history of religions including ‘encountering the holy’, sports and ritual’, ‘crossing borders’, ‘sacrifice as creation’, ‘pilgrimage and sacred place’, ‘suffering and quest for wisdom’, ‘music and social change’, ‘violence and cosmic law’. Readings from Native American, African American, Latinx/+, Jewish, Buddhist, Christian, Hindu traditions. Focus on the tension between individual encounters with the holy and the social construction of religion. Readings from Gloria Anzaldua, Toni Morrison, Judith Sherman, Arthur Kleinman, Popul Vuj, Mircea Eliade, Michael D. Jackson. Jointly offered in Harvard Divinity School as HDS3160.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/RELIGION16/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "RELIGION 41 History of Christianity": "<p>This course offers a historical overview of Christianity between the fourth century and the early sixteenth century. We will study Christianity’s emergence in this period from a persecuted religion within the Roman Empire to a position of dominance in both medieval Europe and Byzantium. Tracing this history up to the Ottoman conquest of Constantinople and the fracture of Latin Christendom into Catholics and Protestants, the course will explore major figures, institutions, and ideas, along with the development of Christian beliefs and practices. Further topics to be considered include the conversion of pagan peoples; the divergence of Latin and Greek Churches; the Crusades; monasticism, scholasticism, and mysticism; saints, relics, and pilgrimage; lay piety; late medieval crises and reforms; and Christianity’s interactions with Islam and Judaism.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/RELIGION41/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "AFRAMER 10 Intro to African Amer Studies": "<p>This course aims to provide an interdisciplinary examination of the complex array of African-American cultural and political practices from slavery to the present. The course will involve close readings of a variety of primary sources and classic texts that present key issues in African American thought and practice. The course will place special emphasis on debates concerning African American people with the goal of introducing students to the process and the methodology of interdisciplinarity. We will look at the way the debates function across disciplines to delve deeper into not only the complexity of African American life and thought but also the breadth of African American Studies itself.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/AFRAMER10/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "ANTHRO 1602 Intro to Sociocultural Anthropology": "<p>This course introduces undergraduate students to the discipline of Sociocultural Anthropology. Lectures will develop and explain sociocultural anthropology’s central questions and discoveries, concepts and innovations, methods and theories, placing each in their historical and political context. The course will give special attention to two distinctive, interrelated, and sometimes controversial features of the discipline within the social sciences: culture as a foundational concept for social analysis, and ethnography as a foundational research method and mode of social representation.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/ANTHRO1602/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "ECON 10A Principles of Economics (Micro)": "<p>Economists study human behavior using a combination of models and data. Ec10a introduces students to economic models using intuitive discussions, graphical analysis, and, in some cases, basic algebra. The models study individual decision-making and markets, and range from classical approaches like supply and demand to more recent approaches that consider informational limitations and behavioral mistakes. We will also use data to understand the strengths and weaknesses of these models. The course also discusses the role that ethics and values play in people's choices and in policy discussions, including an understanding and critique of approaches like utilitarianism, Rawlsian principles of justice, and libertarianism. The goal of the course is to provide students with a set of tools that will help them develop answers for themselves on how to make better choices and participate in debates on major public policy issues in areas including tax policy, inequality, discrimination and racial justice, and the environment.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/ECON10A/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "ECON 1010A Intermediate Microeconomics": "<p>The course introduces core microeconomic models of consumers, firms, and markets, and develops their application to a broad range of economic and social issues in the real world.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/ECON1010A/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GOV 10 Foundations of Political Theory": "<p>This course offers an overview of fundamental questions in political theory, with a focus on the meaning of individual liberty and its tension with the duties we owe to each other. It is organized around two thematic areas: first, the historical development of key political concepts (such as the ideas of justice, freedom, and authority) as they emerge in the work of thinkers like Plato, Hobbes, Locke, Rawls, and others; second, normative debates about how these ideas continue to inform our understanding of individual rights and collective obligations. <br><br>Students have some flexibility in shaping their assignments, with the option to focus either on the history of political thought or on contemporary normative debates. Lectures combine a close reading and interpretation of classic texts with Socratic-style discussions of controversial political and moral dilemmas relevant to our communities today.<br></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GOV10/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GOV 20 Foundations Comparative Politics": "<p>Provides an introduction to key concepts and theoretical approaches in comparative politics. Major themes include the causes of democratization, economic development, ethnic conflict, and social revolutions; as well as the role of the state, political institutions, and civil society. Examines and critically evaluates different theoretical approaches to politics including modernization, Marxist, cultural, institutionalist, and leadership-centered approaches. Compares cases from Africa, Asia, Europe, Middle East and Latin America to provide students with grounding in the basic tools of comparative analysis.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GOV20/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GOV 30 US Government A New Perspective": "<p>Provides an overview of contemporary American politics. It analyses the way in which recent changes in elections and media coverage have helped shape key aspects of American government, including the courts, Congress, and the Presidency, the workings of interest groups and political parties, and, also, the making of public policy. Permanent political campaigns have altered governmental institutions and processes. The course explains how and why.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GOV30/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "GOV 50 Data Science for the Social Sciences": "<p>Data is a fundamental part of studying the social, political, and economic world. How can we measure racial discrimination in job hiring? What is the best way to predict election outcomes? What factors drive the onset of civil wars? Is it possible to determine what members of Congress are more or less liberal given their voting record? These are just a few of the numerous questions that social scientists in academia and industry are tackling with quantitative data. In this course, you will learn the fundamentals of data science as applied to the social sciences: visualization, wangling, causal inference, prediction, and inference. All the while you will learn how to communicate your findings to a broad audience and how to use the professional tools of the trade such as R, tidyverse, and GitHub. Each student will complete a final project to showcase their acquired skills. No previous experience with statistics or statistical computing required.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/GOV50/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "HISTSCI 100 Intro to History of Science": "<p>How are science, medicine and technology related to the society, politics, and culture? How have the ways we go about understanding our natural and social worlds changed over time? What is the responsibility of science to the people? How have states and businesses supported scientific research, and why? What has been the relationship of science to medicine and technology in history? We will ask these questions and more by studying crucial moments in the development of science from the pre-modern world to the present day. Topics will include medieval Arabic medicine, Galileo, evolution, eugenics, race science, the atomic bomb, and genomics.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/HISTSCI100/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "PSY 1 Intro to Psychology": "<p>Psychology 1 is not just an introduction to the field of psychology but an owner's manual for the human mind — and an opportunity to explore some of the most fascinating issues in intellectual life. After laying a foundation in concepts about the brain, evolution, information, nature and nurture, and scientific approaches to psychology, the course covers specific topics including perception, cognition, attention, learning, memory, emotion, decision making, consciousness, development, language, personality, individual differences, psychopathology, social cognition, cooperation and conflict, and love and sex.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/PSY1/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "PSY 14 Cognitive Neuroscience": "<p>How do our brains give rise to our minds? Specifically, how are mental processes related to neural activity? This course will explore these questions, as well as the methods by which cognitive neuroscience seeks to answer them. We will focus on processes within perception, attention, memory, language, action, emotion, and social cognition, and methods including neuroimaging, neuropsychology, and electrophysiology.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/PSY14/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "PSY 16 Developmental Psychology": "<p>Humans are children for longer than any other species on the planet. We are born especially helpless and dependent on others. We start unable to walk, talk, or even grasp objects. Yet, somehow we become people who invent things like airplanes or democracy. In this class, we will consider what happens to our minds throughout development. We will focus on infancy and childhood. We will answer questions such as: what is the experience of a baby? – do they experience their environment as “one great blooming, buzzing confusion.”, as William James proposed? Or do they come to the world with knowledge that gives structure to their experience? How do children become experts in their language? How are the minds of children and infants similar to adults and how are they different? This is a communication and analytical thinking intensive course. You will learn about the different ways that scholars have approached these questions and get hands-on experience thinking through them yourself.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/PSY16/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "PSY 18 Psychopathology": "<p>Introduction to the study of psychological dysfunction. Focuses on abnormal behavior as it relates to the definition, etiology, and treatment of major symptom domains. This course will emphasize critical evaluation of the causes and mechanisms of mental illness, with special attention paid to how these disorders present clinically.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/PSY18/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "SOCIOL 1000 Introduction to Sociology": "<p>What is society? What is the role of the individual in it? How can we change our societies? This course introduces students to the field of sociology. By surveying social theory as well as empirical studies, students acquire what C. Wright Mills calls the \"sociological imagination\": the ability to think beyond our personal lives and to connect the experiences of individuals with large social structures. We examine common-sense assumptions about culture, politics, history, and psychology, and empower students to replace them with evidence-based reasoning. This gateway course introduces students to the intellectual insights and analytical tools of Sociology across the subfields of race, class, gender, politics, violence, culture, and inequality. Students are trained to critically analyze the evidence and research methods used in sociological research, and to communicate sociological ideas powerfully and succinctly through effective policy writing. Whether you plan to become a doctor who understands the social determinants of health, an education expert seeking to improve US schools, a not-for-profit worker supporting community organization, or a corporate consultant looking to improve organizational efficiency, the foundational concepts and research practices of sociology will empower you to understand, analyze—and maybe even change—our social world.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/SOCIOL1000/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "WOMGEN 1000 Intro to Women, Gender, Sexualty": "<p>An introduction to foundational texts, concepts, and skills in the interdisciplinary study of gender and sexuality. Students will gain practice applying key concepts to the analysis of archival texts and to issues with which scholars grapple on a daily basis and within many academic disciplines. Crucially, this course encourages students to think and work collaboratively, to co-create productive conversations, and to integrate these theoretical explorations with a critical analysis of our own multiple locations.<br>Readings include Gloria Anzaldúa, Audre Lorde, Donna Haraway, Patricia Williams, Kimberlé Crenshaw, Judith Butler, Durba Mitra, Simone de Beauvoir, Dorothy Roberts, Saidiya Hartman, José Esteban Muñoz, Sara Ahmed, Alison Bechdel, bell hooks, Chandra Talpade Mohanty, and Michel Foucault.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/WOMGEN1000/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "LIFESCI 1A Intro to Life Sciences I": "<p>What are the fundamental features of living systems? What are the molecules imparting them and how do their chemical properties explain their biological roles? The answers form a basis for understanding the molecules of life, the cell, diseases, and medicines. In contrast with traditional presentations of relevant scientific disciplines in separate courses, we take an integrated approach, presenting chemistry, molecular biology, biochemistry, and cell biology framed within central problems such as the biology of viral infections.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/LIFESCI1A/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "LPS A Foundational Chem and Biology": "<p>This course introduces fundamental concepts in chemistry and biology. Topics in chemistry include stoichiometry, acids and bases, aqueous solutions, gases, thermochemistry, electrons in atoms, and chemical bonding. The course also examines biological molecules, the transfer of information from DNA to RNA to protein, and cell structure and signaling.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/LPSA/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "LIFESCI 50A Integrated Science (double course, includes Math)": "<p>This is an intensive two-semester, double course that introduces the natural sciences as an integrated whole to students who have a very strong interest in science. Our goal is to teach students how to solve scientific problems by drawing methods and concepts from biology, chemistry, physics, and mathematics. The course uses examples from biology as an integrating theme, principles from physics and mathematics to reduce complex problems to simpler forms, and computer simulation to allow students to develop their intuition about the behavior of the dynamical systems that control the physical and biological universe. The course includes bootcamps to introduce students to biological experiments and the computer language, Python. Each semester will include a project lab, in which students will work in small teams to do original research on unsolved biological problems.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/LIFESCI50A/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "ENCE 10 Energy, Climate & Environment": "<p>This is a gateway class to the new Energy, Climate and Environment program that is under development. It is jointly taught by three faculty members from SEAS and FAS: Physicist Lene Hau, Historian Joyce Chaplin, and<br>Sociologist Jason Beckfield. The class is case-based with selected large-scale problems that illustrate the complexity and the multi-disciplinary approach required for solutions to problems of climate change. It will give students the bigger picture, and they will gain a sense of agency - that they can contribute to finding and implementing solutions. And importantly, the class will help students identify the particular aspects of the problems that they would like to focus on in their further studies at Harvard. We will have lectures, homework, and smaller projects with discussion sections. Students will be taught foundational skills and methods as needed to support their understanding and analysis of the cases. They will interact with a few guest speakers and learn from peers with different backgrounds but shared interests. The class will end with a capstone project where students will work in small, multi-perspective teams to analyze, discuss, and propose solutions to a real problem.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/ENCE10/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "ASTRON 17 Galactic and Extragalactic Astronomy": "<p>This course will introduce you to the physical principles describing galaxies and the composition and evolution of the Universe. We will cover a wide range of topics from nearby galaxies to quasars to the Big Bang.</p><p>The goals of the course are 1) to introduce you to the broad sweep of extragalactic astronomy and cosmology, including major concepts and common jargon, 2) to develop detailed applications of physics, particularly mechanics, to galaxies and cosmology, 3) to gain exploratory experience in observational astronomy.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/ASTRON17/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "CHEM 10 Quantum, Statistical, and Comput Chem": "<p>An introduction to the fundamental theories of quantum mechanics and statistical mechanics and their role in governing the behavior of matter. The course begins with the quantum behavior of a single electron and develops the elements of the periodic table, the nature of the chemical bond, the bulk electronic and thermal properties of materials, and the thermodynamics of chemical reactions. Applications include semiconductor electronics, solar energy conversion, medical imaging, and the stability and dynamism of living systems. Calculus and numerical simulations will be used extensively. In the weekly laboratory sections and the final project, students construct technical instruments that they then use in directed and open-ended explorations of the core concepts of the course.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/CHEM10/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "E-PSCI 10 A Brief History of the Earth": "<p>This is an introduction to Earth and planetary science for EPS concentrators and an overview, for those outside the field, of the critical events and processes that have shaped the Earth’s evolution and its place in the Solar System. The course is designed to highlight the processes, from the scale of microbes to that of tectonic plates, that drive the Earth’s response to internal and external perturbations, and we will explore both the timescale of those perturbations and the limits of the Earth’s resilience. By considering the full sweep of geologic time, from the Earth’s formation to our modern world, the course will take advantage of a series of natural experiments to compare the Earth system during periods with and without atmospheric oxygen, animals, land plants, and polar ice sheets, and to compare it, on occasion, with other terrestrial planets.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/E-PSCI10/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "PHYSICS 15A Intro Mechanics & Relativity": "<p>Physics 15a is an introduction to the topics of Newtonian mechanics and special relativity, but it is also an introduction to what it means to be a physicist—formulating theoretical models to describe the natural world and testing those models for consistency with data. Topics include: vectors; kinematics in three dimensions; Newton's laws; force, work, power; conservative forces, potential energy; momentum, collisions; rotational motion, angular momentum, torque; static equilibrium, simple harmonic motion, damped and driven oscillations; gravitation; fictitious forces; fluids; special relativity; experimental methods and tools including: basic programming, experimental design and data acquisition, model testing and error analysis; scientific communication.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/PHYSICS15A/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "PHYSICS 16 Mechanics & Special Relativity": "<p>Newtonian mechanics and special relativity for students with good preparation in physics and mathematics at the level of the advanced placement curriculum. Topics include oscillators (damped/driven and resonance), an introduction to Lagrangian mechanics and optimization, symmetries and Noether's theorem, special relativity, collisions and scattering, rotational motion, angular momentum, torque, the inertia tensor (dynamic balance), gravitation, and planetary motion.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/PHYSICS16/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "PHYSICS 19 Intro Theoretical Physics": "<p>Physics 19 is a comprehensive introduction to the foundations of theoretical physics, with a first-principles approach to its five main areas: analytical mechanics, thermodynamics, fields, relativity, and quantum theory.<br><br>The course is aimed primarily at students who are considering pursuing advanced study of physics in the concentration, as an option alongside Physics 15A and Physics 16. (Most physics concentrators start by taking either Physics 15A, 16, or 19.) The course is also open to undergraduate and graduate students in other fields of study—such as math, philosophy, astronomy, biology, chemistry, computer science, and engineering—who are interested in developing a better understanding of physics either to serve the needs of their own academic work or as a first step toward switching their area of study to physics.<br><br>The purpose of the course is to present the foundations of modern theoretical physics in a welcoming setting for students from a variety of backgrounds. The course is intended to present a clear, faithful picture of what theoretical physics looks like. We will derive nearly everything from scratch in as self-contained a manner as possible—with occasional exceptions for special cutting-edge examples. We will also introduce all the necessary mathematics along the way.<br><br>Specific topics will include Newtonian mechanics, chaos, perturbation theory, orbital mechanics, the Lagrangian and Hamiltonian formulations, the connection between symmetries and conservation laws, statistical physics and thermodynamics, electromagnetism, special relativity, relativistic gravitation, black holes, and an extensive introduction to quantum theory. In-class discussions will regularly address relevant issues in the history and philosophy of physics, as well as the conceptual implications of our modern physical theories for making sense of the world around us.<br><br>Cooperation and diversity strengthen our academic community, so the course will prioritize collaboration and aim to provide a welcoming and inclusive environment for students with diverse identities and backgrounds. The instructor will help students form study groups as needed.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/PHYSICS19/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "APMTH 10 Computing for Science & Engineering": "<p>This course is a systematic introduction to computing (with python and jupyter notebooks) for science and engineering applications. Applications are drawn from a broad range of disciplines, including physical, financial, and biological-epidemiological problems. The course consists of two parts: 1. Basics: essential elements of computing, including types of variables, lists, arrays, iteration and control flow (for, while loops, if statement), definition of functions, recursion, file handling and simple plots, plotting and visualization tools in higher dimensions. 2. Applications: development of computational skills for problem solving, including numerical and machine learning methods, and their use in deterministic and stochastic approaches; examples include numerical differentiation and integration, fitting of curves and error analysis, solution of simple differential equations, random numbers and stochastic sampling, and advanced methods like neural networks and simulated annealing for optimization in complex systems. Course work consists of attending lectures and labs, weekly homework assignments, a mid-term project and a final project; while work is developed collaboratively, coding assignments are submitted individually.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/APMTH10/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "APMTH 104 Complex & Fourier Analysis": "<p>Complex analysis: complex numbers, functions, mappings, Laurent series, differentiation, integration, contour integration and residue theory, conformal mappings. Applications to visualization, art (especially M.C. Escher). Anamorphic images. Fourier Analysis: orthogonality, Fourier Series, Fourier transforms. Signal processing: sampling theorems (Nyquist, Shannon), fast Fourier transforms. Applications to image, audio analysis: filtering and deblurring.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/APMTH104/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "APMTH 111 Intro to Scientific Computing": "<p>Many science and engineering problems don’t have simple analytical solutions or even accurate analytical approximations. Scientific computing can address certain of these problems successfully, providing unique insight. This course introduces some of the widely used techniques in scientific computing through examples chosen from physics, chemistry, biology, computer science and other fields. The purpose of the course is to introduce methods that are useful in applications and research and to give the students hands-on experience with these methods. The main programming language will be Python.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/APMTH111/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "APMTH 115 Mathematical Modeling": "<p>Abstracting the essential components and mechanisms from a natural system to produce a mathematical model, which can be analyzed with a variety of formal mathematical methods, is perhaps the most important, but least understood, task in applied mathematics. This course approaches a number of problems without the prejudice of trying to apply a particular method of solution. Topics drawn from biology, economics, engineering, physical and social sciences.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/APMTH115/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "COMPSCI 1090A Data Science 1": "<p>Data Science 1 is the first half of a one-year introduction to data science. The course focuses on the analysis of messy, real-life data to make predictions using statistical and machine learning methods. Material covered integrates the five key facets of an investigation using data: (1) data collection – data wrangling and cleaning to obtain a suitable dataset; (2) data management – accessing data quickly and reliably; (3) exploratory data analysis – generating hypotheses and building intuition; (4) prediction or statistical learning – developing and applying models such as linear and logistic regression, k-nearest neighbors, decision trees, and probabilistic approaches based on Bayes’ rule; and (5) communication – summarizing results through visualization, storytelling, and interpretable summaries.</p><p>This is the first part of a two-course sequence. The curriculum builds throughout the academic year, and students are strongly encouraged to enroll in both the fall and spring courses within the same academic year.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/COMPSCI1090A/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "COMPSCI 1200 Intro Algorithms & Limitations": "<p>An introductory course in theoretical computer science, aimed at giving students the power of using mathematical abstraction and rigorous proof to understand computation. Thus equipped, students will be able to design and use algorithms that apply to a wide variety of computational problems, with confidence about their correctness and efficiency, as well as recognize when a problem may have no algorithmic solution. At the same time, they will gain an appreciation for the beautiful mathematical theory of computation that is independent of (indeed, predates) the technology on which it is implemented.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/COMPSCI1200/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "COMPSCI 1210 Intro to Theory of Computation": "<p>Computation occurs over a variety of substrates including silicon, neurons, DNA, the stock market, bee colonies and many others. In this course we will study the fundamental capabilities and limitations of computation, including the phenomenon of universality and the duality of code and data. Some of the questions we will touch upon include: Are there functions that cannot be computed? Are there true mathematical statements that can't be proven? Are there encryption schemes that can't be broken? Is randomness ever useful for computing? Can we use the quirks of quantum mechanics to speed up computation?</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/COMPSCI1210/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "COMPSCI 50 Intro to Computer Science": "<p>This is CS50, Harvard University's introduction to the intellectual enterprises of computer science and the art of programming, for concentrators and non-concentrators alike, with or without prior programming experience. (More than half of CS50 students have never taken CS before!) This course teaches you how to solve problems, both with and without code, with an emphasis on correctness, design, and style. Topics include computational thinking, abstraction, algorithms, data structures, and computer science more generally. Problem sets inspired by the arts, humanities, social sciences, and sciences. More than teach you how to program in one language, this course teaches you how to program fundamentally and how to teach yourself new languages ultimately. The course starts with a traditional but omnipresent language called C that underlies today's newer languages, via which you'll learn not only about functions, variables, conditionals, loops, and more, but also about how computers themselves work underneath the hood, memory and all. The course then transitions to Python, a higher-level language that you'll understand all the more because of C. Toward term's end, the course introduces SQL, via which you can store data in databases, along with HTML, CSS, and JavaScript, via which you can create web and mobile apps alike. Course culminates in a final project. See <a href=\"https://cs50.harvard.edu/college\">https://cs50.harvard.edu/college</a> for advice, FAQs, syllabus, and what's new. Email the course's heads at <a href=\"mailto:heads@cs50.harvard.edu\">heads@cs50.harvard.edu</a> with questions.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/COMPSCI50/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "COMPSCI 51 Computation Abstraction & Design": "<p>Fundamental concepts in the design of computer programs, emphasizing the crucial role of abstraction. The goal of the course is to give students insight into the difference between programming and programming well. To emphasize the differing approaches to expressing programming solutions, you will learn to program in a variety of paradigms -- including functional, imperative, and object-oriented. Important ideas from software engineering and models of computation will inform these different views of programming.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/COMPSCI51/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "COMPSCI 61 Systms Programming & Machine Org": "<p>Fundamentals of computer systems programming, including data representation, storage, process management, and synchronization. This course provides a solid background in systems programming and an understanding of the interactions between computer software and hardware. Topics include C++ and assembly language programming, operating systems kernels and system calls, memory hierarchy and caching, processes, threads, and synchronization.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/COMPSCI61/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "STAT 109A Data Science 1": "<p>Data Science 1 is the first half of a one-year introduction to data science. The course focuses on the analysis of messy, real-life data to make predictions using statistical and machine learning methods. Material covered integrates the five key facets of an investigation using data: (1) data collection – data wrangling and cleaning to obtain a suitable dataset; (2) data management – accessing data quickly and reliably; (3) exploratory data analysis – generating hypotheses and building intuition; (4) prediction or statistical learning – developing and applying models such as linear and logistic regression, k-nearest neighbors, decision trees, and probabilistic approaches based on Bayes’ ru
