k\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 63E Religion, Neuroscience and the Human Mind": "<p>More than 160 years after Darwin’s epochal account of evolution, some 75-85% of the world’s 8.2 billion people are religious, and the percentage is growing. What does religion do for human beings?  What does an evolutionary and biologically informed understanding of the mind and brain lead us to think about where religion fits in human life? Harvard’s first psychologist, William James, engaged these questions in the late 19th century, bringing the cutting edge of empirical psychology to the philosophy of religion. Today these same questions animate neuroscience, where researchers are showing how affectivity, emotions and our evolutionary past come together to form the “self” philosophers have long thought to be primarily “rational,” and to drive our perception and behavior.</p><p>This seminar brings together the thought of James, writing at the turn of the 20th century, with the work of neuroscientist Antonio Damasio and others today, to ask what kinds of beings we are, how our minds function, and what religion contributes to human individual and societal experience? The seminar takes up philosophy of belief, affect, and emotion, and touches on the biology of the brain and homeostasis. It treats the history of philosophy by comparing James with Damasio and others. We conclude assessing some contemporary views of religion from evolutionary psychology (Boyer, Atran), cultural anthropology (Geertz, Luhrmann, Asad), and contemporary neuroscience of religion in light of James’s and Damasio’s models of the human mind.</p><p><strong>NOTE: This seminar will meet Mondays, 3:30pm-5:30pm.</strong></p><p><strong>NOTE: There will be a museum visit to Collection of Historic Scientific Instruments and a special collections visit to Houghton Library. In addition, we will have a class dinner at conclusion of the seminar.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR63E/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 21W Research at the Harvard Forest—Global Change Ecology: Forests, Ecosystem Function, the Future": "<p>The seminar will consist of three weekend field trips (Friday evening through Sunday afternoon) to Harvard Forest and a final mini symposium on campus during reading period. The seminar will acquaint students with our current knowledge about global change, drawing upon state-of-the-art research, tools, and measurements used in evaluating and predicting climate change through ongoing studies at the Harvard Forest's 4,000-acre outdoor classroom and laboratory in Petersham, Massachusetts.</p><p><strong>Trip Dates: September 11-13, October 9-11, November 6-8, December 8 (final on-campus meeting)</strong></p><p>Students will spend the weekends at the Harvard Forest (HF) in comfortable accommodations with round-trip travel and meals provided. Through readings, informal discussions, and field excursions, students will become versed in the ecological concepts related to global change, and the science behind current predictions for future climate scenarios. Through the three weekends, we will broadly discuss the critical role that forests play in a changing climate, with in-depth discussions on specific topics such as carbon dioxide emissions, invasive species, and forecasting the future with ecological data.</p><p>Visits to various long-term ecological experiments and associated infrastructure will show students how climate change impacts are assessed, and discussions will emphasize how scientists predict future climate change through modeling. Students will prepare a written exercise following each weekend based on the topics discussed and will work on a final paper and presentation for a mini symposium on the last day of class.</p><p>The field trip format is intended to immerse students in an active field research setting and to allow extended small group discussion and interaction with a number of leading global change scientists at one of the preeminent field research sites in the U.S. Students will come away with an understanding of the types of ecological evidence for global warming and will be able to explain, to a broad audience, some of the major scientific methods used in predicting its consequences.</p><p><strong>NOTE: Due to the seminar format of 3 weekends and a final symposium, students must be able to attend all seminar dates; Transportation, accommodations, and meals at the Harvard Forest will be provided at no cost to the student; Seminar only meets on weekends EXCEPT a one-time only meeting on campus.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR21W/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 71Y Rituals and Living the Good Life": "<p>Why do we knock on wood for good luck? Why do we put birthday candles on cakes? Why do some cultures use black at funerals while others use only white? Why do teams perform team cheers before games?</p><p>This seminar will explore the psychology of rituals – those odd, seemingly meaningless behaviors that research shows influence our psychology in profound ways, making the mundane meaningful: dull morning routines can instead get us “ready for our day” and rote work meetings can instead improve team cohesion and performance.</p><p>We will explore rituals in domains ranging from performance anxiety to team effectiveness, from enhancing consumption to improving health—in our daily lives, our work lives, and even when trying to cope with family during the holidays.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR71Y/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 52Q Roots & Routes: Food, from Soil to Plate": "<p><i>How do we acquire food?</i> As consumers, we depend on the Earth and its biological and chemical networks to generate our food, which in turn influences our cultures and societies. The various routes that transform sunlight and nutrients into the food on our plates take many forms, including industrial agriculture and hyperlocal production, but these food systems impact people and the environment differently at each stage of the journey.</p><p>This first-year seminar offers an introduction to the fundamental scientific concepts of biogeochemistry through the lens of food systems. Using a diverse range of readings from farmers, chefs, indigenous leaders, and academic scientists, we will explore the common knowledge base shared by these communities, including soil science, hydrology, geochemistry, microbiology, plant biology, and ecology.</p><p>The seminar will also introduce concepts of ecosystem services and conservation ecology. Each reading module will be accompanied by a brief essay or small project, allowing students to synthesize and apply their knowledge. Additionally, students will work in small groups (2-3 students) to design a polyculture or permaculture farm, culminating in a final presentation.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR52Q/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 51C Science in the Age of Artificial Intelligence": "<p>Science is focused on discovering and explaining the world around and within us. This has been its goal for hundreds of years and has produced astonishing breakthroughs from population genetics to general relativity, to plate tectonics. Artificial intelligence is touted as a tool for learning about a complex system in ways that humans can’t and has seen exceptional progress in natural language processing and image identification. In this seminar we explore the emerging linkages between scientific inquiry and artificial intelligence.</p><p>The central goal of this seminar is to question the classical role of the scientist as a creator of theories and consider how scientists may become interpreters of theories developed by AI. We do this by developing an understanding of how AI systems actually work (they’re astonishingly simple), explain recent success cases, and then consider how we may (or may not) rebuild science in an AI-first manner. Examples will be drawn from the earth and planetary sciences as well as the life sciences.</p><p><strong>NOTE: Recommended Preparation - High school calculus and/or computer programming would be extremely useful.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR51C/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 31J Skepticism, Knowledge and Understanding": "<p>Descartes wrote his Meditations (1641) because he realized that, although he had received the best education in the world, much of what he had learned was false or unfounded. This led him to embark on a systematic investigation to discover whether knowledge is possible. Harvard students face a similar predicament. Having dutifully learned what they were taught, and evidently learned it well, some find themselves questioning its cognitive adequacy. Much that they learned in school seems superficial, incomplete, oversimplified, or incorrect. Is it possible to know the way the world is? Can I know that I am not a brain in a vat being manipulated into thinking that I am an embodied human being? Can I know that the Louisiana Purchase occurred in 1803, that electrons have negative charge, that Hamlet is a masterpiece, that the sun will rise tomorrow? Can I know that Biden was fairly elected, that Covid vaccines are safe, that anthropogenic climate change is real?</p><p>Until recently, worries about skepticism might have seemed idle. But today we are inundated with suspect information. Some people reject well-founded contentions as 'fake news', appeal to 'alternative facts' when standard facts fail to align with their opinions. They dismiss warnings about climate change and recommendations about public health as partisan propaganda. Deep fakes and conspiracy theories are widespread. What should we think? Are there good reasons to accept some claims and reject others? If so, what are they? What assurance do they provide? Understanding the nature, scope, and vulnerability of claims to knowledge will aid in assessing such contemporary issues.</p><p><strong>NOTE: The seminar will include several field trips to Harvard museums.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR31J/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 51M Skin, Our Largest, Hottest, and Coolest Organ: From Cancer to Cosmetics": "<p>Skin provides a protective barrier that is vital to the survival of all multicellular organisms. Its physical properties have been exploited for centuries, from clothing to footballs, and yet skin is a vibrant and dynamic organ that responds to environmental signals in myriad ways. Skin protects humans from toxic exposures but can also be an intrinsic source of dangerous diseases. While its defects only rarely kill humans, its imperfections can cause misery and discomfort, ranging from subtle annoyances to depression and loss of self-esteem. It is a source of immense pleasure or excruciating pain.</p><p>This seminar will provide a series of exposures at an introductory level, to distinct topics in skin biology. They will exemplify the diverse and vibrant nature of cutaneous networks and signals, through the lens of commonly recognized topics such as tanning, hair, sweat, cancer, cosmetics, and infections.</p><p><strong>NOTE: Recommended Preparation - Prior AP-Biology may be helpful but not required.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR51M/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 35N The Art and Craft of Acting": "<p>We’ve all watched a great performance and wondered, “How did that actor do that?” Acting is undoubtedly the most popular, most widely appreciated of the performing arts, and yet, in many ways, it remains a mystery. This seminar will give students an opportunity to demystify the art of acting by introducing them to the basic tools of the trade—they will learn about the craft of acting by actually “doing” it. It will provide an introduction to acting by combining elements of a discussion seminar with exercises, improvisations and performance activities.</p><p>Improvisation will be used to improve group/ensemble dynamics, to minimize habitual behaviors, and to develop characters. Students will explore a range of acting techniques designed to give students greater access to their creativity, imagination and emotional life. The aim will be to improve skills that are essential to the acting process, like concentration, focus, relaxation, observation, listening, collaboration and so on.</p><p><strong>NOTE: Students will attend and critique theatrical productions in the Boston area. There will be no charge to the students.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR35N/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 53D The Cure Within: Fighting Cancer with Your Immune System": "<p>Cancer. We all know someone who has been affected by this formidable disease. The search for a cure has spurred advancements in therapeutic approaches with an unconventional target, the body’s own immune system. This seminar will explore the revolutionary potential of leveraging immune cells to combat cancer. Exciting new therapeutics to harness the immune system are already in the clinic, with many more being developed by researchers all over the world.</p><p>Through collaborative discussions, presentations, and investigation of popular science articles and scientific research papers, students will delve into the fundamental principles of cancer biology, the immune system, and tumor immunotherapy. We will explore questions such as: Why do tumors grow? How does the immune system “see” tumor cells? How can we manipulate immune cells to better target and eliminate growing tumors?</p><p>To conclude this seminar, students will craft group presentations to illuminate a cutting-edge cancer immunotherapy for a lay audience. Empowered with a solid foundation in the basics of cancer immunology and the skills to critically engage with scientific information, students will leave this seminar equipped to navigate the ongoing dialogue surrounding cancer and its treatment.</p><p><strong>NOTE: This seminar also includes a field trip to a tumor immunology lab at the Dana Farber Cancer Institute, providing a firsthand encounter with groundbreaking research.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR53D/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 43J The Economist’s View of the World": "<p>This seminar's goal is to probe how economists of various perspectives view human behavior and the proper role of government in society. Over the semester, seminar participants will read several brief, nontechnical, policy-oriented books by prominent economists. The participants will discuss each work's strengths and weaknesses, exploring the positive scientific judgments and normative value systems that underlie the author’s policy prescriptions.</p><p>To prepare for each book discussion, seminar participants are expected to send the instructor a brief email describing their views of the reading. In addition, each participant will have the opportunity to write his or her own essay addressing an economic policy issue. The essay will be read and discussed by all seminar participants.</p><p><strong>NOTE: Prerequisite - Students are expected to have had some background in economics, such as an AP economics course in high school or simultaneous enrollment in Economics 10a.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR43J/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 65H The Greatest Love Story of All Time? Heloise and Abelard": "<p>Ever yearn to travel back in time? Heloise and Peter Abelard, woman and man, student and teacher, nun and monk, embody much that is fascinating about the twelfth century and what subsequent ones, including ours, have made of it. The seminar adventures into letters written by the two, together with adaptations of their lives, from the Middle Ages to the present, into poems, novels, plays, films, and artworks. Along the way, we delve into similarities and differences between handwritten manuscripts on parchment and books printed on paper as well as between spoken and written words.</p><p>As the title announces, the seminar emphasizes the loves of two extraordinary individuals. The theme encompasses the immense and mystifying spectrum of this feeling, including intense affections within a romantic couple, deep but differing bonds between individual believers and their God, passions that folks feel for vocations and avocations, and other types of pleasure also. It probes central issues of individuality and the power of institutions. We will explore who Abelard and Heloise were as persons and as a couple (before and after his castration), what they reveal about their now-distant days, and what they can help us to perceive about our own selves and moment in history. They taught each other much and can teach us nowadays too. Does human nature change? Are human beings today unique? Should we be as open to the inspiration of people from the past as from other cultures today?</p><p><strong>Note: This course can be used to fulfill the Language &amp; Literature distribution requirement for the undergraduate secondary field in Medieval Studies.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR65H/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 68G The Monstrous Imagination": "<p>This seminar is a study of monsters and “deviants” in Western culture from Biblical times to the present day. Students will endeavor to answer, collectively and individually, some basic questions: How does the idea of the monster both shun and affirm difference? How is the monster a product of systems of belief and cultural values? In what ways do monsters represent sexuality, politics, religion, and power? An array of exotic and marginal figures will form the focus of our study, including (but not limited to) bizarre inhabitants of the edges of ancient geography, souls in the netherworld, vampires, werewolves, witches, and cannibals.</p><p>Prior to contemporary times, monsters were serious business and were studied by influential scientists, theologians, physicians, and a wide range of writers of fiction. From early accounts in classical antiquity and the Middle Ages to familiar, modern monsters, we will accompany the course of monstrous imaginings and how the process of monstrification is a constant in the cultures and societies. Throughout the seminar, we will consider how the dynamics of fear, loathing, attraction, revulsion, the grotesque, recognition and alienation all form the basis of the monster-making mentality.</p><p><strong>NOTE: The seminar will include visits to the Peabody Museum of Natural History and the Houghton Library, which houses rare books and manuscripts. There will be no cost to students.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR68G/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 22I The Science of Sailing": "<p>In this seminar, we explore how to use simple physics to understand a range of natural phenomena associated with sailing. Beginning with a discussion of hydrostatics and stability, the seminar moves on to explore in depth the generation of lift and drag by the flow of air over sails and the flow of water over keels and rudders, examining critically the numerous incorrect explanations in the popular literature.</p><p>We also examine the environment in which a sailboat operates, discussing atmospheric circulation on a range of length scales, waves in deep and shallow water, and tides and currents. Scaling laws and dimensional analysis are introduced and used throughout the seminar.</p><p><strong>NOTE - Recommended Preparation: Participants in this seminar should have a good high school physics background and have some knowledge of sailing.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR22I/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 73R The Scientific Study of Wants and Well-Being": "<p>This seminar explores what existing research tells us about the determinants of well-being, how they relate to the choices that people make, and how researchers (especially economists) go about quantifying wants and well-being in a way that permits them to study the effects of different institutions (such as markets) on well-being. The seminar will begin with a presentation of the most basic approach within economics:  Attempting to capture the notion of rational pursuit of our own well-being (or other goals people may have), economists translate the study of people into mathematical analysis by developing the notion of a utility function.</p><p>But the seminar will place special emphasis on what psychology teaches us about (1) what human goals and concerns are missing from the textbook economics account of goals, and how to add them, and (2) about the important biases and failures humans make in pursuing our wants. We’ll explore which psychological biases seem to matter for economic and social outcomes, and how these improvements can also be translated into the mathematical language used in economics.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR73R/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 51E The Story of the Alternating Sign Matrix Conjecture": "<p>This seminar is intended to illustrate how research in mathematics actually progresses, using recent examples from the field of algebraic combinatorics. We will learn about the story of the search for and discovery of a proof of a formula conjectured by Mills-Robbins-Rumsey in the early 1980's: the number of n x n alternating sign matrices.</p><p>Alternating sign matrices are a curious family of mathematical objects, generalizing permutation matrices, which arise from an algorithm for evaluating determinants discovered by Charles Dodgson (better known as Lewis Carroll). They also have an interpretation as two-dimensional arrangements of water molecules and are known in statistical physics as square ice.</p><p>Although it was soon widely believed that the Mills-Robbins-Rumsey conjecture was true, the proof was elusive. Researchers working on this problem made connections to invariant theory, partitions, symmetric functions, and the six-vertex model of statistical mechanics. Finally in 1995, all these ingredients were brought together when Zeilberger and subsequently Kuperberg gave two proofs of the conjecture.</p><p>In this seminar we will survey the story of the alternating sign matrix conjecture, building up to Kuperberg's proof. If time permits, we will also get a glimpse of very recent activity in the field, for example the Razumov-Stroganov conjecture.</p><p><strong>NOTE: This seminar will meet Mondays, 3pm-5:30pm.</strong></p><p><strong>NOTE - PREREQUISITE: This seminar is recommended for students with a strong interest in mathematics, including some familiarity with proofs. It would be helpful to have some exposure to combinatorics (permutations, binomial coefficients) and linear algebra (matrix multiplication and determinants of n by n matrices).</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR51E/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 26J The Universe’s Hidden Dimensions": "<p>This seminar will give an overview and introduction to modern physics, astronomy, and cosmology. As with the books: <i>Warped Passages</i>, <i>Knocking on Heaven's Door</i>, <i>Higgs Discovery</i>, and <i>Dark Matter and the Dinosaurs</i>, on which it will be loosely based, the seminar will consider important developments in physics today and in the last century. We will consider the revolutionary developments of quantum mechanics and general relativity and will investigate the key concepts which separated these developments from the physical theories which previously existed. We will delve into modern particle physics and cosmology.</p><p>We will focus on developments today in astronomy and cosmology, reviewing the current cosmological model based on the Big Bang theory and inflation and investigating what we might learn in the new future. We will also move beyond the standard theories into more speculative arenas, including theories of extra dimensions of space, as well as ideas about the nature of dark matter and black holes. We will consider the motivations underlying these theories, their current status, and how we might hope to test some of the underlying ideas in the near future.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR26J/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 68I The World Through the Screen – Documentary Filmmaking": "<p>We carry cameras in our pockets every day yet seldom pause to consider what it means to encounter the world through their lens. We accumulate moving images into vast, often unseen personal archives, hidden away in clouds, but rarely do we return to them to examine the forms of meaning and lived experience they produce. Documentary cinema offers a way to re-engage with this material: to explore the world through film, attune ourselves to the unpredictability of reality, translate it into images and sounds, and shape those elements into a subjective cinematographic experience we can share with others. This practice-based seminar introduces students to the forms, techniques, concepts, and materials of nonfiction filmmaking.</p><p>Over the semester, we will engage a range of documentary approaches through assignments involving video and sound recording, editing, cinematography, and montage. Class sessions will incorporate studio time, hands-on equipment workshops, screenings of student work, and conversations with visiting filmmakers. Following a series of introductory camera, sound, and editing exercises, designed to introduce the range of expressive possibilities in documentary filmmaking, students will make a film in groups of two, which they will conceive, record, and edit. Films will be brought together into a collective work that will be screened at the end of the semester in the main theater of the Carpenter Center for the Visual Arts.</p><p><strong>NOTE: This seminar meets Mondays, 12pm-3:30pm.</strong></p><p><strong>NOTE: This seminar does not require prior experience in filmmaking. There will be a weekly seminar screening in the Carpenter Center Theater 10-12pm on Thursdays, attendance is mandatory. The length of the class meeting will allow for in-class studio time and equipment workshops. All camera, sound, and editing equipment for the seminar is assigned to our class by the Art, Film, and Visual Studies department's equipment room and lent to the students for the duration of the seminar; there are no materials or equipment students need to bring themselves to class. Enrolled students will be given access to the shared video editing labs in the basement of Sever Hall.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR68I/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 52C Tree": "<p>Have you hugged a tree lately? How about grown one? Photographed one? Drawn one? Written about one? Imagine a semester devoted to connecting two organisms: a person (you) and a tree (not you). Interacting with a single tree, you will explore its individual history, evolutionary history, life cycle, leaves, bark, roots, flowers, cones, and architecture. In an age of environmental destruction and outright murder of our biological brethren, there is something deeply troubling about humanity’s relationship with nature. Technology has left us with mere facsimiles of nature - pixilated abstractions of biodiversity through satellite imagery, decoded strings of DNA – and we, as a species, have become fundamentally disconnected from actual nature and the magnificent organisms with which we share the earth.</p><p>In this seminar, we will work to understand and give agency to trees as individual organisms, literally rooted in the ground, and evolutionarily rooted in deep time. Topics to be covered include the evolutionary origin of arborescence, human relationships with non-sentient organisms, the case for legal rights for natural objects, reading a twig, the unseen world of roots, and finding human meaning in the longevity in trees. Each student will also work with an individual tree in the living collections of the Arnold Arboretum of Harvard University and observe (see) this organism throughout the entire semester through the creation of images (photography, drawing), journaling, and other forms of representation. The goal of this first-year seminar will be to initiate a personal and lifelong connection with the “other,” the vast and variant organisms with which we share the planet.</p><p><strong>NOTE: The seminar will meet at the Arnold Arboretum of Harvard University from 3pm-6:30pm to allow for travel time. Required field trips to the Arnold Arboretum of Harvard University, the Museum of Comparative Zoology, and a local pigeon fancier will be included. Transportation will be provided at no cost to the student.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR52C/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 42H U.S. Climate Change Policy and the Energy Transition": "<p>U.S. climate change policy has seen increasingly large pendulum swings, including the adoption and subsequent abandonment of a large number of policy instruments. Different presidential administrations have variously stressed energy security, reducing greenhouse gas emissions, promoting green jobs, environmental justice, and increasing domestic production of oil and gas. In the background, the Supreme Court has altered, substantially, what climate regulations are feasible under existing statutes. At the same time, new low-carbon energy technologies, most importantly wind, solar, batteries, and electric vehicles, have become cost competitive with conventional technologies – yet they face substantial nonmarket impediments to adoption. Moreover, international events induce domestic energy price volatility. And on top of this, U.S. and global emissions are rising, and with them, global temperatures.</p><p>This seminar examines U.S. climate and energy policy from both economic and technological perspectives. The seminar starts with a review of the U.S. energy sector, energy security and U.S. energy history, climate science, the economics of climate change, and climate/energy policy tools. The seminar then dives into current policy issues, including the power sector, electric vehicles, aviation fuels, international considerations and carbon border fees, and the role of personal action. A theme throughout the second half of the seminar is looking ahead to the next generation of climate/energy policies, a matter of active debate. The target audience is students who are committed to making a difference in how the U.S. and the world tackles the challenge of rapidly shifting energy demand and climate change: through policy, through effecting social and political change, or through inventing or bringing to market the technological breakthroughs that will facilitate the transition to a net zero emissions economy.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR42H/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 51F Understanding the Seemingly Impossible: A Revolution in Biology": "<p>Occasionally a scientific discovery is so unexpected that it is seemingly unexplainable. This seminar will revisit one such event, the discovery of RNA interference and how modern experimental molecular genetics cracked this problem and started a billion-dollar industry. Rare, unexpected discoveries in biology, for example catalytic RNAs, instantly extend and broaden our understanding of the world, while the impact of other discoveries (split genes, hopping genes) are more gradual.</p><p>However, some discoveries challenge firmly supported ideas. The initial description of RNA interference (RNAi) was seemingly magical the introduction of a RNA molecule matching the sequence of any gene, results in the effective silencing (turning off) of the gene. Further, the silencing signal(s) were extremely potent and mobile, moving between cells, tissues, and generations. A series of seminal discoveries during an amazing four-year period revealed the previously unimagined process.</p><p>We will read and talk about how these discoveries were made and how this unexpected new biology launched new therapeutic companies and is informing developing ideas about heritability, adaptation, and evolution.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR51F/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 73L Unequal Origins: Pregnancy, Poverty and Child Health": "<p>The US has worse pregnancy and child outcomes than any other high-income country in the world. Is this because we spend less providing direct income support to families than other high-income countries? This seminar will discuss the intersection between maternal and child health outcomes and poverty in the United States through a medical, economic, political, and historical lens. Assignments will ask students to become familiar with and attempt to navigate available supports for pregnant people and their children in the United States.</p><p>Students will visit the Harvard Art Museums to observe how pregnancy and early childhood health and social supports for families with low incomes were conceptualized at the turn of the 20th century. Students will discuss elements of design and implementation of ongoing projects being conducted by Harvard faculty and collaborators to roll out and test direct cash support to pregnant or postpartum people.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR73L/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 54C WEIRD Minds: Understanding How Culture Shapes Our Thinking, Feeling and Reasoning": "<p><a href=\"https://www.popularmechanics.com/science/a33224851/how-many-circles-viral-coffer-illusion/\">https://www.popularmechanics.com/science/a33224851/how-many-circles-viral-coffer-illusion/</a></p><p>Do you see squares or circles in the image above? People from societies that are Western, Educated, Industrialized, Rich and Democratic (WEIRD) often see only squares, while those from other societies see only circles. If you squint, you might glimpse the circles between the squares. People from different places literally see the world differently. This, the Coffer illusion, represents the tip of an iceberg of cultural variation in how people across societies think, reason, feel and perceive.</p><p>Globally, people from WEIRD societies tend to be more individualistic, self-focused, guilt-ridden, time-concerned, overconfident and trusting of strangers than those from other populations. They also prefer abstract categories in reasoning, ignore backgrounds and contexts, impute dispositional causes to people’s behavior, and emphasize the importance of intentions in making moral judgments.</p><p>Through accessible readings, small-group conversations, guest lectures, classroom experiments, and illustrative videos, we’ll explore the latest research on human psychological variation and its origins in history, institutions, family organizations, technologies, and languages. In our assignments and discussions, we’ll challenge this research and consider its implications for economics, business, politics, law, society and the future.</p><p><strong>NOTE: This seminar will meet Wednesdays, 9:30am-11:45am.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR54C/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 54J What Can AI Do Now, Really?": "<p>In the time since members of the Class of 2030 were born, artificial intelligence has advanced from barely recognizing a human face in a photograph to creating convincing images and videos of people—real or imagined—doing nearly anything. In just the past few years, the acceleration in the capabilities of Large Language Models (LLMs) has been astonishing, leaving nearly everyone who works with them wondering about the limits of their powers, dangers, and utility. The pace of change is now so fast that even experts are asking a basic question: What can AI do now, really? In this seminar, we will take that question seriously and explore it by applying current AI models to real problems. Students will suggest areas for inquiry across science, policy, economics, health, the arts, or everyday life, motivated by their own interests.</p><p>Working individually and in small groups, they will test AI systems on proposed questions, comparing results and tracking where models succeed, fail, or mislead. A mix of questions will be studied. Some will be small and concrete, answerable within a semester or less. For larger questions, the goal will not be to “solve” a problem, but to frame it in a way that makes real progress possible. Over the term, students will develop their questions into case studies, lead discussions, and evaluate results with peers and AI-expert reviewers. Student work will be included in a seminar-summary paper led by Prof. Goodman and submitted to the Harvard Data Science Review. This seminar treats AI not as a computer science subject, but as a system to be tested. The seminar is designed to support sustained investigation rather than quick exposure.</p><p>As leader, I will inquire about how questions are framed, how evidence is gathered, and what claims are actually supported by the results. Students will typically investigate the same question using multiple AI tools (e.g., ChatGPT, Gemini, and others), allowing differences in results to become visible. Small, concrete problems allow students to see clearly whether a result works. Larger problems—such as those involving policy or social outcomes—require students to refine the question itself until progress can be evaluated. This process of reformulating questions is an explicit part of what students will learn.</p><p>The seminar also spans different kinds of tasks. Some case studies will involve structured, code-heavy work, such as simulating a system and interpreting its behavior. Others will depend more on language and reasoning, where judgment and interpretation matter more than correctness in a narrow sense. Some will involve visual explanation, and a few may attempt time-based media such as video. These latter tasks are intentionally challenging: producing a coherent sequence over time is significantly harder than generating a single image, and often reveals current limits. With twelve students working in groups of three, the seminar will focus on a small number of case studies in depth. The class will narrow a longer list of questions to the strongest and most illustrative four, ultimately informing the seminar-based submission to the Harvard Data Science Review (HDSR).</p><p>Students will be invited to comment, optionally, on the HDSR submission, after the seminar concludes. To support this the students during the seminar, each group will meet with Prof. Goodman regularly in weekly office hours, and each student will meet with her individually at least twice during the semester. These meetings will help students refine their questions, interpret results, and stay on track as their projects evolve. Because the tools themselves are evolving, the specific systems used and some readings will remain flexible. Students will be part of deciding what is worth testing as the course progresses.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR54J/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 68K What Does the Music Mean? Black Popular Music and Protest": "<p>This seminar studies African American popular music from America’s antebellum period to the present day. At every point in American history, African Americans have crafted music to speak out against racial injustices—from overt activist music to subtle coded messages. This seminar highlights the music of five moments in African American history: 1) spirituals of the enslaved, 2) music of the New Negro Movement, 3) music of the classical phase of the Civil Rights movement, 4) early hip hop, and 5) protest music of the Black Lives Matter (BLM) movement.</p><p>Students will study the sociocultural contexts informing the performances of the Fisk Jubilee Singers, Mahalia Jackson, Nina Simone, Kendrick Lamar, Janelle, Monáe, and Beyoncé, among others. Students will gain critical analytical skills for engaging music as a cultural production, commodity, and vehicle of activism. Ultimately, this seminar equips students to situate contemporary African American music within the longer history of African American musical activism.</p><p>Classes include discussing audio/visual material and primary and secondary written sources; classes also include participating in interactive music demonstrations. This interdisciplinary seminar draws from seminal and emergent scholarship in African American history and culture broadly, and the study of African American music specifically.</p><p><strong>NOTE: This seminar will meet Wednesdays, 12:30pm-2:45pm.</strong></p><p><strong>NOTE: No prior knowledge of music or history required. All are welcome. Just bring your curiosity to every class and assignment. This seminar includes the following mandatory field trips: Tours of the Houghton Library, Music Library, and Marcyliena H. Morgan Hip Hop Archive occur during class time. The remaining two mandatory field trips occur outside of regular class time or extend beyond regular class time: Sunday Service at The Avenue Fellowship Church and Boston’s Black Heritage Trail and Museum of African American History.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR68K/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 35E What Is Beauty?": "<p>Beauty does not lie in the eye of the beholder, nor is it an inherent property of things; it is a tool for understanding that individuality and objectivity are not the only realities, and that more important than both is the social and distinctly human capacity to develop a shared subjectivity and thereby build a community. Beauty fosters sociality and forges bonds, which is why it has been a vital concept in every human civilization.</p><p>In the first part of the seminar, we will analyze Immanuel Kant's aesthetics; then we will study the evolution of beauty throughout Western history, drawing examples primarily from the culture of a country, Italy, that has successfully self-fashioned itself as the land of beauty. Project-based and collaborative assignments will promote informed discussions and student participation.</p><p>At the end of the semester, students will take part in a convivial activity at Prof. Erspamer's home to discover the beauty of cooking pasta alla carbonara together while discussing what we have learned in the seminar.</p><p><strong>NOTE: Dinner preparations at Prof. Erspamer's home will take place on Monday, November 30, starting at 6:00 p.m., in lieu of the last afternoon class; Students who successfully participate in the program will be invited to apply to the summer study abroad program, \"Beauty, Community, and Imagination\", (Torino, Trento, and Siena, 2027).</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR35E/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 54L What Is Science For?": "<p>What is the value of science? Who does science? Who owns scientific results? What role does science play in society? Imagine the year 2030 and we’ve succeeded in lunar landings and base development. Can science and technology help the United States own the moon? Using examples from above (terrestrial), below (oceans), and beyond (space) you will explore the relationship between science and diplomacy. The umbrella term \"Science Diplomacy\" spans wide-ranging activities connecting science and technology with international affairs. Scientific knowledge can inform foreign policy objectives with scientific advice (science in diplomacy), facilitate international science cooperation (diplomacy for science), and use science cooperation to improve international relations between countries (science for diplomacy).</p><p>When you leave college, you will likely be part of a cohort using science &amp; technology to transform the world. How do we future cast transboundary challenges like global health (Above), rising sea levels (Below), and space exploration (Beyond)? This seminar uses case studies, campus visits, and field trips to create an immersive learning experience that integrates and evaluates science diplomacy concepts and mechanisms related to international science &amp; technology initiatives. You may know John F. Kennedy’s space race in the USA, but did you know of his role in promoting science diplomacy in the creation of the U. S. Agency for International Development (USAID)? For the capstone assignment, work side by side with your classmates, scientists, and international development practitioners to create products (e.g. OpEds, private LinkedIn accounts, and Wikipages) that amplify your voice and live beyond the life of the seminar.</p><p>This seminar is meant to highlight the global nature of science and technology fields and how closely it aligns with human interests. Specifically, outlining the “supply chains” involved in biodiversity, global health, and global commons governance. Students will be exposed to various viewpoints on and off campus via guest seminars, campus visits, and field trips. An important aspect of the seminar is to provide first-year students with ongoing mentoring and experiences that will benefit network building within the University and the Boston region, so they become critical thinkers about issues concerning the interface of science &amp; technology policy implementation and multilateral international initiatives.</p><p><strong>NOTE: This seminar includes two trips off campus on Fridays: One in Boston and one to Woods Hole, Cape Cod.</strong></p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR54L/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>", "FYSEMR 43F Why Your Childhood Follows You: The Science of Early Adversity and the Developing Brain": "<p>We know from decades of research that the foundations of healthy development are built early in life. Genes lay the groundwork for the brain's architecture, but it is environmental input that modulates gene expression and shapes how neural circuitry develops. Experience “<i>cuts both ways;</i>” thus, the brain benefits from positive experiences but can be harmed by negative experiences. And timing matters: negative experiences during critical periods of brain development (generally the first years of life) are more impactful than those that occur after a critical period has closed. <i>Our goal in this seminar is to understand how early life adversity can negatively impact developmental processes, including brain, biological and behavioral development, which ultimately may limit economic and social mobility.</i></p><p>In this seminar we will critically examine the range of adverse early experiences that impact children growing up in both low and high resource settings. We will consider both biological adversity (e.g., malnutrition, exposure to toxins) and psychological adversity (e.g., maltreatment, poverty). Key themes include a) the <i>nature</i> of the adversity to which children are exposed (e.g., physical abuse; intimate partner violence; food scarcity), b) the<i> timing</i> of the adversity (e.g., does it occur during the first 2 years of life or later in childhood?) c) the chronicity of the adversity (e.g., is exposure to adversity short-lived or does it continue for many months or years), and d) <i>individual differences</i> in response to adversity (e.g., two individuals, even identical twins, may respond differently to the same form of adversity). We will pay particular attention to the short‐ and long‐term outcomes on physical, neurological and psychological health.</p><p class=\"course-link\"><a href=\"https://my.harvard.edu/course/FYSEMR43F/2026-Fall/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View full course info (opens in new tab)\">View full course info ↗</a></p>"};
/*__DATA_END__*/
const LISTS = { LANGUAGES, GENEDS, FYSEMS };

/* UI text helpers (TEXT is built from page_text.csv) */
const UNSURE = TEXT["card.unsure"];
const DESC_PLACEHOLDER = TEXT["card.descPlaceholder"];
function T(key, vars){
  let s = TEXT[key] != null ? TEXT[key] : "";
  if (vars) for (const k in vars) s = s.split("{"+k+"}").join(vars[k]);
  return s;
}
function applyText(){
  document.title = TEXT["page.title"] || document.title;
  const map = {
    "txt-header-title":"header.title", "txt-header-sub":"header.subtitle",
    "txt-status-courses":"status.courses", "txt-status-skipped":"status.skipped",

    "txt-summary-heading":"summary.heading", "txt-summary-sub":"summary.sub",
    "txt-col-cat":"summary.colCategory", "txt-col-choice":"summary.colChoice",
    "copyTextBtn":"summary.copyButton", "copyHint":"summary.copyHint",
    "copiedMsg":"summary.copied", "txt-footer":"footer"
  };
  for (const id in map){ const el = document.getElementById(id); if (el) el.innerHTML = T(map[id]); }
}

/* Category/option labels all come from page_text.csv (via TEXT). */

    skipReason: T("cat.math.skipReason"),

    ]
  },
  writing: {
    label: T("cat.writing.label"),
    skipReason: T("cat.writing.skipReason"),
    options: [
      { id:"expos20", name:T("opt.writing.expos20") },
      { id:"studio",  name:T("opt.writing.studio") },
      { id:"hum10a",  name:T("opt.writing.hum10a") },

  },

    label: T("cat.concentration.label"),

       Courses.csv); the interdisciplinary "Other" area is appended here. */
    areas: CONC_AREAS.concat([

      { id:"gened",   label:T("opt.broader.gened"), dropdown:"GENEDS",  unsure:true,
        paneLabel:T("opt.broader.genedPane"), filterCats:GENED_CATEGORIES },
      { id:"seminar", label:T("opt.broader.seminar"), dropdown:"FYSEMS", unsure:true,
        paneLabel:T("opt.broader.seminarPane") },
      { id:"other",   label:T("opt.broader.other"), other:true,
